<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CGT Analyse">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4A6E8A">
  <title>CGT Analyse Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cgt-blue: #4A6E8A;
      --cgt-green: #C5DDB8;
      --fa:      #4A6E8A;
      --bas:     #4A6E8A;
      --bar:     #4A6E8A;
      --fa-bg:   #EFF6FF;
      --bas-bg:  #F5F3FF;
      --bar-bg:  #ECFDF5;
      --bg:      #F4F7F2;
      --surface: #FFFFFF;
      --border:  #CBD5E1;
      --txt:     #0F172A;
      --muted:   #64748B;
      --danger:  #DC2626;
      --node-bg: #E8F0E4;
      --node-border: #B2CCAA;
      --node-txt: #2A3D22;
      --r: 10px; --r-sm: 7px;
      --sh: 0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
      --sh-md: 0 4px 12px rgba(0,0,0,.10);
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--txt); line-height: 1.5; -webkit-text-size-adjust: 100%; }

    /* ── App shell ── */
    #app { max-width: 760px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
    #app.ht-mode { max-width: none; }
    #app.ht-mode .app-main { padding: 0; }
    .app-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--cgt-blue); border-bottom: none;
      padding: 12px 14px; display: flex; align-items: center; gap: 8px;
      box-shadow: var(--sh);
    }
    .app-header h1 { font-size: 17px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #fff; }
    .back-btn { background: none; border: none; font-size: 28px; line-height: 1; color: #fff; cursor: pointer; padding: 2px 6px 2px 0; }
    .app-main { flex: 1; padding: 16px; }
    .page { animation: fade .18s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

    /* ── Knoppen ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 16px; border-radius: var(--r-sm); font-size: 15px; font-weight: 600;
      cursor: pointer; border: none; transition: filter .12s;
    }
    .btn:active { filter: brightness(.9); }
    .btn-fa    { background: var(--fa);  color: #fff; }
    .btn-bas   { background: var(--bas); color: #fff; }
    .btn-bar   { background: var(--bar); color: #fff; }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--txt); }
    .btn-danger{ background: var(--danger); color: #fff; }
    .btn-sm    { padding: 7px 12px; font-size: 13px; }
    .btn-full  { width: 100%; }
    .fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--fa); color: #fff; border: none; font-size: 30px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(29,78,216,.45); transition: transform .12s; z-index: 50;
    }
    .fab:active { transform: scale(.94); }

    /* ── Cards & lijstitems ── */
    .card { background: var(--surface); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; }
    .card-pad { padding: 14px; }
    .list-item {
      display: flex; align-items: center; padding: 13px 14px;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:active { background: var(--bg); }
    .badge { width: 44px; height: 44px; border-radius: var(--r-sm); display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0; letter-spacing: .5px; }
    .badge-fa  { background: var(--fa); }
    .badge-bas { background: var(--bas); }
    .badge-bar { background: var(--bar); }
    .item-info { flex: 1; margin-left: 12px; min-width: 0; }
    .item-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta  { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── Formulier basis ── */
    .form-sec { margin-bottom: 18px; }
    .sec-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; padding-left: 2px; }
    .sec-label.c-fa  { color: var(--fa); }
    .sec-label.c-bas { color: var(--bas); }
    .sec-label.c-bar { color: var(--bar); }
    .fgrp { margin-bottom: 11px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .hint { font-size: 12px; color: var(--muted); font-weight: 400; }
    input[type=text], input[type=date], textarea, select {
      width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 15px; font-family: inherit; color: var(--txt); background: var(--surface);
      transition: border-color .14s; -webkit-appearance: none; appearance: none;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--fa); }
    textarea { resize: vertical; min-height: 72px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-footer { position: sticky; bottom: 0; background: linear-gradient(transparent, var(--bg) 30%); padding: 14px 0 18px; margin-top: 4px; }

    /* ── Type-keuzekaarten ── */
    .type-card {
      background: var(--surface); border-radius: var(--r); padding: 16px 14px;
      cursor: pointer; border: 2px solid transparent; box-shadow: var(--sh);
      display: flex; align-items: center; gap: 14px; margin-bottom: 11px;
      transition: box-shadow .12s, transform .12s;
    }
    .type-card:active { transform: scale(.985); }
    .type-icon { width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; letter-spacing: .5px; }
    .type-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .type-info p  { font-size: 13px; color: var(--muted); line-height: 1.4; }

    /* ── Uitklapmodal ── */
    .expand-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 400; display: flex; align-items: flex-end;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } }
    .expand-sheet {
      background: var(--surface); width: 100%; border-radius: 20px 20px 0 0;
      padding: 20px 16px 36px; max-height: 85dvh; display: flex; flex-direction: column;
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } }
    .expand-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .expand-lbl { font-size: 13px; font-weight: 700; color: var(--fa); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
    .expand-ta {
      flex: 1; font-size: 16px; font-family: inherit; color: var(--txt);
      border: 1.5px solid var(--border); border-radius: var(--r-sm);
      padding: 11px 13px; resize: none; min-height: 120px; line-height: 1.6;
    }
    .expand-ta:focus { outline: none; border-color: var(--fa); }
    .expand-btns { display: flex; gap: 8px; margin-top: 12px; }
    .expand-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; font-style: italic; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(12px);
      background: #1E293B; color: #fff; padding: 9px 20px; border-radius: 100px;
      font-size: 14px; font-weight: 500; opacity: 0; transition: opacity .18s, transform .18s;
      z-index: 500; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Lege staat ── */
    .empty { text-align: center; padding: 52px 24px; }
    .empty-ico { font-size: 54px; opacity: .35; margin-bottom: 14px; }
    .empty h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty p  { font-size: 15px; color: var(--muted); margin-bottom: 24px; }

    /* ── Actiebalk ── */
    .action-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

    /* ════════════════════════════════════════
       FA VISUEEL DIAGRAM
    ════════════════════════════════════════ */

    /* Header kaart */
    .fa-header-card {
      background: var(--surface); border-radius: var(--r); padding: 13px 14px;
      box-shadow: var(--sh); margin-bottom: 16px;
    }
    .fa-header-card input[type=text] { margin-bottom: 8px; }

    /* Canvas wrapper */
    .fa-canvas {
      background: #E8EEF5;
      border-radius: var(--r);
      padding: 10px 10px 12px;
      box-shadow: var(--sh-md);
      position: relative;
      width: 80%;
    }
    .fa-canvas-title {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .09em; color: var(--fa); margin-bottom: 16px; text-align: center;
    }

    /* ── Diagram layout ── */
    .fa-diagram {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Top rij: Sd ──●●──▶ R ──▶ Sr-pos */
    .fa-top-row {
      display: flex;
      align-items: center;
      gap: 0;
    }

    /* Pijl tussen knopen */
    .fa-arrow {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0 4px;
    }
    .fa-arrow svg { display: block; }

    /* Knopen: rechthoeken */
    .fa-node {
      flex: 1;
      min-height: 55px;
      background: var(--node-bg);
      border: 1.5px solid var(--node-border);
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      transition: filter .14s, transform .12s, box-shadow .14s;
      position: relative;
      user-select: none;
    }
    .fa-node:active { transform: scale(.97); filter: brightness(.95); }
    .fa-node:hover  { box-shadow: 0 0 0 3px rgba(29,78,216,.25); }
    .fa-node.filled { background: #BFDBFE; border-color: #3B82F6; }

    /* Ovaal voor Sr-pos */
    .fa-node-oval {
      flex: 1;
      min-height: 65px;
      background: var(--node-bg);
      border: 2px solid #1E3A5F;
      border-radius: 50%;
      padding: 8px 10px;
      cursor: pointer;
      transition: filter .14s, transform .12s, box-shadow .14s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      user-select: none;
    }
    .fa-node-oval:active { transform: scale(.97); filter: brightness(.95); }
    .fa-node-oval:hover  { box-shadow: 0 0 0 3px rgba(29,78,216,.25); }
    .fa-node-oval.filled { background: #BFDBFE; border-color: #1D4ED8; }

    .fa-node-label {
      font-size: 10px; font-weight: 800; color: var(--node-txt);
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px;
    }
    .fa-node-body {
      font-size: 11px; color: var(--node-txt); line-height: 1.35; word-break: break-word;
    }
    .fa-node-placeholder {
      font-size: 10px; color: #6B8EB3; font-style: italic;
    }
    .fa-node textarea::placeholder,
    .fa-node-oval textarea::placeholder {
      font-size: 9px; color: #6B8EB3; font-style: italic; line-height: 1.3;
    }
    .fa-edit-hint {
      position: absolute; bottom: 5px; right: 7px;
      font-size: 10px; color: #6B8EB3; opacity: 0;
      transition: opacity .15s;
    }
    .fa-node:hover .fa-edit-hint { opacity: 1; }

    /* FNC item: × alleen zichtbaar op hover */
    .fnc-item .fnc-del { opacity: 0; transition: opacity .15s; }
    .fnc-item:hover .fnc-del { opacity: 1; }

    /* SR type badges binnen knoop */
    .fa-sr-chips {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px;
      justify-content: center;
    }
    .fa-sr-chip {
      font-family: 'Courier New', monospace; font-size: 12px; font-weight: 700;
      padding: 3px 8px; border-radius: 5px; border: 1.5px solid currentColor;
      cursor: pointer; background: transparent; color: #4B7BA6;
      transition: all .13s; line-height: 1.2;
    }
    .fa-sr-chip.selected { background: var(--fa); color: #fff; border-color: var(--fa); }
    .fa-sr-chip:active { transform: scale(.93); }

    /* Pijl verticaal gedeelte (van R naar beneden naar Sr-neg) */
    .fa-bottom-section {
      display: flex;
      margin-top: 0;
    }
    .fa-bottom-spacer {
      /* breedte van Sd + pijl — zodat Sr-neg uitlijnt onder R */
      flex-shrink: 0;
    }
    .fa-down-col {
      display: flex; flex-direction: column; align-items: center;
      flex: 1;
    }
    .fa-down-arrow {
      padding: 4px 0;
    }

    /* Sr-neg rechthoek onderaan */
    .fa-srneg-row {
      display: flex;
      align-items: flex-start;
      width: 100%;
    }

    /* Annotatiebalk onderaan canvas */
    .fa-legend {
      margin-top: 14px; border-top: 1px dashed #9DB5CF; padding-top: 10px;
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    }
    .fa-legend-item {
      font-size: 11px; color: #4B7BA6; display: flex; align-items: center; gap: 4px;
    }

    /* ── Stap-kaart (BA-S) ── */
    .step-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 13px; margin-bottom: 4px; position: relative; }
    .step-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--bas); color: #fff; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
    .step-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
    .seq-arr { text-align: center; font-size: 20px; color: var(--bas); padding: 2px 0 6px; }

    /* ── Schema weergave (BA) ── */
    .schema-wrap { background: var(--surface); border-radius: var(--r); box-shadow: var(--sh-md); overflow: hidden; }
    .schema-head { padding: 14px 16px; color: #fff; }
    .schema-head h2 { font-size: 15px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
    .schema-head .sh-meta { font-size: 13px; opacity: .88; margin-top: 3px; }
    .sh-fa  { background: var(--fa); }
    .sh-bas { background: var(--bas); }
    .sh-bar { background: var(--bar); }
    .schema-block { border-bottom: 1px solid var(--border); padding: 13px 15px; }
    .schema-block:last-child { border-bottom: none; }
    .sb-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 9px; }
    .sb-fa  { color: var(--fa); }  .sb-bas { color: var(--bas); }  .sb-bar { color: var(--bar); }
    .sf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .sf > .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); display: block; margin-bottom: 3px; }
    .sf > .val { font-size: 14px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .sf > .val:empty::before { content: '—'; color: var(--muted); }
    .schema-arr { text-align: center; font-size: 20px; padding: 4px 0 2px; }
    .schema-arr.c-bar { color: var(--bar); } .schema-arr.c-bas { color: var(--bas); }
    .schema-foot { padding: 7px 15px; font-size: 11px; text-align: right; }
    .sf-fa  { background: var(--fa-bg);  color: #93C5FD; }
    .sf-bas { background: var(--bas-bg); color: #A78BFA; }
    .sf-bar { background: var(--bar-bg); color: #6EE7B7; }
    .kern-block { border-left: 4px solid var(--bar); }
    .circ-block { background: #F0FDF4; border: 1.5px dashed #16A34A; border-radius: var(--r-sm); padding: 10px 13px; display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: #14532D; }

    /* ════════════════════════════════════════
       FA PRINT STIJL
    ════════════════════════════════════════ */
    .fa-print-wrap { display: none; }

    @media print {
      @page { size: A4 portrait; margin: 1.2cm; }

      /* Verberg alles behalve het diagram */
      .no-print, .app-header { display: none !important; }
      .app-main { padding: 0 !important; margin: 0 !important; }

      /* Canvas een kwart minder breed dan pagina */
      .fa-canvas {
        box-shadow: none !important;
        max-width: 75% !important;
        width: auto !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* Textareas tonen als gewone tekst */
      .fa-canvas textarea {
        display: block !important;
        border: none !important;
        background: transparent !important;
        resize: none !important;
        overflow: visible !important;
        height: auto !important;
        min-height: 0 !important;
      }

      /* Verberg interactieve elementen */
      .fa-canvas select,
      .fa-canvas .fa-edit-hint,
      .fa-canvas .fnc-del { display: none !important; }

      /* HT schema print — landscape A4, schema gecentreerd */
      @page { size: A4 landscape; margin: 0; }

      /* Verberg UI-elementen, maar bewaar de keten app > main > wrap */
      .no-print, .app-header { display: none !important; }
      #app.ht-mode .app-main { padding: 0 !important; }

      /* Wrap vult de hele pagina en centreert het schema */
      .ht-scroll-wrap {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
        box-shadow: none !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        overflow: visible !important;
      }

      /* Reset schermschaal → vaste printschaal zodat het op A4 landscape past */
      .ht-scale-wrap {
        transform: scale(0.76) !important;
        transform-origin: center center !important;
      }

      .ht-canvas {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .ht-info-btn { display: none !important; }

      /* BA canvas print */
      .ba-canvas {
        box-shadow: none !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .ba-canvas textarea {
        display: block !important;
        border: none !important;
        background: transparent !important;
        resize: none !important;
        overflow: visible !important;
        height: auto !important;
        min-height: 0 !important;
      }
    }

    /* ── HT Info knop (verschijnt bij hover op balk) ── */
    .ht-card-hdr { position: relative; }
    .ht-info-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,0.25); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: inherit;
      opacity: 0; transition: opacity .15s;
      line-height: 1; padding: 0;
    }
    .ht-card-hdr:hover .ht-info-btn { opacity: 1; }
    .ht-info-btn:hover { background: rgba(255,255,255,0.4); }

    /* ── HT Info modal ── */
    .ht-info-modal {
      position: fixed; inset: 0; z-index: 20000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(2px);
    }
    .ht-info-sheet {
      background: #fff; border-radius: 12px; max-width: 460px; width: 90%;
      max-height: 80vh; overflow-y: auto; box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    .ht-info-sheet-hdr {
      padding: 14px 16px; border-radius: 12px 12px 0 0;
      font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: space-between;
    }
    .ht-info-sheet-body { padding: 14px 16px; font-size: 13px; line-height: 1.6; color: #2a2a2a; }
    .ht-info-close { background: none; border: none; font-size: 20px; cursor: pointer; color: inherit; line-height: 1; padding: 0 2px; opacity: .7; }
    .ht-info-close:hover { opacity: 1; }

    /* ── HT Fullscreen Preview ── */
    .ht-preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #f0f4f8;
      overflow: auto;
    }
    .ht-preview-overlay.active { display: block; }
    .ht-preview-overlay:fullscreen,
    .ht-preview-overlay:-webkit-full-screen {
      background: #f0f4f8;
      overflow: auto;
    }
    .ht-preview-close {
      position: fixed;
      top: 14px; right: 18px;
      z-index: 10000;
      background: rgba(42,118,162,0.85);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    .ht-preview-close:hover { background: rgba(42,118,162,1); }
  </style>
</head>
<body>
<div id="app">
  <header class="app-header" id="hdr">
    <span id="hdr-back"></span>
    <h1 id="hdr-title">CGT Analyse Tool</h1>
    <span id="hdr-act"></span>
  </header>
  <main class="app-main" id="main"></main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   OPSLAG
══════════════════════════════════════════ */
const KEY   = 'igcgt_v3';
const load  = () => { try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; } };
const dump  = d  => localStorage.setItem(KEY, JSON.stringify(d));
const byId  = id => load().find(a => a.id === id);
const upsert = item => {
  const all = load();
  const i = all.findIndex(a => a.id === item.id);
  if (i >= 0) all[i] = item; else all.unshift(item);
  dump(all);
};
const remove = id => dump(load().filter(a => a.id !== id));
const uid    = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today  = () => new Date().toISOString().slice(0,10);

/* Groepering: pending groupId bij aanmaken via + knop */
let _pendingGroup = null;

/* ─────────────────────────────────────────
   Kleurthema's
───────────────────────────────────────── */
const THEMES = {
  blauw: { label:'Blauw',  swatch:'#2A76A2',
    ba:{ blu:'#2A76A2', lblu:'#DDEAF7', grn:'#2A76A2', lgrn:'#EBF5FB' },
    fa:{ dot:'#7A99B0', bg:'#E8EEF5' },
    ht:{ p:'#2A76A2', pl:'#CDDEEA', s:'#83B1C0' } },
  groen: { label:'Groen',  swatch:'#2A7A4A',
    ba:{ blu:'#2A7A4A', lblu:'#D4EEE0', grn:'#2A7A4A', lgrn:'#E8F7F0' },
    fa:{ dot:'#5A8A6A', bg:'#E8F5EE' },
    ht:{ p:'#2A7A4A', pl:'#C8E8D8', s:'#6AAB80' } },
  paars: { label:'Paars',  swatch:'#6B3FA0',
    ba:{ blu:'#6B3FA0', lblu:'#EDE0F8', grn:'#6B3FA0', lgrn:'#F5EEFF' },
    fa:{ dot:'#8A70B8', bg:'#F0EAF8' },
    ht:{ p:'#6B3FA0', pl:'#DDD0F0', s:'#9A70C8' } },
  warm:  { label:'Warm',   swatch:'#B85C38',
    ba:{ blu:'#B85C38', lblu:'#FAE5DC', grn:'#B85C38', lgrn:'#FDF2EE' },
    fa:{ dot:'#C07050', bg:'#F8EDE8' },
    ht:{ p:'#B85C38', pl:'#F0D8CC', s:'#D4906A' } },
  amber: { label:'Amber',  swatch:'#A07830',
    ba:{ blu:'#A07830', lblu:'#FAF0D0', grn:'#A07830', lgrn:'#FDF8EC' },
    fa:{ dot:'#B89048', bg:'#F8F4E0' },
    ht:{ p:'#A07830', pl:'#EEE0B8', s:'#C8A850' } },
  grijs: { label:'Grijs',  swatch:'#5A6070',
    ba:{ blu:'#5A6070', lblu:'#E4E8EC', grn:'#5A6070', lgrn:'#F0F2F4' },
    fa:{ dot:'#7A808A', bg:'#EEEEEE' },
    ht:{ p:'#5A6070', pl:'#D0D4D8', s:'#8A9098' } },
};
const THEME_IDS = Object.keys(THEMES);

function mkThemePicker(d, onPick) {
  const row = document.createElement('div');
  row.className = 'no-print';
  row.style.cssText = 'display:flex;align-items:center;gap:5px;padding:6px 14px;border-bottom:1px solid #eee;background:#fafafa;flex-wrap:wrap;';
  const lbl = document.createElement('span');
  lbl.textContent = 'Kleur:';
  lbl.style.cssText = 'font-size:11px;color:#999;flex-shrink:0;';
  row.appendChild(lbl);
  THEME_IDS.forEach(id => {
    const t = THEMES[id];
    const btn = document.createElement('button');
    const active = (d.theme || 'blauw') === id;
    btn.title = t.label;
    btn.style.cssText = `width:18px;height:18px;border-radius:50%;background:${t.swatch};border:${active ? '2.5px solid #333' : '2px solid transparent'};cursor:pointer;flex-shrink:0;outline:2px solid ${active ? t.swatch : 'transparent'};outline-offset:1px;`;
    btn.addEventListener('click', () => { onPick(id); });
    row.appendChild(btn);
  });
  return row;
}

/* ══════════════════════════════════════════
   ROUTER
══════════════════════════════════════════ */
const go = path => { location.hash = path; };
window.addEventListener('hashchange', render);

function route() {
  const h = location.hash.slice(1) || '/';
  const p = h.split('/').filter(Boolean);
  return { seg: p[0] || 'home', p1: p[1] };
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
const toast = (msg, ms=2000) => {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
};

/* ══════════════════════════════════════════
   HTML ESCAPING
══════════════════════════════════════════ */
const esc   = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const escBr = s => esc(s).replace(/\n/g,'<br>');

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function render() {
  const { seg, p1 } = route();
  const main = document.getElementById('main');
  document.getElementById('hdr-back').innerHTML = '';
  document.getElementById('hdr-act').innerHTML  = '';
  main.innerHTML = ''; main.className = 'app-main page';
  document.querySelectorAll('.fab').forEach(f => f.remove());

  const setTitle = t => document.getElementById('hdr-title').textContent = t;
  const backBtn  = path => {
    const b = document.createElement('button');
    b.className = 'back-btn no-print'; b.textContent = '‹';
    b.onclick = () => go(path);
    document.getElementById('hdr-back').appendChild(b);
  };

  switch (seg) {
    case 'home':  setTitle('CGT Analyse Tool'); pgHome(main); break;
    case 'fa':    setTitle(p1==='new'?'Nieuwe FA':'FA'); backBtn('/'); pgFA(main, p1); break;
    case 'ba':    setTitle(p1==='new'?'Nieuwe BA':'BA'); backBtn('/'); pgBA(main, p1); break;
    case 'ht':    setTitle(p1==='new'?'Nieuwe HT':'HT'); backBtn('/'); pgHT(main, p1); break;
    default:      main.innerHTML = '<p style="padding:20px">Pagina niet gevonden.</p>';
  }
}

/* ══════════════════════════════════════════
   HOME
══════════════════════════════════════════ */
function pgHome(c) {
  // Titel/subtitel
  const hero = document.createElement('div');
  hero.style.cssText = 'text-align:center;padding:28px 16px 20px';
  hero.innerHTML = `
    <div style="font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--cgt-blue);margin-bottom:6px">Geïntegreerde CGT</div>
    <h2 style="font-size:22px;font-weight:800;color:var(--txt);margin-bottom:6px">CGT Analyse Tool</h2>
    <p style="font-size:13px;color:var(--muted)">Kies een analyse om te starten of door te gaan</p>`;
  c.appendChild(hero);

  // Drie analyse-kaarten
  const tools = [
    { key:'FA', label:'Functieanalyse', sub:'Sd → R → Sr-pos / FNC', color:'var(--cgt-blue)', icon:'🔍', path:'/fa/new' },
    { key:'BA', label:'Betekenisanalyse', sub:'Gedachten · Emoties · Gedrag', color:'var(--cgt-blue)', icon:'💬', path:'/ba/new' },
    { key:'HT', label:'Holistische Theorie', sub:'Kernschema & levenspatronen', color:'var(--cgt-blue)', icon:'🗺', path:'/ht/new' },
  ];
  const grid = document.createElement('div');
  grid.style.cssText = 'display:flex;flex-direction:column;gap:10px;margin-bottom:24px';
  tools.forEach(t => {
    const btn = document.createElement('button');
    btn.style.cssText = `
      display:flex;align-items:center;gap:14px;width:100%;
      background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
      padding:16px 18px;cursor:pointer;text-align:left;
      box-shadow:0 2px 6px rgba(0,0,0,.06);transition:box-shadow .15s,border-color .15s;
    `;
    btn.onmouseover = () => { btn.style.boxShadow='0 4px 14px rgba(74,110,138,.18)'; btn.style.borderColor='var(--cgt-blue)'; };
    btn.onmouseout  = () => { btn.style.boxShadow='0 2px 6px rgba(0,0,0,.06)'; btn.style.borderColor='var(--border)'; };
    btn.innerHTML = `
      <div style="width:44px;height:44px;border-radius:10px;background:var(--cgt-blue);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${t.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:16px;font-weight:700;color:var(--txt);margin-bottom:2px">${t.label}</div>
        <div style="font-size:12px;color:var(--muted)">${t.sub}</div>
      </div>
      <span style="font-size:20px;color:var(--muted)">›</span>`;
    btn.onclick = () => go(t.path);
    grid.appendChild(btn);
  });
  c.appendChild(grid);

  // Recente analyses
  const all = load();
  if (all.length) {
    const secLbl = document.createElement('div');
    secLbl.style.cssText = 'font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding:0 2px';
    secLbl.textContent = 'Recente analyses';
    c.appendChild(secLbl);
    const card = document.createElement('div');
    card.className = 'card';
    all.slice().reverse().forEach(item => {
      const el = document.createElement('div'); el.className = 'list-item';
      const route = item.type === 'FA' ? 'fa' : item.type === 'BA' ? 'ba' : 'ht';
      el.onclick = () => go(`/${route}/${item.id}`);
      const meta = [item.client, item.date].filter(Boolean).join(' · ');
      el.innerHTML = `
        <div class="badge badge-fa">${item.type}</div>
        <div class="item-info">
          <div class="item-title">${esc(item.title||'(Geen titel)')}</div>
          <div class="item-meta">${esc(meta)}</div>
        </div>
        <span style="color:var(--muted);font-size:20px">›</span>`;
      card.appendChild(el);
    });
    c.appendChild(card);
  }
}


/* ══════════════════════════════════════════
   UITKLAPMODAL
══════════════════════════════════════════ */
function openExpand(labelTxt, helpTxt, currentVal, onSave) {
  const ov = document.createElement('div');
  ov.className = 'expand-overlay';
  ov.innerHTML = `<div class="expand-sheet">
    <div class="expand-handle"></div>
    <div class="expand-lbl">${esc(labelTxt)}</div>
    ${helpTxt ? `<div class="expand-meta">${esc(helpTxt)}</div>` : ''}
    <textarea class="expand-ta" placeholder="Typ hier…">${esc(currentVal)}</textarea>
    <div class="expand-btns">
      <button type="button" class="btn btn-ghost btn-sm" id="exp-cancel" style="flex:1">Annuleer</button>
      <button type="button" class="btn btn-fa btn-sm" id="exp-save" style="flex:2">✓ Opslaan</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const ta = ov.querySelector('.expand-ta');
  setTimeout(() => { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }, 80);
  const close = () => ov.remove();
  ov.querySelector('#exp-cancel').onclick = close;
  ov.addEventListener('click', e => { if (e.target === ov) close(); });
  ov.querySelector('#exp-save').onclick = () => { onSave(ta.value.trim()); close(); };
}

/* ══════════════════════════════════════════
   FA — VISUEEL DIAGRAM (bewerken + bekijken in één)
══════════════════════════════════════════ */

const SR_POS_TYPES = [
  { val:'+s+', label:'+S+', color:'#16A34A', title:'Positieve versterker: positief stimulus toegevoegd' },
  { val:'-s-', label:'−S−', color:'#1D4ED8', title:'Negatieve versterker: negatief stimulus weggenomen' },
  { val:'~s-', label:'~S−', color:'#7C3AED', title:'Ambivalente versterker: ambivalent stimulus weggenomen' },
];
const SR_NEG_TYPES = [
  { val:'-s+', label:'−S+', color:'#DC2626', title:'Positieve straf: negatief stimulus toegevoegd' },
  { val:'+s-', label:'+S−', color:'#EA580C', title:'Negatieve straf: positief stimulus weggenomen' },
  { val:'~s+', label:'~S+', color:'#0891B2', title:'Ambivalente straf: ambivalent stimulus toegevoegd' },
];
const ALL_SR = [...SR_POS_TYPES, ...SR_NEG_TYPES];

function srColor(val) {
  const f = ALL_SR.find(x => x.val === val);
  return f ? f.color : '#64748B';
}
function srLabel(val) {
  const f = ALL_SR.find(x => x.val === val);
  return f ? f.label : val;
}
function srClass(val) {
  if (!val) return '';
  if (val.startsWith('+')) return 'pos';
  if (val.startsWith('-')) return 'neg';
  return 'amb';
}

function pgFA(c, id) {
  const isNew = id === 'new';
  const newId = uid();
  let d = isNew ? {
    id: newId, type: 'FA', title:'', client:'', date: today(),
    groupId: _pendingGroup || newId,
    theme: 'blauw',
    sd:'', r:'', fnc:'',
    srPosTxt:'', srPosType:'',
    srNegTxt:'', srNegType:'',
    notities:''
  } : byId(id);
  _pendingGroup = null;

  if (!d) { c.innerHTML = '<p style="padding:20px">Niet gevonden.</p>'; return; }
  if (!d.groupId) { d.groupId = d.id; upsert(d); } // migratie

  let saveTimer = null;
  function save(extra) {
    d = { ...d, ...extra };
    upsert(d);
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => toast('Automatisch opgeslagen ✓'), 1200);
  }

  function redraw() {
    c.innerHTML = '';
    buildFA(c, d, save);
  }

  redraw();
}

function buildFA(c, d, save) {
  /* ── Actiebalk ── */
  const bar = document.createElement('div');
  bar.className = 'action-bar no-print';

  const btnPrint = mkBtn('btn-ghost btn-sm', '🖨 Print', () => window.print());

  const btnClip = mkBtn('btn-ghost btn-sm', '📋 Kopieer', () => {
    const canvas = c.querySelector('.fa-canvas');
    if (!canvas) return;
    toast('Bezig met kopiëren…', 1500);
    html2canvas(canvas, { backgroundColor: THEMES[d.theme||'blauw'].fa.bg, scale: 2, useCORS: true }).then(cvs => {
      cvs.toBlob(blob => {
        navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
          .then(() => toast('Gekopieerd naar klembord ✓'))
          .catch(() => {
            // Fallback: open in nieuw venster
            const url = cvs.toDataURL();
            const w = window.open();
            w.document.write(`<img src="${url}" style="max-width:100%">`);
            toast('Afbeelding geopend — sla op en plak handmatig', 4000);
          });
      });
    });
  });

  const btnDel = mkBtn('btn-ghost btn-sm', '🗑', () => {
    if (confirm('Verwijder deze FA?')) { remove(d.id); go('/'); }
  });
  btnDel.style.color = 'var(--danger)';
  bar.append(btnPrint, btnClip, btnDel);
  c.appendChild(bar);

  /* ── Titelregel ── */
  c.appendChild(mkTitleRow(d, save, 'FA'));

  /* ── Themakiezer ── */
  c.appendChild(mkThemePicker(d, id => { save({ theme: id }); redraw(); }));

  /* ══════════════════════════
     INTERACTIEF DIAGRAM
  ══════════════════════════ */
  const faTheme = THEMES[d.theme || 'blauw'].fa;
  const canvas = document.createElement('div');
  canvas.className = 'fa-canvas fa-interactive';
  canvas.style.background = faTheme.bg;


  /*
   * Grid: 5 kolommen
   * [Sd] [dots] [R (span 2 rijen)] [blokpijl rij1 / blokpijl rij2] [Sr-pos-repr / FNC]
   */
  const diag = document.createElement('div');
  diag.style.cssText = `
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr;
    grid-template-rows: auto auto;
    gap: 6px;
    align-items: stretch;
  `;

  /* ── Sd (rij 1, kolom 1) ── */
  const nodeSd = makeInlineNode('Sd', 'Context waarbinnen het probleemgedrag plaatsvindt', d.sd || '', v => save({ sd: v }));
  nodeSd.style.gridArea = '1 / 1 / 2 / 2';

  /* ── Dots (rij 1, kolom 2) gecentreerd ── */
  const dotsEl = document.createElement('div');
  dotsEl.style.cssText = 'grid-area:1/2/2/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:0 5px';
  dotsEl.innerHTML = `
    <div style="width:6px;height:6px;border-radius:50%;background:${faTheme.dot}"></div>
    <div style="width:6px;height:6px;border-radius:50%;background:${faTheme.dot}"></div>`;

  /* ── R (rij 1, kolom 3) — zelfde grootte als Sd ── */
  const nodeR = makeInlineNode('R', 'Problematisch gedrag', d.r || '', v => save({ r: v }));
  nodeR.style.gridArea = '1 / 3 / 2 / 4';

  /* ── Pijl (slank, zelfde kleur als puntjes) ── */
  function blokPijl(gridArea) {
    const el = document.createElement('div');
    el.style.cssText = `
      grid-area: ${gridArea};
      background: ${faTheme.dot};
      clip-path: polygon(0% 35%, 68% 35%, 68% 18%, 100% 50%, 68% 82%, 68% 65%, 0% 65%);
      width: 26px;
      align-self: center;
      height: 12px;
      flex-shrink: 0;
    `;
    return el;
  }

  const bpArr1 = blokPijl('1 / 4 / 2 / 5');
  const bpArr2 = blokPijl('2 / 4 / 3 / 5');

  /* ── Sr-pos-repr ovaal (rij 1, kolom 5) ── */
  const nodeSrPos = makeSrNode('oval', 'Sr-pos-repr:', d.srPosTxt, d.srPosType, SR_POS_TYPES, save, 'srPos');
  nodeSrPos.style.gridArea = '1 / 5 / 2 / 6';

  /* ── FNC rechthoek met meerdere items (rij 2, kolom 5) ── */
  // Migreer oud formaat → nieuw
  if (!d.srNegItems) {
    d.srNegItems = (d.srNegTxt || d.srNegType)
      ? [{ type: d.srNegType || '', txt: d.srNegTxt || '' }]
      : [{ type: '', txt: '' }];
  }
  const nodeSrNeg = makeFncNode(d.srNegItems, save, faTheme.dot);
  nodeSrNeg.style.gridArea = '2 / 5 / 3 / 6';

  diag.append(nodeSd, dotsEl, nodeR, bpArr1, nodeSrPos, bpArr2, nodeSrNeg);
  canvas.appendChild(diag);
  c.appendChild(canvas);

  /* Groepbalk */
  buildGroupBar(c, d);

  /* Zorg dat FNC minstens even hoog is als R */
  requestAnimationFrame(() => {
    const h = nodeR.offsetHeight;
    if (h > 0) nodeSrNeg.style.minHeight = h + 'px';
  });
}

/* ── Gedeelde textarea-helper voor inline bewerking ── */
function makeTa(val, placeholder, onChange) {
  const ta = document.createElement('textarea');
  ta.value = val || '';
  ta.placeholder = placeholder;
  ta.style.cssText = `
    flex:1; min-width:0; width:100%; box-sizing:border-box;
    resize:none; border:none; outline:none; background:transparent;
    font:inherit; font-size:11px; color:inherit; padding:0; margin:0;
    min-height:24px; cursor:text; line-height:1.35; overflow:hidden;
  `;
  /* Automatisch hoogte aanpassen */
  function autosize() {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  }
  ta.addEventListener('input', () => { autosize(); onChange(ta.value); });
  ta.addEventListener('click', e => e.stopPropagation());
  requestAnimationFrame(autosize);
  return ta;
}

/* ── Inline bewerkbare knoop (Sd, R) ── */
function makeInlineNode(labelTxt, placeholderTxt, initialVal, onSave) {
  const el = document.createElement('div');
  el.className = 'fa-node';
  if (initialVal) el.classList.add('filled');

  const lbl = document.createElement('div');
  lbl.className = 'fa-node-label';
  lbl.textContent = labelTxt;

  const ta = document.createElement('textarea');
  ta.value = initialVal;
  ta.placeholder = placeholderTxt;
  ta.style.cssText = `
    width:100%; box-sizing:border-box; resize:none; border:none; outline:none;
    background:transparent; font:inherit; font-size:11px; color:inherit;
    padding:0; margin:0; min-height:36px; cursor:text; line-height:1.35;
  `;
  ta.addEventListener('input', () => {
    el.classList.toggle('filled', ta.value.length > 0);
    onSave(ta.value);
  });
  ta.addEventListener('click', e => e.stopPropagation());

  el.append(lbl, ta);
  return el;
}

/* ── Knoop-builder (niet-interactief, voor andere plekken) ── */
function makeNode(shape, labelTxt, placeholderTxt, bodyTxt, wide) {
  const el = document.createElement('div');
  el.className = shape === 'oval' ? 'fa-node-oval' : 'fa-node';
  if (bodyTxt) el.classList.add('filled');
  el.innerHTML = `
    <div class="fa-node-label">${esc(labelTxt)}</div>
    <div class="fa-node-body">${bodyTxt
      ? `<span class="fa-node-text">${esc(bodyTxt)}</span>`
      : `<span class="fa-node-placeholder">${esc(placeholderTxt)}</span>`}
    </div>
    <span class="fa-edit-hint">✏️ tikken</span>`;
  return el;
}

/* ── SR-knoop (Sr-pos-repr): badge na keuze, dropdown verdwijnt ── */
function makeSrNode(shape, labelTxt, bodyTxt, selectedType, types, save, prefix) {
  const el = document.createElement('div');
  el.className = shape === 'oval' ? 'fa-node-oval' : 'fa-node';
  if (bodyTxt || selectedType) el.classList.add('filled');

  const lbl = document.createElement('div');
  lbl.className = 'fa-node-label';
  lbl.textContent = labelTxt;
  el.appendChild(lbl);

  /* Container die dropdown OF badge+tekst toont */
  const body = document.createElement('div');
  body.style.cssText = 'width:100%';
  el.appendChild(body);

  const hint = document.createElement('span');
  hint.className = 'fa-edit-hint';
  hint.textContent = '✏️ tikken';
  el.appendChild(hint);

  function render() {
    body.innerHTML = '';
    const t = types.find(x => x.val === selectedType);

    function makePosSel(current) {
      const sel = document.createElement('select');
      sel.style.cssText = `
        font-family:'Courier New',monospace; font-size:11px; font-weight:700;
        padding:1px 1px; border-radius:4px; border:1.5px solid #93C5FD;
        background:#fff; color:#1D4ED8; cursor:pointer; width:35px;
        -webkit-appearance:auto; appearance:auto;
      `;
      const emptyOpt = document.createElement('option');
      emptyOpt.value = ''; emptyOpt.textContent = '—';
      sel.appendChild(emptyOpt);
      types.forEach(tp => {
        const opt = document.createElement('option');
        opt.value = tp.val; opt.textContent = tp.label;
        sel.appendChild(opt);
      });
      sel.addEventListener('click', e => e.stopPropagation());
      return sel;
    }

    if (!selectedType) {
      /* ── Nog geen type gekozen: compact dropdown + textarea ── */
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:baseline;gap:6px';
      const sel = makePosSel('');
      sel.addEventListener('change', e => {
        e.stopPropagation();
        selectedType = e.target.value;
        bodyTxt = ta.value;
        if (bodyTxt || selectedType) el.classList.add('filled');
        const upd = {}; upd[prefix + 'Type'] = selectedType; save(upd);
        render();
      });
      const ta = makeTa(bodyTxt, 'Positieve versterker / consequentie', v => {
        bodyTxt = v;
        if (bodyTxt || selectedType) el.classList.add('filled');
        const upd = {}; upd[prefix + 'Txt'] = v; save(upd);
      });
      row.append(sel, ta);
      body.appendChild(row);

    } else {
      /* ── Type gekozen: blauwe badge vóór inline textarea ── */
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:baseline;gap:6px';

      const badge = document.createElement('span');
      badge.title = 'Klik om type te wijzigen';
      badge.style.cssText = `
        font-family:'Courier New',monospace; font-weight:700; font-size:12px;
        color:#1D4ED8; flex-shrink:0; cursor:pointer; line-height:1.35;
      `;
      badge.textContent = t.label;
      badge.addEventListener('click', e => {
        e.stopPropagation();
        const sel = makePosSel(selectedType);
        sel.addEventListener('change', e2 => {
          e2.stopPropagation();
          selectedType = e2.target.value;
          if (bodyTxt || selectedType) el.classList.add('filled');
          const upd = {}; upd[prefix + 'Type'] = selectedType; save(upd);
          render();
        });
        badge.replaceWith(sel);
        sel.focus();
      });

      const ta = makeTa(bodyTxt, 'Positieve versterker / consequentie', v => {
        bodyTxt = v;
        if (bodyTxt || selectedType) el.classList.add('filled');
        const upd = {}; upd[prefix + 'Txt'] = v; save(upd);
      });

      row.append(badge, ta);
      body.appendChild(row);
    }
  }

  render();
  return el;
}


/* ── FNC node: meerdere items, elk met type-prefix + omschrijving ── */
function makeFncNode(items, save, accentColor) {
  accentColor = accentColor || '#9B7B7B';
  const el = document.createElement('div');
  el.className = 'fa-node';
  if (items.some(i => i.txt || i.type)) el.classList.add('filled');

  const lbl = document.createElement('div');
  lbl.className = 'fa-node-label';
  lbl.textContent = 'FNC:';
  el.appendChild(lbl);

  const list = document.createElement('div');
  list.style.cssText = 'display:flex;flex-direction:column;gap:2px;width:100%';
  el.appendChild(list);

  function saveItems() {
    if (items.some(i => i.txt || i.type)) el.classList.add('filled');
    save({ srNegItems: items.map(i => ({ type: i.type, txt: i.txt })) });
  }

  function makeCompactSel(currentVal, onChange) {
    const sel = document.createElement('select');
    sel.style.cssText = `
      font-family:'Courier New',monospace; font-size:11px; font-weight:700;
      padding:1px 1px; border-radius:4px; border:1.5px solid #FCA5A5;
      background:#fff; color:#DC2626; cursor:pointer; width:35px;
      -webkit-appearance:auto; appearance:auto;
    `;
    const emptyOpt = document.createElement('option');
    emptyOpt.value = ''; emptyOpt.textContent = '—';
    sel.appendChild(emptyOpt);
    SR_NEG_TYPES.forEach(tp => {
      const opt = document.createElement('option');
      opt.value = tp.val; opt.textContent = tp.label;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', e => { e.stopPropagation(); onChange(e.target.value); });
    sel.addEventListener('click', e => e.stopPropagation());
    return sel;
  }

  function renderItems() {
    list.innerHTML = '';
    items.forEach((item, idx) => {
      const itemWrap = document.createElement('div');
      itemWrap.className = 'fnc-item';
      itemWrap.style.cssText = 'display:flex;align-items:flex-start;gap:4px;width:100%;position:relative';

      const t = SR_NEG_TYPES.find(x => x.val === item.type);

      /* Verwijder knop — alleen zichtbaar op hover via CSS */
      const del = document.createElement('button');
      del.textContent = '×';
      del.className = 'fnc-del';
      del.title = 'Verwijder';
      del.style.cssText = `
        background:none;border:none;color:#DC2626;font-size:14px;cursor:pointer;
        padding:0 1px;line-height:1;flex-shrink:0;margin-left:auto;align-self:flex-start;padding-top:2px;
      `;
      del.addEventListener('click', e => {
        e.stopPropagation();
        if (items.length > 1) { items.splice(idx, 1); }
        else { items[0] = { type: '', txt: '' }; }
        saveItems(); renderItems();
      });

      if (!item.type) {
        /* ── Nog geen type: compact dropdown inline + textarea ── */
        const sel = makeCompactSel('', val => {
          item.type = val;
          item.txt = ta.value;
          saveItems(); renderItems();
        });

        const ta = makeTa(item.txt, 'tikken om in te vullen…', v => {
          item.txt = v; saveItems();
        });

        itemWrap.append(sel, ta, del);
        list.appendChild(itemWrap);

      } else {
        /* ── Type gekozen: rode badge vóór inline textarea ── */
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:baseline;gap:4px;flex:1;min-width:0';

        /* Badge — klikken vervangt door compacte select op dezelfde plek */
        const badge = document.createElement('span');
        badge.title = 'Klik om type te wijzigen';
        badge.style.cssText = `
          font-family:'Courier New',monospace; font-weight:700; font-size:12px;
          color:#DC2626; flex-shrink:0; cursor:pointer; line-height:1.35;
        `;
        badge.textContent = t.label;
        badge.addEventListener('click', e => {
          e.stopPropagation();
          const sel = makeCompactSel(item.type, val => {
            item.type = val;
            saveItems(); renderItems();
          });
          badge.replaceWith(sel);
          sel.focus();
        });

        const ta = makeTa(item.txt, 'tikken om in te vullen…', v => {
          item.txt = v; saveItems();
        });

        row.append(badge, ta);
        itemWrap.append(row, del);
        list.appendChild(itemWrap);
      }
    });

    /* Voeg toe knop */
    const addBtn = document.createElement('button');
    addBtn.textContent = '+ voeg toe';
    addBtn.className = 'fa-edit-hint';
    addBtn.style.cssText = `
      background:none;border:1px dashed ${accentColor};border-radius:4px;
      color:${accentColor};font-size:11px;cursor:pointer;padding:2px 6px;
      margin-top:2px;align-self:flex-start;
    `;
    addBtn.addEventListener('click', e => {
      e.stopPropagation();
      items.push({ type: '', txt: '' });
      saveItems();
      renderItems();
    });
    list.appendChild(addBtn);
  }

  renderItems();
  return el;
}


/* ── Mailen via mailto ── */
function mailFA(d) {
  const srPosLbl = d.srPosType ? ` [${srLabel(d.srPosType)}]` : '';
  const fncLines = (d.srNegItems || []).filter(i => i.txt || i.type)
    .map(i => `  ${i.type ? '[' + srLabel(i.type) + '] ' : ''}${i.txt || ''}`)
    .join('\n') || '  (niet ingevuld)';

  const body = [
    'FUNCTIEANALYSE — IGCGT',
    '',
    'Sd (Discriminatieve stimulus):',
    d.sd || '(niet ingevuld)',
    '',
    'R (Respons / probleemgedrag):',
    d.r || '(niet ingevuld)',
    '',
    `Sr-pos-repr (Positieve consequentie)${srPosLbl}:`,
    d.srPosTxt || '(niet ingevuld)',
    '',
    'FNC (Feitelijke negatieve consequenties):',
    fncLines,
    d.notities ? `\nNotities:\n${d.notities}` : '',
    '',
    '---',
    'Geïntegreerde Cognitieve Gedragstherapie — Te Broeke, Korrelboom & Van Dijk (2024)',
  ].join('\n');

  const subject = encodeURIComponent('Functieanalyse IGCGT');
  window.location.href = `mailto:?subject=${subject}&body=${encodeURIComponent(body)}`;
}

/* Data model v2:
   centralType : 'usur' | 'kernthema' | 'archief'
     'usur'     – gewone US/UR-repr ovaal
     'kernthema'– ovaal met "van een kernthema" label
     'archief'  – de ovaal ZÉlf is een archief (type 2b), extra ovaaltjes boven
   centralText        – tekst in de ovaal (usur / kernthema)
   centralArchiefLabel– label in archief-ovaal
   extraOvals  [{id,text}] – boven de archief-ovaal (type 2b bewijzen)
   zweefArchieven [{id,label}] – zwevende archieven bóven de centrale ovaal (max 2)
*/
function pgBA(c, id) {
  const isNew = id === 'new';

  /* Standaard leeg schema */
  const _newId = uid();
  const defaultD = {
    id: _newId, type: 'BA', title: '', client: '', date: today(),
    groupId: _pendingGroup || _newId,
    theme: 'blauw',
    showOs: false, os: '',
    cs: '',
    assocType: 'referentieel',
    centralType: 'usur',
    centralText: '',
    centralArchiefLabel: '',
    extraOvals: [],
    zweefArchieven: [],
    showRepr: false,
    reprStimulus: '', reprResponse: '', reprBetekenis: '',
    cr: ''
  };
  _pendingGroup = null;

  let raw = isNew ? null : byId(id);

  /* Migratie v1 → v2 */
  let d;
  if (!raw) {
    d = defaultD;
  } else if (raw.centralType !== undefined) {
    d = raw.groupId ? raw : { ...raw, groupId: raw.id }; // v2, voeg groupId toe indien ontbrekend
  } else {
    // v1 had showArchief / showKernthema / mainText / archiefLabel / kernthemaText
    d = {
      ...defaultD, ...raw,
      centralType: raw.showArchief ? (raw.showKernthema ? 'kernthema' : 'archief') : 'usur',
      centralText: raw.showKernthema ? (raw.kernthemaText || '') : (raw.mainText || ''),
      centralArchiefLabel: raw.archiefLabel || '',
      extraOvals: raw.extraOvals || [],
      zweefArchieven: (raw.showArchief && raw.showKernthema && raw.archiefLabel)
        ? [{ id: uid(), label: raw.archiefLabel }] : [],
    };
  }

  if (!d) { c.innerHTML = '<p style="padding:20px">Niet gevonden.</p>'; return; }

  let saveTimer = null;
  function save(extra) {
    if (extra) d = { ...d, ...extra };
    upsert(d);
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => toast('Automatisch opgeslagen ✓'), 1200);
  }

  /* ── Actiebalk ── */
  const bar = document.createElement('div');
  bar.className = 'action-bar no-print';
  const btnPrint = mkBtn('btn-ghost btn-sm', '🖨 Print', () => window.print());
  const btnClip  = mkBtn('btn-ghost btn-sm', '📋 Kopieer', () => {
    const cnv = c.querySelector('.ba-canvas');
    if (!cnv) return;
    toast('Bezig met kopiëren…', 1500);
    html2canvas(cnv, { backgroundColor: '#fff', scale: 2, useCORS: true }).then(cv => {
      cv.toBlob(bl => {
        navigator.clipboard.write([new ClipboardItem({ 'image/png': bl })])
          .then(() => toast('Gekopieerd naar klembord ✓'))
          .catch(() => { const u = cv.toDataURL(); const w = window.open(); w.document.write(`<img src="${u}" style="max-width:100%">`); });
      });
    });
  });
  const btnDel = mkBtn('btn-ghost btn-sm', '🗑', () => {
    if (confirm('Verwijder deze BA?')) { remove(d.id); go('/'); }
  });
  btnDel.style.color = 'var(--danger)';
  bar.append(btnPrint, btnClip, btnDel);
  c.appendChild(bar);

  /* ── Titelregel ── */
  c.appendChild(mkTitleRow(d, save, 'BA'));

  /* ── Themakiezer ── */
  const themeRow = document.createElement('div');
  c.appendChild(themeRow);

  /* ── Schema-instellingenbalk ── */
  const cfgBar = document.createElement('div');
  cfgBar.className = 'no-print';
  c.appendChild(cfgBar);

  /* ── Canvas-wrapper ── */
  const wrap = document.createElement('div');
  wrap.style.cssText = 'padding:20px 24px;overflow:auto;';
  c.appendChild(wrap);

  const groupBar = document.createElement('div');
  c.appendChild(groupBar);

  function redraw() {
    themeRow.innerHTML = '';
    themeRow.appendChild(mkThemePicker(d, id => { save({ theme: id }); redraw(); }));
    buildBACfgBar(cfgBar, d, save, redraw);
    wrap.innerHTML = '';
    buildBACanvas(wrap, d, save, redraw);
    groupBar.innerHTML = '';
    buildGroupBar(groupBar, d);
  }
  redraw();
}

/* ── Instellingenbalk voor BA v2 ── */
function buildBACfgBar(bar, d, save, redraw) {
  bar.innerHTML = '';
  bar.style.cssText = 'display:flex;gap:5px;flex-wrap:wrap;padding:7px 14px;align-items:center;background:#f7faf6;border-bottom:1px solid #dde8d8;font-size:11px;';

  const tog = (lbl, active, fn) => {
    const b = document.createElement('button');
    b.textContent = lbl;
    b.style.cssText = `font-size:11px;padding:2px 10px;border-radius:20px;border:1.5px solid var(--cgt-blue);cursor:pointer;transition:all .15s;background:${active?'var(--cgt-blue)':'transparent'};color:${active?'#fff':'var(--cgt-blue)'};`;
    b.addEventListener('click', fn); return b;
  };
  const rad = (lbl, active, fn) => {
    const b = document.createElement('button');
    b.textContent = lbl;
    b.style.cssText = `font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid ${active?'var(--cgt-blue)':'#ccc'};cursor:pointer;background:${active?'var(--cgt-blue)':'#fff'};color:${active?'#fff':'#555'};`;
    b.addEventListener('click', fn); return b;
  };
  const sep = () => Object.assign(document.createElement('span'), {textContent:'|',style:'color:#ccc;padding:0 2px;'});
  const lbl = t => Object.assign(document.createElement('span'), {textContent:t,style:'color:#777;'});
  const addBtn = (label, fn) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.style.cssText = 'font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--cgt-blue);cursor:pointer;background:#fff;color:var(--cgt-blue);';
    b.addEventListener('click', fn); return b;
  };

  bar.append(
    tog(d.showOs ? '✓ OS' : '+ OS', d.showOs, () => { save({showOs:!d.showOs}); redraw(); }),
    sep(),
    lbl('Associatie:'),
    rad('referentieel', d.assocType==='referentieel', () => { save({assocType:'referentieel'}); redraw(); }),
    rad('sequentieel',  d.assocType==='sequentieel',  () => { save({assocType:'sequentieel'});  redraw(); }),
    rad('identiteit',   d.assocType==='identiteit',   () => { save({assocType:'identiteit'});   redraw(); }),
    sep(),
    lbl('Centrale ovaal:'),
    rad('US/UR-repr',    d.centralType==='usur',      () => { save({centralType:'usur'});      redraw(); }),
    rad('Kernthema',     d.centralType==='kernthema', () => { save({centralType:'kernthema'}); redraw(); }),
    rad('Archief-ovaal', d.centralType==='archief',   () => { save({centralType:'archief'});   redraw(); }),
    sep()
  );

  if (d.centralType === 'archief') {
    bar.append(addBtn('+ ovaaltje', () => {
      d.extraOvals = [...(d.extraOvals||[]), {id:uid(), text:''}];
      save(); redraw();
    }));
  } else {
    const nz = (d.zweefArchieven||[]).length;
    if (nz < 2) {
      bar.append(addBtn('+ zweefarchief', () => {
        d.zweefArchieven = [...(d.zweefArchieven||[]), {id:uid(), label:''}];
        save(); redraw();
      }));
    }
  }

  bar.append(
    sep(),
    tog(d.showRepr ? '✓ Repr.niveaus' : '+ Repr.niveaus', d.showRepr, () => { save({showRepr:!d.showRepr}); redraw(); })
  );
}

/* ── Canvas renderfunctie v2 ── */
function buildBACanvas(container, d, save, redraw) {
  const th = THEMES[d.theme || 'blauw'].ba;
  const BLU = th.blu, LBLU = th.lblu, DBLUE = '#1A3A5C';
  const GRN = th.grn, LGRN = th.lgrn, TXT = '#1D3557';
  const REPR_W = 128;

  const isArc = d.centralType === 'archief';
  const isKT  = d.centralType === 'kernthema';
  const extras = d.extraOvals    || [];
  const zweefs = d.zweefArchieven || [];
  const nEx = extras.length, nZw = zweefs.length;

  const CS_W = 145, CS_H = 90;
  const OV_W = 215, OV_H = 145;
  const CR_W = 195, CR_H = 85;
  const OS_W = 120;
  const EX_W = 152, EX_H = 82;
  const ZW_W = 165, ZW_H = 72;

  const csX = d.showOs ? OS_W + 22 : 10;
  const ovX = csX + CS_W + 75;
  const ovCX = ovX + OV_W / 2;

  const hasTop = (nZw > 0) || (isArc && nEx > 0);
  const TOP_H  = hasTop ? 105 : 0;

  const exTotalW = nEx > 0 ? nEx * EX_W + (nEx-1)*12 : 0;
  const exStartX = nEx > 0 ? Math.max(csX + CS_W + 10, Math.round(ovCX - exTotalW/2)) : ovX;

  const zwTotalW = nZw > 0 ? nZw * ZW_W + (nZw-1)*20 : 0;
  const zwStartX = Math.round(ovCX - zwTotalW/2);

  const TOP_Y = 16;
  const ovY   = TOP_H + 22;
  const csY   = ovY + Math.round((OV_H - CS_H) / 2);
  const crY   = ovY + OV_H + 50;
  const crX   = Math.round(ovCX - CR_W / 2);

  const reprY = ovY - 5;
  let   reprX = ovX + OV_W + 18;
  if (isArc && nEx > 0) reprX = exStartX + exTotalW + 15;

  const rightMost = d.showRepr
    ? reprX + REPR_W + 12
    : (isArc && nEx > 0 ? exStartX + exTotalW + 12 : ovX + OV_W + 20);
  const CW = Math.max(480, rightMost);
  const CH = crY + CR_H + 24;

  const canvas = document.createElement('div');
  canvas.className = 'ba-canvas';
  canvas.style.cssText = `position:relative;width:${CW}px;height:${CH}px;background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1);`;

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width', CW); svg.setAttribute('height', CH);
  svg.setAttribute('viewBox', `0 0 ${CW} ${CH}`);
  svg.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:10;overflow:visible;';
  svg.innerHTML = `<defs><marker id="ba-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="${GRN}"/></marker></defs>`;

  const setA = (e, obj) => { Object.entries(obj).forEach(([a,v]) => e.setAttribute(a,v)); return e; };
  function svgLine(x1,y1,x2,y2) {
    svg.appendChild(setA(document.createElementNS('http://www.w3.org/2000/svg','line'),
      {x1,y1,x2,y2,stroke:GRN,'stroke-width':'1.5','marker-end':'url(#ba-arr)'}));
  }
  function svgArc(x1,y1,x2,y2) {
    // Boogje zweeft vrij tussen de elementen (raakt niet de randen)
    const margin = 8;
    const ax1 = x1 + margin, ax2 = x2 - margin;
    const midY = Math.min(y1,y2) - 36;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${ax1},${y1} Q${(ax1+ax2)/2},${midY} ${ax2},${y2}`);
    setA(p,{stroke:GRN,'stroke-width':'2.5',fill:'none'});
    svg.appendChild(p);
  }
  function svgDbl(x1,y1,x2,y2) {
    // Identiteitsrelatie: = teken zwevend tussen CS en ovaal
    const midX = (x1+x2)/2, midY = (y1+y2)/2;
    const halfW = 14, gap = 5;
    [-1,1].forEach(s=>{
      svg.appendChild(setA(document.createElementNS('http://www.w3.org/2000/svg','line'),
        {x1:midX-halfW,y1:midY+s*gap,x2:midX+halfW,y2:midY+s*gap,
         stroke:GRN,'stroke-width':'2','stroke-linecap':'round'}));
    });
  }

  function mkBox(x,y,w,h,lblTxt,key,ph,clr) {
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:${clr.bg};border:1.5px solid ${clr.bd};border-radius:6px;padding:5px 8px;display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;`;
    if(lblTxt){const l=document.createElement('div');l.textContent=lblTxt;l.style.cssText=`font-size:9px;font-weight:800;color:${clr.bd};margin-bottom:2px;letter-spacing:.04em;flex-shrink:0;`;el.appendChild(l);}
    const ta=makeTa(d[key]||'',ph,v=>{d[key]=v;save();}); ta.style.color=TXT; el.appendChild(ta); return el;
  }
  function mkOval(x,y,w,h,lblTxt,key,ph,clr) {
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:${clr.bg};border:2px solid ${clr.bd};border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:${Math.round(h*.17)}px ${Math.round(w*.1)}px;box-sizing:border-box;overflow:hidden;`;
    if(lblTxt){const l=document.createElement('div');l.textContent=lblTxt;l.style.cssText=`font-size:8px;font-weight:800;color:${clr.bd};margin-bottom:2px;flex-shrink:0;`;el.appendChild(l);}
    const ta=makeTa(d[key]||'',ph,v=>{d[key]=v;save();}); ta.style.cssText+=`text-align:center;color:${TXT};`; el.appendChild(ta); return el;
  }
  function mkRepr(x,y) {
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:${REPR_W}px;background:#fafafa;border:1.5px solid #bbb;border-radius:6px;padding:8px 10px;box-sizing:border-box;`;
    const hdr=document.createElement('div'); hdr.textContent='representatieniveaus:'; hdr.style.cssText='font-size:9px;font-weight:800;color:#888;margin-bottom:5px;'; el.appendChild(hdr);
    [['reprStimulus','stimulusaspect'],['reprResponse','responsaspect'],['reprBetekenis','betekenisaspect']].forEach(([k,lb])=>{
      const row=document.createElement('div'); row.style.marginBottom='4px';
      const ll=document.createElement('div'); ll.textContent=lb; ll.style.cssText='font-size:9px;font-style:italic;color:#888;';
      const ta=makeTa(d[k]||'','',v=>{d[k]=v;save();}); ta.style.cssText+='font-size:10px;color:#333;';
      row.append(ll,ta); el.appendChild(row);
    });
    return el;
  }

  /* OS */
  if (d.showOs) {
    canvas.appendChild(mkBox(10, csY, OS_W, CS_H, 'OS (5)', 'os', 'context', {bg:'#F2F6F0',bd:'#8AAA8A'}));
    [csY+CS_H/2-7, csY+CS_H/2+7].forEach(cy => {
      const c2=document.createElementNS('http://www.w3.org/2000/svg','circle');
      setA(c2,{cx:csX-10,cy,r:'3.5',fill:'#bbb'}); svg.appendChild(c2);
    });
  }

  /* CS */
  canvas.appendChild(mkBox(csX, csY, CS_W, CS_H, 'CS (1)', 'cs', 'uitlokkende situatie', {bg:LGRN,bd:GRN}));

  /* Zwevende archieven boven centrale ovaal */
  zweefs.forEach((arch, i) => {
    const ax = zwStartX + i*(ZW_W+20);
    const el = document.createElement('div');
    el.style.cssText=`position:absolute;left:${ax}px;top:${TOP_Y}px;width:${ZW_W}px;display:flex;flex-direction:column;align-items:center;text-align:center;`;
    const ico=Object.assign(document.createElement('div'),{textContent:'🗄',style:'font-size:18px;opacity:.55;flex-shrink:0;'});
    const ta=makeTa(arch.label||'','archief-label',v=>{d.zweefArchieven[i].label=v;save();}); ta.style.cssText+='text-align:center;color:#555;font-size:10px;';
    const del=document.createElement('button'); del.textContent='×'; del.className='no-print';
    del.style.cssText='position:absolute;top:0;right:4px;border:none;background:transparent;cursor:pointer;font-size:12px;color:#aaa;';
    del.addEventListener('click',()=>{d.zweefArchieven.splice(i,1);save();redraw();});
    el.append(ico,ta,del); canvas.appendChild(el);
    const archCX = ax+ZW_W/2;
    const targetX = nZw===1 ? ovCX : ovX+(i/(nZw-1))*OV_W;
    svgLine(archCX, TOP_Y+ZW_H, targetX, ovY-2);
  });

  /* Extra ovaaltjes boven archief-ovaal */
  extras.forEach((ov, i) => {
    const ex = exStartX + i*(EX_W+12);
    const el = document.createElement('div');
    el.style.cssText=`position:absolute;left:${ex}px;top:${TOP_Y}px;width:${EX_W}px;height:${EX_H}px;background:${LBLU};border:2px solid ${BLU};border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px 14px;box-sizing:border-box;overflow:hidden;`;
    const lbl2=Object.assign(document.createElement('div'),{textContent:'US/UR-repr'}); lbl2.style.cssText=`font-size:8px;font-weight:800;color:${BLU};margin-bottom:2px;flex-shrink:0;`;
    const ta=makeTa(ov.text||'','kerngebeurtenis',v=>{d.extraOvals[i].text=v;save();}); ta.style.cssText+=`text-align:center;color:${DBLUE};font-size:10px;`;
    const del=document.createElement('button'); del.textContent='×'; del.className='no-print';
    del.style.cssText='position:absolute;top:3px;right:7px;border:none;background:transparent;cursor:pointer;font-size:12px;color:#aaa;';
    del.addEventListener('click',()=>{d.extraOvals.splice(i,1);save();redraw();});
    el.append(lbl2,ta,del); canvas.appendChild(el);
    const exCX = ex+EX_W/2;
    const targetX = nEx===1 ? ovCX : ovX+(i/(nEx-1))*OV_W;
    svgLine(exCX, TOP_Y+EX_H, targetX, ovY-2);
  });

  /* Repr bij archief-ovaal + top-rij ovaaltjes */
  if (isArc && nEx > 0 && d.showRepr) {
    canvas.appendChild(mkRepr(reprX, TOP_Y));
    svgLine(exStartX+exTotalW, TOP_Y+EX_H/2, reprX-2, TOP_Y+EX_H/2);
  }

  /* Centrale ovaal */
  if (isArc) {
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${ovX}px;top:${ovY}px;width:${OV_W}px;height:${OV_H}px;background:${LBLU};border:2px solid ${BLU};border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:${Math.round(OV_H*.2)}px ${Math.round(OV_W*.1)}px;box-sizing:border-box;overflow:hidden;`;
    const lbl2=Object.assign(document.createElement('div'),{textContent:'US/UR-repr'}); lbl2.style.cssText=`font-size:8px;font-weight:800;color:${BLU};margin-bottom:2px;flex-shrink:0;`;
    const ta=makeTa(d.centralArchiefLabel||'','archief-label',v=>{d.centralArchiefLabel=v;save();}); ta.style.cssText+=`text-align:center;color:${DBLUE};`;
    const ico=Object.assign(document.createElement('div'),{textContent:'🗄',style:`font-size:17px;margin-top:4px;opacity:.4;flex-shrink:0;`});
    el.append(lbl2,ta,ico); canvas.appendChild(el);
    if (d.showRepr && nEx===0) {
      canvas.appendChild(mkRepr(reprX, reprY));
      svgLine(ovX+OV_W, ovY+OV_H/2, reprX-2, ovY+OV_H/2);
    }
  } else {
    const ovLbl = isKT ? 'US/UR-repr van een kernthema' : 'US/UR-repr';
    const ovPh  = isKT ? "'kernthema'" : 'mentale representatie';
    canvas.appendChild(mkOval(ovX,ovY,OV_W,OV_H,ovLbl,'centralText',ovPh,{bg:LBLU,bd:BLU}));
    if (d.showRepr) {
      canvas.appendChild(mkRepr(reprX, reprY));
      svgLine(ovX+OV_W, ovY+OV_H/2, reprX-2, ovY+OV_H/2);
    }
  }

  /* CR */
  canvas.appendChild(mkBox(crX, crY, CR_W, CR_H, 'CR (2)', 'cr', 'emotionele reactie', {bg:LGRN,bd:GRN}));

  /* Pijlen CS → centrale ovaal */
  const csMY=csY+CS_H/2, csR=csX+CS_W, ovMY=ovY+OV_H/2;
  if      (d.assocType==='referentieel') svgArc(csR,csMY,ovX,ovMY);
  else if (d.assocType==='identiteit')   svgDbl(csR,csMY,ovX,ovMY);
  else                                   svgLine(csR,csMY,ovX-2,ovMY);

  /* Pijl centrale ovaal → CR */
  svgLine(ovCX, ovY+OV_H, crX+CR_W/2, crY-2);

  canvas.appendChild(svg);
  container.appendChild(canvas);
}

function mkTitleRow(d, save, typeLabel) {
  const row = document.createElement('div');
  row.className = 'no-print';
  row.style.cssText = 'padding:10px 24px 4px;display:flex;align-items:baseline;gap:8px;';

  /* Type-label ("FA", "BA", "HT") — duidelijk */
  const badge = document.createElement('span');
  badge.textContent = typeLabel;
  badge.style.cssText = 'font-size:15px;font-weight:800;color:#4A6E8A;letter-spacing:.06em;flex-shrink:0;';
  row.appendChild(badge);

  /* Titel-input */
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = d.title || '';
  inp.placeholder = 'naam';
  inp.style.cssText = 'flex:1;font-size:13px;font-weight:400;border:none;border-bottom:1px dashed #ccc;background:transparent;color:#1D3557;outline:none;padding:1px 0;transition:border-color .15s, border-style .15s;';
  inp.addEventListener('focus', () => { inp.style.borderBottomColor = '#4A6E8A'; inp.style.borderBottomStyle = 'solid'; inp.style.fontWeight = '600'; });
  inp.addEventListener('blur',  () => { inp.style.borderBottomColor = '#ccc';    inp.style.borderBottomStyle = 'dashed'; inp.style.fontWeight = d.title ? '600' : '400'; });
  inp.addEventListener('input', () => save({ title: inp.value }));

  row.appendChild(inp);
  return row;
}

/* ─────────────────────────────────────────
   Groepbalk — gerelateerde FA's en BA's
───────────────────────────────────────── */
function buildGroupBar(container, d) {
  if (!d.groupId) return;
  const siblings = load().filter(a => a.groupId === d.groupId);

  const wrap = document.createElement('div');
  wrap.className = 'no-print';
  wrap.style.cssText = 'padding:6px 24px 22px;';

  /* Gezamenlijke groepstitel tonen als er meerdere analyses zijn */
  if (siblings.length > 1) {
    const types = new Set(siblings.map(s => s.type));
    const groupLabel = types.has('FA') && types.has('BA') ? 'FABA' : [...types].join('/');
    const existingTitle = siblings.map(s => s.title).find(t => t && t.trim()) || '';

    const titleRow = document.createElement('div');
    titleRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px;';

    const badge = document.createElement('span');
    badge.textContent = groupLabel;
    badge.style.cssText = 'font-size:10px;font-weight:800;letter-spacing:.06em;background:var(--cgt-blue);color:#fff;border-radius:4px;padding:2px 7px;flex-shrink:0;';

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = existingTitle;
    inp.placeholder = 'Groepsnaam…';
    inp.style.cssText = 'flex:1;font-size:14px;font-weight:600;border:none;border-bottom:2px solid transparent;background:transparent;color:#1D3557;outline:none;padding:1px 0;transition:border-color .15s;';
    inp.addEventListener('focus', () => inp.style.borderBottomColor = 'var(--cgt-blue)');
    inp.addEventListener('blur',  () => inp.style.borderBottomColor = 'transparent');
    inp.addEventListener('input', () => {
      // Schrijf titel naar alle analyses in de groep
      const all = load();
      all.forEach(a => { if (a.groupId === d.groupId) a.title = inp.value; });
      dump(all);
      d.title = inp.value;
    });

    titleRow.append(badge, inp);
    wrap.appendChild(titleRow);
  }

  /* Chips + plusknop */
  const bar = document.createElement('div');
  bar.style.cssText = 'display:flex;align-items:center;flex-wrap:wrap;gap:8px;';

  const label = document.createElement('span');
  label.textContent = 'Gekoppeld:';
  label.style.cssText = 'font-size:11px;color:#999;flex-shrink:0;';
  bar.appendChild(label);

  siblings.forEach(s => {
    const chip = document.createElement('button');
    const isCurrent = s.id === d.id;
    const typeLabel = s.type === 'FA' ? 'FA' : 'BA';
    const titleStr = (s.title || '').trim() || (s.type === 'FA' ? 'Functieanalyse' : 'Betekenisanalyse');
    chip.textContent = `${typeLabel}: ${titleStr}`;
    chip.style.cssText = `font-size:11px;padding:3px 10px;border-radius:20px;border:1.5px solid ${isCurrent?'var(--cgt-blue)':'#bbb'};background:${isCurrent?'var(--cgt-blue)':'#fff'};color:${isCurrent?'#fff':'#555'};cursor:${isCurrent?'default':'pointer'};`;
    if (!isCurrent) chip.addEventListener('click', () => go(`/${s.type.toLowerCase()}/${s.id}`));
    bar.appendChild(chip);
  });

  /* + knop */
  const addBtn = document.createElement('button');
  addBtn.textContent = '+';
  addBtn.title = 'Voeg gekoppelde analyse toe';
  addBtn.style.cssText = 'width:26px;height:26px;border-radius:50%;border:1.5px solid var(--cgt-blue);background:#fff;color:var(--cgt-blue);font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;';

  const menu = document.createElement('div');
  menu.style.cssText = 'display:none;position:absolute;bottom:32px;left:0;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);overflow:hidden;z-index:200;';
  [['FA', 'Functieanalyse'], ['BA', 'Betekenisanalyse']].forEach(([type, lbl]) => {
    const opt = document.createElement('button');
    opt.textContent = lbl;
    opt.style.cssText = 'display:block;width:100%;padding:9px 18px;border:none;background:#fff;text-align:left;cursor:pointer;font-size:12px;color:#333;white-space:nowrap;';
    opt.addEventListener('mouseenter', () => opt.style.background = '#f0f6ff');
    opt.addEventListener('mouseleave', () => opt.style.background = '#fff');
    opt.addEventListener('click', () => {
      menu.style.display = 'none';
      _pendingGroup = d.groupId;
      go(`/${type.toLowerCase()}/new`);
    });
    menu.appendChild(opt);
  });

  const plusWrap = document.createElement('div');
  plusWrap.style.cssText = 'position:relative;flex-shrink:0;';
  addBtn.addEventListener('click', e => {
    e.stopPropagation();
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  });
  document.addEventListener('click', () => { menu.style.display = 'none'; }, { once: true });
  plusWrap.append(addBtn, menu);
  bar.appendChild(plusWrap);

  wrap.appendChild(bar);
  container.appendChild(wrap);
}

   HT — HOLISTISCHE THEORIE
══════════════════════════════════════════ */
function pgHT(c, id) {
  const isNew = id === 'new';
  const emptyData = () => ({
    persoonsfactoren:[], omgevingsfactoren:[], kernovertuigingen:[],
    leefregels:[], coping:[], klachten:[], stressoren:[],
    beschermendeFactoren:[], gevolgen:[], kritischeGebeurtenissen:[]
  });
  let d = isNew ? {
    id: uid(), type:'HT', title:'', client:'', date: today(),
    theme: 'blauw',
    data: emptyData()
  } : byId(id);
  if (!d) { c.innerHTML = '<p style="padding:20px">Niet gevonden.</p>'; return; }
  if (!d.data) d.data = emptyData();
  if (!d.theme) d.theme = 'blauw';

  let saveTimer = null;
  function save(extra) {
    if (extra) Object.assign(d, extra);
    upsert(d);
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => toast('Automatisch opgeslagen ✓'), 1200);
  }

  function redrawHT() {
    c.innerHTML = '';
    buildHT(c, d, save, redrawHT);
  }
  redrawHT();
}
