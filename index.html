/* Data model v2:
   centralType : 'usur' | 'kernthema' | 'archief'
     'usur'     – gewone US/UR-repr ovaal
     'kernthema'– ovaal met "van een kernthema" label
     'archief'  – de ovaal ZÉlf is een archief (type 2b), extra ovaaltjes boven
   centralText        – tekst in de ovaal (usur / kernthema)
   centralArchiefLabel– label in archief-ovaal
   extraOvals  [{id,text}] – boven de archief-ovaal (type 2b bewijzen)
   zweefArchieven [{id,label}] – zwevende archieven bóven de centrale ovaal (max 3)
*/
function pgBA(c, id) {
  const isNew = id === 'new';

  /* Standaard leeg schema */
  const _newId = uid();
  const defaultD = {
    id: _newId, type: 'BA', title: '', client: '', date: today(),
    groupId: _pendingGroup || _newId,
    theme: 'blauw',
    showOs: false, os: '',
    cs: '',
    assocType: '',
    centralType: 'usur',
    centralSubtype: '',
    centralText: '',
    centralArchiefLabel: '',
    extraOvals: [],
    zweefArchieven: [],
    bewijsOvals: [],
    showRepr: false,
    reprStimulus: '', reprResponse: '', reprBetekenis: '',
    cr: ''
  };
  _pendingGroup = null;

  let raw = isNew ? null : byId(id);

  /* Migratie v1 → v2 */
  let d;
  if (!raw) {
    d = defaultD;
  } else if (raw.centralType !== undefined) {
    d = raw.groupId ? raw : { ...raw, groupId: raw.id }; // v2, voeg groupId toe indien ontbrekend
  } else {
    // v1 had showArchief / showKernthema / mainText / archiefLabel / kernthemaText
    d = {
      ...defaultD, ...raw,
      centralType: raw.showArchief ? (raw.showKernthema ? 'kernthema' : 'archief') : 'usur',
      centralText: raw.showKernthema ? (raw.kernthemaText || '') : (raw.mainText || ''),
      centralArchiefLabel: raw.archiefLabel || '',
      extraOvals: raw.extraOvals || [],
      zweefArchieven: (raw.showArchief && raw.showKernthema && raw.archiefLabel)
        ? [{ id: uid(), label: raw.archiefLabel }] : [],
    };
  }

  if (!d) { c.innerHTML = '<p style="padding:20px">Niet gevonden.</p>'; return; }

  let saveTimer = null;
  const baHistory = [];
  function save(extra) {
    baHistory.push(JSON.stringify(d));
    if (baHistory.length > 50) baHistory.shift();
    if (extra) d = { ...d, ...extra };
    upsert(d);
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => toast('Automatisch opgeslagen ✓'), 1200);
  }
  function baUndo() {
    if (!baHistory.length) return;
    d = JSON.parse(baHistory.pop());
    upsert(d);
    redraw();
    toast('Ongedaan gemaakt ↩');
  }

  /* ── Actiebalk ── */
  const bar = document.createElement('div');
  bar.className = 'action-bar no-print';
  const btnPrint = mkBtn('btn-ghost btn-sm', '🖨 Print', () => printAs('portrait', 0.7));
  const btnClip  = mkBtn('btn-ghost btn-sm', '📋 Kopieer', () => {
    const cnv = c.querySelector('.ba-canvas');
    if (!cnv) return;
    toast('Bezig met kopiëren…', 1500);
    html2canvas(cnv, { backgroundColor: '#fff', scale: 2, useCORS: true }).then(cv => {
      cv.toBlob(bl => {
        navigator.clipboard.write([new ClipboardItem({ 'image/png': bl })])
          .then(() => toast('Gekopieerd naar klembord ✓'))
          .catch(() => { const u = cv.toDataURL(); const w = window.open(); w.document.write(`<img src="${u}" style="max-width:100%">`); });
      });
    });
  });
  const btnPreview = mkBtn('btn-ghost btn-sm', '👁 Preview', () => buildPreviewOverlay(d));
  const btnUndo = mkBtn('btn-ghost btn-sm', '↩ Ongedaan', () => baUndo());
  btnUndo.title = 'Laatste wijziging ongedaan maken';
  const btnDel = mkTrashBtn('btn btn-sm btn-ghost', 'Verwijder BA', () => {
    if (confirm('Verwijder deze BA?')) { remove(d.id); go('/'); }
  });
  btnDel.style.color = 'var(--danger)';
  bar.append(btnPrint, btnClip, btnPreview, btnUndo, btnDel);
  c.appendChild(bar);

  /* ── Titelregel ── */
  c.appendChild(mkTitleRow(d, save, 'BA'));

  /* ── Themakiezer ── */
  const themeRow = document.createElement('div');
  c.appendChild(themeRow);

  /* ── Schema-instellingenbalk ── */
  const cfgBar = document.createElement('div');
  cfgBar.className = 'no-print';
  c.appendChild(cfgBar);

  /* ── Canvas-wrapper ── */
  const wrap = document.createElement('div');
  wrap.style.cssText = 'padding:20px 24px;overflow:auto;';
  c.appendChild(wrap);

  const groupBar = document.createElement('div');
  c.appendChild(groupBar);

  function redraw() {
    themeRow.innerHTML = '';
    themeRow.appendChild(mkThemePicker(d, id => { save({ theme: id }); redraw(); }));
    buildBACfgBar(cfgBar, d, save, redraw);
    wrap.innerHTML = '';
    buildBACanvas(wrap, d, save, redraw);
    groupBar.innerHTML = '';
    buildGroupBar(groupBar, d);
  }
  redraw();
}

/* ── Instellingenbalk voor BA v2 ── */
function buildBACfgBar(bar, d, save, redraw) {
  bar.innerHTML = '';
  bar.style.cssText = 'display:flex;gap:5px;flex-wrap:wrap;padding:7px 14px;align-items:center;background:#f7faf6;border-bottom:1px solid #dde8d8;font-size:11px;';

  const tog = (lbl, active, fn) => {
    const b = document.createElement('button');
    b.textContent = lbl;
    b.style.cssText = `font-size:11px;padding:2px 10px;border-radius:20px;border:1.5px solid var(--cgt-blue);cursor:pointer;transition:all .15s;background:${active?'var(--cgt-blue)':'transparent'};color:${active?'#fff':'var(--cgt-blue)'};`;
    b.addEventListener('click', fn); return b;
  };
  const rad = (lbl, active, fn) => {
    const b = document.createElement('button');
    b.textContent = lbl;
    b.style.cssText = `font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid ${active?'var(--cgt-blue)':'#ccc'};cursor:pointer;background:${active?'var(--cgt-blue)':'#fff'};color:${active?'#fff':'#555'};`;
    b.addEventListener('click', fn); return b;
  };
  const sep = () => Object.assign(document.createElement('span'), {textContent:'|',style:'color:#ccc;padding:0 2px;'});
  const lbl = t => Object.assign(document.createElement('span'), {textContent:t,style:'color:#777;'});
  const addBtn = (label, fn) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.style.cssText = 'font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--cgt-blue);cursor:pointer;background:#fff;color:var(--cgt-blue);';
    b.addEventListener('click', fn); return b;
  };

  bar.append(
    tog(d.showOs ? '✓ OS' : '+ OS', d.showOs, () => { save({showOs:!d.showOs}); redraw(); }),
    sep(),
    lbl('Associatie:'),
    rad('referentieel', d.assocType==='referentieel', () => { save({assocType:'referentieel', centralSubtype: d.centralSubtype||''}); redraw(); }),
    rad('sequentieel',  d.assocType==='sequentieel',  () => { save({assocType:'sequentieel',  centralSubtype:''}); redraw(); }),
    rad('identiteit',   d.assocType==='identiteit',   () => { save({assocType:'identiteit',   centralSubtype:''}); redraw(); }),
    ...(d.assocType==='sequentieel' ? [sep(), lbl('Pijl CS→US/UR:'), rad('voorspelt', !d.causal, () => { save({causal:false}); redraw(); }), rad('veroorzaakt (causaal)', !!d.causal, () => { save({causal:true}); redraw(); })] : []),
    sep()
  );

  if (d.centralType === 'archief' || d.centralSubtype === 'kerngebeurtenis-archief') {
    const nExNow = (d.extraOvals||[]).length;
    const maxEx = d.centralSubtype === 'kerngebeurtenis-archief' ? 3 : 99;
    if (nExNow < maxEx) bar.append(addBtn('+ ovaaltje', () => {
      d.extraOvals = [...(d.extraOvals||[]), {id:uid(), text:''}];
      save(); redraw();
    }));
  } else {
    const sub = d.centralSubtype || '';
    const isKernGeb = sub === 'kerngebeurtenis' || sub === 'kerngebeurtenis-enkel' || sub === 'kerngebeurtenis-archief';
    const isSq = d.assocType === 'sequentieel';
    const nz = (d.zweefArchieven||[]).length;
    if (!isKernGeb && !isSq && nz < 3) {
      bar.append(addBtn('+ archief', () => {
        d.zweefArchieven = [...(d.zweefArchieven||[]), {id:uid(), label:''}];
        save(); redraw();
      }));
    }
    // Bewijs-ovaaltjes: alleen bij kernthema + minimaal 1 zweefarchief
    if (sub === 'kernthema' && nz > 0 && (d.bewijsOvals||[]).length < 3) {
      bar.append(addBtn('+ bewijs ovaaltje', () => {
        d.bewijsOvals = [...(d.bewijsOvals||[]), {id:uid(), text:''}];
        save(); redraw();
      }));
    }
  }

  bar.append(
    sep(),
    tog(d.showRepr ? '✓ repr.niveaus' : '+ repr.niveaus', d.showRepr, () => { save({showRepr:!d.showRepr}); redraw(); })
  );
}

/* ── Canvas renderfunctie v2 ── */
function buildBACanvas(container, d, save, redraw) {
  const th = THEMES[d.theme || 'blauw'].ba;
  const BLU = th.blu, LBLU = th.lblu, DBLUE = '#1A3A5C';
  const GRN = th.grn, LGRN = th.lgrn, TXT = '#1D3557';
  const OSL = th.osl, OSB = th.osb;
  const REPR_W = 128;

  const isArc = d.centralType === 'archief';
  const isKT  = d.centralType === 'kernthema';
  const extras = d.extraOvals    || [];
  const zweefs = d.zweefArchieven || [];
  const nEx = extras.length, nZw = zweefs.length;

  const CS_W = 145, CS_H = 90;
  const OV_W = 195, OV_H = 120;
  const CR_W = 195, CR_H = 85;
  const OS_W = 120;
  const EX_W = 152, EX_H = 82;
  const ZW_W = 130, ZW_H = 120;
  const BV_W = 140, BV_H = 80, BV_GAP = 10;

  const csX = d.showOs ? OS_W + 22 : 10;
  const ovX = csX + CS_W + 75;
  const ovCX = ovX + OV_W / 2;

  // Accolade: bij identiteit én CS = "ik" (hoofdletterongevoelig)
  const showAccolade = d.assocType === 'identiteit' && /^ik$/i.test((d.cs||'').trim());
  // Accolade-coördinaten (worden pas gebruikt als ovY bekend is, maar we berekenen hier de X-waarden)
  const accoLeftX  = csX + CS_W/2;               // midden CS
  const accoRightX = ovCX;                        // midden ovaal
  const accoMidX   = Math.round((accoLeftX + accoRightX) / 2);

  const isKernGebArc = (d.centralSubtype === 'kerngebeurtenis-archief');
  const hasTop = (nZw > 0) || (isArc && nEx > 0) || (isKernGebArc && nEx > 0);

  // Bewijs-ovaaltjes: hoeveel ruimte nodig boven de kastlijn (TOP_Y+35)?
  const bewijzen = d.bewijsOvals || [];
  const nBv = bewijzen.length;
  const bvTotalH = nBv * BV_H + Math.max(0, nBv - 1) * BV_GAP;
  // archCabCY_base = TOP_Y(16) + 35 = 51 (midden kastafbeelding)
  const archCabCY_base = 51;
  const hasBv = d.centralSubtype === 'kernthema' && nZw > 0 && nBv > 0;
  // Hoeveel moet bvTopY omhoog tov de bovenkant van de canvas? (min TOP_Y + 8 marge)
  const bvTopY_base = archCabCY_base - bvTotalH / 2;
  const bvExtraTop = hasBv ? Math.max(0, Math.round(16 + 8 - bvTopY_base)) : 0;

  // Bij accolade zonder zweefs: kleine ruimte voor de accolade; met zweefs: volle ruimte
  const TOP_H  = hasTop ? 135 + bvExtraTop : (showAccolade ? 20 : 0);

  const exTotalW = nEx > 0 ? nEx * EX_W + (nEx-1)*12 : 0;
  const exStartX = nEx > 0 ? Math.max(csX + CS_W + 10, Math.round(ovCX - exTotalW/2)) : ovX;

  const zwTotalW = nZw > 0 ? nZw * ZW_W + (nZw-1)*20 : 0;
  // Bij identiteit+accolade: zweefarchief boven midden accolade; anders boven =; anders boven ovaal
  const eqMidX    = Math.round((csX + CS_W + ovX) / 2);
  const zwCenterX = showAccolade ? accoMidX : (d.assocType === 'identiteit') ? eqMidX : ovCX;
  const zwStartX  = Math.round(zwCenterX - zwTotalW/2);

  const TOP_Y = 16;
  const ovY   = TOP_H + 22;

  // Pre-compute accolade notch Y (nodig vóór de zweef-forEach)
  const accoArmBottom = ovY - 4;
  const accoArmTop    = ovY - 14;   // heel kort pootje
  const accoNotchH    = 8;          // kleine nok
  const accoNotchY    = showAccolade ? (accoArmTop - accoNotchH) : null;
  const csY   = ovY + Math.round((OV_H - CS_H) / 2);
  const crY   = ovY + OV_H + 50;
  const crX   = Math.round(ovCX - CR_W / 2);

  const reprY = ovY - 5;
  let   reprX = ovX + OV_W + 18;
  if (isArc && nEx > 0) reprX = exStartX + exTotalW + 15;

  // Bewijs-ovaaltjes rechterkant (voor CW)
  const archRightX_bv = nZw > 0 ? zwStartX + (nZw - 1) * (ZW_W + 20) + ZW_W : 0;
  const bvRightEdge   = hasBv ? archRightX_bv + 20 + 16 + BV_W + 20 : 0;

  // Bewijs-ovaaltjes onderkant (voor CH)
  const archCabCY_actual = 16 + 35 + bvExtraTop; // TOP_Y + 35 + bvExtraTop
  const bvTopY_actual    = Math.round(archCabCY_actual - bvTotalH / 2);
  const bvBotEdge        = hasBv ? bvTopY_actual + bvTotalH + 16 : 0;

  // Kerngebeurtenis-archief extra ovals rechterkant (voor CW)
  const KE_W_S = 152;
  const keTotalW_s = nEx > 0 ? nEx * KE_W_S + (nEx - 1) * 12 : 0;
  const keRightEdge = isKernGebArc && nEx > 0
    ? Math.round(ovCX + keTotalW_s / 2) + 20
    : 0;

  // Zweefarchief rechterkant (voor CW)
  const zwRightEdge = nZw > 0 ? zwStartX + zwTotalW + 20 : 0;

  const rightMost = d.showRepr
    ? reprX + REPR_W + 12
    : (isArc && nEx > 0 ? exStartX + exTotalW + 12 : ovX + OV_W + 20);
  const CW = Math.max(480, rightMost, bvRightEdge, keRightEdge, zwRightEdge);
  const CH = Math.max(crY + CR_H + 24, bvBotEdge);

  const canvas = document.createElement('div');
  canvas.className = 'ba-canvas';
  canvas.style.cssText = `position:relative;width:${CW}px;height:${CH}px;background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1);`;

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width', CW); svg.setAttribute('height', CH);
  svg.setAttribute('viewBox', `0 0 ${CW} ${CH}`);
  svg.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:10;overflow:visible;';
  svg.innerHTML = `<defs><marker id="ba-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="${GRN}"/></marker></defs>`;

  const setA = (e, obj) => { Object.entries(obj).forEach(([a,v]) => e.setAttribute(a,v)); return e; };
  function svgLine(x1,y1,x2,y2) {
    svg.appendChild(setA(document.createElementNS('http://www.w3.org/2000/svg','line'),
      {x1,y1,x2,y2,stroke:GRN,'stroke-width':'1.5','marker-end':'url(#ba-arr)'}));
  }
  function svgThickArrow(x1,y1,x2,y2) {
    // Dikke gevulde pijl voor causaal verband
    const dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy);
    const ux = dx/len, uy = dy/len;
    const hw = 9, tipLen = 22, shaftW = 5;
    // shaft eindigt voor de punt
    const sx2 = x2 - ux*tipLen, sy2 = y2 - uy*tipLen;
    // loodrechte richting
    const px = -uy, py = ux;
    // shaft als rechthoek (polygon)
    const pts = [
      [x1+px*shaftW, y1+py*shaftW],
      [sx2+px*shaftW, sy2+py*shaftW],
      [sx2+px*hw, sy2+py*hw],
      [x2, y2],
      [sx2-px*hw, sy2-py*hw],
      [sx2-px*shaftW, sy2-py*shaftW],
      [x1-px*shaftW, y1-py*shaftW],
    ].map(p=>p.join(',')).join(' ');
    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points', pts);
    poly.setAttribute('fill', GRN);
    poly.setAttribute('stroke', 'none');
    svg.appendChild(poly);
  }
  function svgAccolade(lx, rx, armBottomY, armTopY, notchH) {
    // Horizontale accolade: twee armen omlaag, centrum-nok omhoog
    const mx = Math.round((lx+rx)/2);
    const ny = armTopY - notchH; // notch-piek (omhoog)
    const r  = 10; // hoekstraal
    const d  = `M${lx},${armBottomY} L${lx},${armTopY+r} Q${lx},${armTopY} ${lx+r},${armTopY} ` +
               `L${mx-r},${armTopY} Q${mx},${armTopY} ${mx},${ny} ` +
               `Q${mx},${armTopY} ${mx+r},${armTopY} ` +
               `L${rx-r},${armTopY} Q${rx},${armTopY} ${rx},${armTopY+r} L${rx},${armBottomY}`;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', d);
    p.setAttribute('stroke', GRN);
    p.setAttribute('stroke-width', '2');
    p.setAttribute('fill', 'none');
    svg.appendChild(p);
    return ny; // geeft de Y van de notch-piek terug
  }
  function svgArc(x1,y1,x2,y2) {
    // Boogje zweeft vrij tussen de elementen (raakt niet de randen)
    const margin = 8;
    const ax1 = x1 + margin, ax2 = x2 - margin;
    const midY = Math.min(y1,y2) - 36;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${ax1},${y1} Q${(ax1+ax2)/2},${midY} ${ax2},${y2}`);
    setA(p,{stroke:GRN,'stroke-width':'2.5',fill:'none'});
    svg.appendChild(p);
  }
  function svgDbl(x1,y1,x2,y2) {
    // Identiteitsrelatie: = teken zwevend tussen CS en ovaal
    const midX = (x1+x2)/2, midY = (y1+y2)/2;
    const halfW = 14, gap = 5;
    [-1,1].forEach(s=>{
      svg.appendChild(setA(document.createElementNS('http://www.w3.org/2000/svg','line'),
        {x1:midX-halfW,y1:midY+s*gap,x2:midX+halfW,y2:midY+s*gap,
         stroke:GRN,'stroke-width':'2','stroke-linecap':'round'}));
    });
  }

  /* Neutrale kleuren voor lege velden */
  const N_BG = '#F4F4F4', N_BD = '#C8CDD2';

  /* Pas kleur live toe op een element op basis van of de textarea content heeft */
  function liveFill(el, ta, filledBg, filledBd, lbl) {
    function upd() {
      const txt = ('value' in ta) ? ta.value : ta.textContent;
      const filled = txt.trim().length > 0;
      el.style.background   = filled ? filledBg : N_BG;
      el.style.borderColor  = filled ? filledBd : N_BD;
      if (lbl) lbl.style.color = filled ? filledBd : N_BD;
    }
    upd();
    ta.addEventListener('input', upd);
  }

  function mkBox(x,y,w,h,lblTxt,key,ph,filledBg,filledBd) {
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:${N_BG};border:1.5px solid ${N_BD};border-radius:6px;padding:5px 8px;display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;`;
    let lbl=null;
    if(lblTxt){lbl=document.createElement('div');lbl.textContent=lblTxt;lbl.style.cssText=`font-size:10px;font-weight:800;color:${N_BD};margin-bottom:2px;letter-spacing:.04em;flex-shrink:0;`;el.appendChild(lbl);}
    const ta=makeCE(d[key]||'',ph,v=>{d[key]=v;save();}); ta.style.cssText+=`color:${TXT};font-size:${d[key+'_fs']||'13px'};`; el.appendChild(ta);
    _ceFsSave.set(ta, fs => { d[key+'_fs']=fs; save(); });
    liveFill(el, ta, filledBg, filledBd, lbl);
    return el;
  }
  function mkOval(x,y,w,h,lblTxt,key,ph,filledBg,filledBd) {
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:${N_BG};border:2px solid ${N_BD};border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:${Math.round(h*.17)}px ${Math.round(w*.1)}px;box-sizing:border-box;overflow:hidden;`;
    let lbl=null;
    if(lblTxt){lbl=document.createElement('div');lbl.textContent=lblTxt;lbl.style.cssText=`font-size:10px;font-weight:800;color:${N_BD};margin-bottom:2px;flex-shrink:0;`;el.appendChild(lbl);}
    const ta=makeCE(d[key]||'',ph,v=>{d[key]=v;save();}); ta.style.cssText+=`text-align:center;color:${TXT};font-size:${d[key+'_fs']||'13px'};`; el.appendChild(ta);
    _ceFsSave.set(ta, fs => { d[key+'_fs']=fs; save(); });
    liveFill(el, ta, filledBg, filledBd, lbl);
    return el;
  }
  function mkRepr(x,y) {
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:${REPR_W}px;background:#fafafa;border:1.5px solid #bbb;border-radius:6px;padding:8px 10px;box-sizing:border-box;`;
    const hdr=document.createElement('div'); hdr.textContent='representatieniveaus:'; hdr.style.cssText='font-size:9px;font-weight:800;color:#888;margin-bottom:5px;'; el.appendChild(hdr);
    const REPR_KEYS = ['reprStimulus','reprResponse','reprBetekenis'];
    function reprFill() {
      const filled = REPR_KEYS.some(k => (d[k]||'').trim().length > 0);
      el.style.background  = filled ? LBLU  : '#fafafa';
      el.style.borderColor = filled ? BLU   : '#bbb';
      hdr.style.color      = filled ? BLU   : '#888';
    }
    reprFill();
    el.addEventListener('input', reprFill);
    const sq = d.assocType === 'sequentieel';
    [['reprStimulus','stimulusaspect'],['reprResponse','responsaspect'],['reprBetekenis','betekenisaspect']].forEach(([k,lb])=>{
      const irrelevant = sq && k !== 'reprStimulus';
      const overruled  = irrelevant && !!d[k]; // al ingevuld → toon gewoon
      const row=document.createElement('div'); row.style.marginBottom = irrelevant && !overruled ? '2px' : '4px';
      const ll=document.createElement('div'); ll.textContent=lb; ll.style.cssText=`font-size:9px;font-style:italic;color:${irrelevant && !overruled ? '#ccc' : '#888'};`;
      if (irrelevant && !overruled) {
        if (window._previewMode) {
          // In preview: toon n.v.t.
          const nvt = document.createElement('div');
          nvt.textContent = 'n.v.t.';
          nvt.style.cssText = 'font-size:9px;color:#bbb;padding:2px 0;';
          row.append(ll, nvt);
        } else {
          // Geblokkeerd veld: klik toont melding + override-knop
          const blocked = document.createElement('div');
          blocked.style.cssText='font-size:9px;color:#ccc;cursor:pointer;padding:2px 0;';
          blocked.textContent='— niet relevant —';
          let msgShown = false;
          blocked.addEventListener('click', () => {
            if (msgShown) return;
            msgShown = true;
            blocked.textContent = 'Niet relevant bij sequentieel.';
            blocked.style.color = '#e07040';
            const ovr = document.createElement('span');
            ovr.textContent = ' Toch invullen?';
            ovr.style.cssText = 'text-decoration:underline;cursor:pointer;color:#e07040;font-size:9px;';
            ovr.addEventListener('click', (e) => {
              e.stopPropagation();
              const ta=makeTa(d[k]||'','',v=>{d[k]=v;save();}); ta.style.cssText+='font-size:10px;color:#333;';
              row.replaceChild(ta, blocked);
              ta.focus();
            });
            blocked.appendChild(ovr);
          });
          row.append(ll, blocked);
        }
      } else {
        // Normaal invulveld (stimulusaspect of overruled)
        const ta=makeTa(d[k]||'','',v=>{d[k]=v;save();}); ta.style.cssText+='font-size:10px;color:#333;';
        if (sq && k==='reprStimulus') ta.style.minHeight='40px'; // meer ruimte
        row.append(ll,ta);
      }
      el.appendChild(row);
    });
    return el;
  }

  /* OS — altijd subtiel groen (context-vak, eigen kleur) */
  if (d.showOs) {
    canvas.appendChild(mkBox(10, csY, OS_W, CS_H, 'OS (5)', 'os', 'context', OSL, OSB));
    [csY+CS_H/2-7, csY+CS_H/2+7].forEach(cy => {
      const c2=document.createElementNS('http://www.w3.org/2000/svg','circle');
      setA(c2,{cx:Math.round((10+OS_W+csX)/2),cy,r:'3.5',fill:'#bbb'}); svg.appendChild(c2);
    });
  }

  /* CS */
  const csBox = mkBox(csX, csY, CS_W, CS_H, 'CS', 'cs', 'uitlokkende situatie', LGRN, GRN);
  canvas.appendChild(csBox);
  // Reactief: herteken als ik-conditie verandert
  if (d.assocType === 'identiteit') {
    const csTa = csBox.querySelector('[contenteditable]');
    if (csTa) {
      let wasIk = showAccolade;
      csTa.addEventListener('input', () => {
        const isIkNow = /^ik$/i.test(csTa.value.trim());
        if (isIkNow !== wasIk) { wasIk = isIkNow; d.cs = csTa.innerHTML||csTa.value; redraw(); }
      });
    }
  }

  /* Zwevende archieven boven centrale ovaal */
  zweefs.forEach((arch, i) => {
    const ax = zwStartX + i*(ZW_W+20);
    const el = document.createElement('div');
    const zwTopY = TOP_Y + bvExtraTop; // zweef schuift mee met extra ruimte boven
    el.style.cssText=`position:absolute;left:${ax}px;top:${zwTopY}px;width:${ZW_W}px;display:flex;flex-direction:column;align-items:center;text-align:center;`;
    const ico=mkCabinetSvg(60, 70, '#888');
    const desc=document.createElement('div');
    desc.textContent='archief met samenhangende kerngebeurtenissen m.b.t.';
    desc.style.cssText='font-size:8px;font-weight:700;color:#888;text-align:center;line-height:1.3;margin-top:3px;';
    const ta=makeTa(arch.label||'','titel',v=>{d.zweefArchieven[i].label=v;save();});
    ta.style.cssText+='text-align:center;color:'+TXT+';font-size:13px;margin-top:1px;';
    const del=document.createElement('button'); del.textContent='×'; del.className='no-print';
    del.style.cssText='position:absolute;top:0;right:4px;border:none;background:transparent;cursor:pointer;font-size:12px;color:#aaa;';
    del.addEventListener('click',()=>{d.zweefArchieven.splice(i,1);save();redraw();});
    el.append(ico,desc,ta,del); canvas.appendChild(el);
    // Beschrijvende tekst blauw als titel gevuld
    (function(){ function upd(){ const filled=ta.value.trim().length>0; desc.style.color=filled?BLU:'#888'; } upd(); ta.addEventListener('input',upd); })();
    // Bij accolade: geen pijl tekenen
    if (!showAccolade) {
      const archCX = ax+ZW_W/2;
      const arrowStartY = zwTopY + 70 + 28 + 18;
      let targetX, targetY;
      if (d.assocType === 'identiteit') {
        targetX = eqMidX;
        targetY = ovY + OV_H/2 - 14;
      } else {
        const spread = nZw === 1 ? 0 : (OV_W * 0.6);
        targetX = nZw === 1 ? ovCX : ovX + (OV_W - spread)/2 + i * spread/(nZw-1);
        const dx = (targetX - ovCX) / (OV_W/2);
        targetY = ovY + OV_H/2 - (OV_H/2) * Math.sqrt(Math.max(0, 1 - dx*dx));
      }
      // Bij identiteit (zonder accolade): pijl een derde korter
      let drawX1 = archCX, drawY1 = arrowStartY, drawX2 = targetX, drawY2 = targetY;
      if (d.assocType === 'identiteit') {
        drawX1 = archCX  + (targetX - archCX)  / 6;
        drawY1 = arrowStartY + (targetY - arrowStartY) / 6;
        drawX2 = targetX - (targetX - archCX)  / 6;
        drawY2 = targetY - (targetY - arrowStartY) / 6;
      }
      svgLine(drawX1, drawY1, drawX2, drawY2);
    }
  });

  /* Bewijs-ovaaltjes rechts van zweefarchief bij kernthema */
  const BV_LABELS = ['bewijs 1','bewijs 2','bewijs 3'];
  if ((d.centralSubtype === 'kernthema') && nZw > 0 && bewijzen.length > 0) {
    const archRightX = zwStartX + (nZw-1)*(ZW_W+20) + ZW_W;
    const spineX   = archRightX + 20;
    const bvStartX = spineX + 16;
    const archCabCY = TOP_Y + 35 + bvExtraTop; // meeschuiven met extra top-ruimte
    const totalBvH  = bewijzen.length * BV_H + (bewijzen.length-1) * BV_GAP;
    const bvTopY    = Math.round(archCabCY - totalBvH/2);
    const bvCYs    = bewijzen.map((_,i) => bvTopY + i*(BV_H+BV_GAP) + BV_H/2);

    // Horizontale lijn: kast → spine, ALTIJD op archCabCY (zelfde punt bij 1, 2 of 3 ovaaltjes)
    const hConn = document.createElementNS('http://www.w3.org/2000/svg','line');
    setA(hConn,{x1:archRightX, y1:archCabCY, x2:spineX, y2:archCabCY, stroke:GRN, 'stroke-width':'1.5'});
    svg.appendChild(hConn);

    // Verticale spine (altijd van eerste tot laatste ovaal-center, ook door archCabCY)
    const spineTop = Math.min(archCabCY, bvCYs[0]);
    const spineBot = Math.max(archCabCY, bvCYs[bewijzen.length-1]);
    if (spineTop < spineBot) {
      const vSpine = document.createElementNS('http://www.w3.org/2000/svg','line');
      setA(vSpine,{x1:spineX, y1:spineTop, x2:spineX, y2:spineBot, stroke:GRN, 'stroke-width':'1.5'});
      svg.appendChild(vSpine);
    }

    bewijzen.forEach((bv, i) => {
      const bvY  = bvTopY + i*(BV_H+BV_GAP);
      const bvCY = bvCYs[i];

      // Stub: spine → ovaal-linkerrand
      const hStub = document.createElementNS('http://www.w3.org/2000/svg','line');
      setA(hStub,{x1:spineX, y1:bvCY, x2:bvStartX, y2:bvCY, stroke:GRN, 'stroke-width':'1.5'});
      svg.appendChild(hStub);

      // Wrapper (geen overflow:hidden zodat × buiten ovaal uitsteekt)
      const wrap = document.createElement('div');
      wrap.style.cssText=`position:absolute;left:${bvStartX}px;top:${bvY}px;width:${BV_W}px;height:${BV_H}px;`;

      // Ovaal
      const el = document.createElement('div');
      el.style.cssText=`position:absolute;inset:0;background:${N_BG};border:2px solid ${N_BD};border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4px 16px;box-sizing:border-box;overflow:hidden;`;
      const lbl3 = document.createElement('div'); lbl3.textContent='US/UR-repr'; lbl3.style.cssText=`font-size:8px;font-weight:800;color:${N_BD};flex-shrink:0;`;
      const bewijsLbl = document.createElement('div'); bewijsLbl.textContent=BV_LABELS[i]||''; bewijsLbl.style.cssText=`font-size:10px;font-weight:600;color:${N_BD};flex-shrink:0;`;
      const ta = makeTa(bv.text||'',`kerngebeurtenis ${i+1}`,v=>{d.bewijsOvals[i].text=v;save();});
      ta.style.cssText+=`text-align:center;color:${DBLUE};font-size:13px;`;
      el.append(lbl3,bewijsLbl,ta);
      liveFill(el,ta,LBLU,BLU,lbl3);

      // × buiten de ovaal (rechtsboven de wrapper)
      const del = document.createElement('button'); del.textContent='×'; del.className='no-print';
      del.style.cssText='position:absolute;top:-6px;right:-4px;border:none;background:#eee;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:13px;color:#999;line-height:16px;text-align:center;z-index:5;';
      del.addEventListener('mouseenter',()=>del.style.color='var(--danger)');
      del.addEventListener('mouseleave',()=>del.style.color='#999');
      del.addEventListener('click',()=>{d.bewijsOvals.splice(i,1);save();redraw();});

      wrap.append(el,del); canvas.appendChild(wrap);
    });
  }

  /* Extra ovaaltjes boven archief-ovaal (alleen voor isArc, niet voor kerngebeurtenis-archief) */
  if (!isKernGebArc) extras.forEach((ov, i) => {
    const ex = exStartX + i*(EX_W+12);
    const el = document.createElement('div');
    el.style.cssText=`position:absolute;left:${ex}px;top:${TOP_Y}px;width:${EX_W}px;height:${EX_H}px;background:${N_BG};border:2px solid ${N_BD};border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px 14px;box-sizing:border-box;overflow:hidden;`;
    const lbl2=document.createElement('div'); lbl2.textContent='US/UR-repr'; lbl2.style.cssText=`font-size:8px;font-weight:800;color:${N_BD};margin-bottom:2px;flex-shrink:0;`;
    const ta=makeTa(ov.text||'','kerngebeurtenis',v=>{d.extraOvals[i].text=v;save();}); ta.style.cssText+=`text-align:center;color:${DBLUE};font-size:13px;`;
    const del=document.createElement('button'); del.textContent='×'; del.className='no-print';
    del.style.cssText='position:absolute;top:3px;right:7px;border:none;background:transparent;cursor:pointer;font-size:12px;color:#aaa;';
    del.addEventListener('click',()=>{d.extraOvals.splice(i,1);save();redraw();});
    el.append(lbl2,ta,del); canvas.appendChild(el);
    liveFill(el, ta, LBLU, BLU, lbl2);
    const exCX = ex+EX_W/2;
    svgLine(exCX, TOP_Y+EX_H, ovCX, ovY-2);
  });

  /* Extra ovaaltjes boven kerngebeurtenis-archief ovaal */
  if (isKernGebArc && nEx > 0) {
    const KE_W = 152, KE_H = 82;
    const keTotalW = nEx * KE_W + (nEx-1)*12;
    const keStartX = Math.round(ovCX - keTotalW/2);
    const keY = TOP_Y; // boven de centrale ovaal

    // Teken bracket-verbinding: stubs omlaag + horizontale balk + 1 lijn naar centrale ovaal
    const stubBottom = keY + KE_H + 20; // Y van de horizontale balk
    const bracketCX  = Math.round(keStartX + keTotalW/2); // midden van de balk

    extras.forEach((ov, i) => {
      const ke = keStartX + i*(KE_W+12);
      const keCX = ke + KE_W/2;
      // Wrapper (geen overflow:hidden, zodat × zichtbaar buiten ovaal)
      const wrap = document.createElement('div');
      wrap.style.cssText=`position:absolute;left:${ke}px;top:${keY}px;width:${KE_W}px;height:${KE_H}px;`;
      const el = document.createElement('div');
      el.style.cssText=`position:absolute;inset:0;background:${N_BG};border:2px solid ${N_BD};border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px 14px;box-sizing:border-box;overflow:hidden;`;
      const lbl2=document.createElement('div'); lbl2.textContent='US/UR-repr'; lbl2.style.cssText=`font-size:8px;font-weight:800;color:${N_BD};margin-bottom:2px;flex-shrink:0;`;
      const kePholder = `kerngebeurtenis ${i+1}`;
      const ta=makeTa(ov.text||'',kePholder,v=>{d.extraOvals[i].text=v;save();}); ta.style.cssText+=`text-align:center;color:${DBLUE};font-size:13px;`;
      ta.addEventListener('focus', () => { let v=ta.value.trim(); if(v.startsWith("'")&&v.endsWith("'")&&v.length>2) ta.value=v.slice(1,-1); });
      ta.addEventListener('blur',  () => { let v=ta.value.trim(); if(v&&!v.startsWith("'")) v="'"+v+"'"; if(ta.value!==v) ta.value=v; d.extraOvals[i].text=v; save(); });
      el.append(lbl2,ta);
      liveFill(el, ta, LBLU, BLU, lbl2);
      const del=document.createElement('button'); del.textContent='×'; del.className='no-print';
      del.style.cssText='position:absolute;top:-6px;right:-4px;border:none;background:#eee;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:13px;color:#999;line-height:16px;text-align:center;z-index:5;';
      del.addEventListener('mouseenter',()=>del.style.color='var(--danger)');
      del.addEventListener('mouseleave',()=>del.style.color='#999');
      del.addEventListener('click',()=>{d.extraOvals.splice(i,1);save();redraw();});
      wrap.append(el,del); canvas.appendChild(wrap);

      // Stub van ovaal-onderkant naar horizontale balk
      const stubLine = document.createElementNS('http://www.w3.org/2000/svg','line');
      stubLine.setAttribute('x1', keCX); stubLine.setAttribute('y1', keY+KE_H);
      stubLine.setAttribute('x2', keCX); stubLine.setAttribute('y2', stubBottom);
      stubLine.setAttribute('stroke', GRN); stubLine.setAttribute('stroke-width','1.5');
      svg.appendChild(stubLine);
    });

    // Horizontale balk (alleen bij meerdere ovaaltjes)
    if (nEx > 1) {
      const hLine = document.createElementNS('http://www.w3.org/2000/svg','line');
      hLine.setAttribute('x1', keStartX+KE_W/2); hLine.setAttribute('y1', stubBottom);
      hLine.setAttribute('x2', keStartX+(nEx-1)*(KE_W+12)+KE_W/2); hLine.setAttribute('y2', stubBottom);
      hLine.setAttribute('stroke', GRN); hLine.setAttribute('stroke-width','1.5');
      svg.appendChild(hLine);
    }

    // Enkele lijn van midden balk naar bovenkant centrale ovaal
    svgLine(bracketCX, stubBottom, ovCX, ovY);
  }

  /* Repr bij archief-ovaal + top-rij ovaaltjes */
  if (isArc && nEx > 0 && d.showRepr) {
    canvas.appendChild(mkRepr(reprX, TOP_Y));
    svgLine(exStartX+exTotalW, TOP_Y+EX_H/2, reprX-2, TOP_Y+EX_H/2);
  }

  /* Centrale ovaal */
  if (isArc) {
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${ovX}px;top:${ovY}px;width:${OV_W}px;height:${OV_H}px;background:${N_BG};border:2px solid ${N_BD};border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:${Math.round(OV_H*.18)}px ${Math.round(OV_W*.1)}px;box-sizing:border-box;overflow:hidden;`;
    // Vaste beschrijvende tekst (blijft altijd zichtbaar)
    const descLbl=document.createElement('div');
    descLbl.textContent='archief met samenhangende US/UR-representaties';
    descLbl.style.cssText=`font-size:8px;font-weight:700;color:${N_BD};margin-bottom:4px;flex-shrink:0;line-height:1.3;`;
    // Titel-rij: "titel:" + invoerveld
    const titleRow=document.createElement('div');
    titleRow.style.cssText='display:flex;align-items:baseline;gap:4px;flex-shrink:0;width:100%;justify-content:center;';
    const titlePfx=document.createElement('span');
    titlePfx.textContent='titel:';
    titlePfx.style.cssText=`font-size:11px;font-weight:700;color:${N_BD};white-space:nowrap;flex-shrink:0;`;
    const ta=makeTa(d.centralArchiefLabel||'','',v=>{d.centralArchiefLabel=v;save();}); ta.style.cssText+=`text-align:left;color:${TXT};font-size:13px;`;
    titleRow.append(titlePfx, ta);
    el.append(descLbl, titleRow); canvas.appendChild(el);
    // liveFill met callback voor zowel descLbl als titlePfx
    (function() {
      function upd() {
        const filled = ta.value.trim().length > 0;
        el.style.background  = filled ? LBLU : N_BG;
        el.style.borderColor = filled ? BLU  : N_BD;
        descLbl.style.color  = filled ? BLU  : N_BD;
        titlePfx.style.color = filled ? BLU  : N_BD;
      }
      upd(); ta.addEventListener('input', upd);
    })();
    if (d.showRepr && nEx===0) {
      canvas.appendChild(mkRepr(reprX, reprY));
      svgLine(ovX+OV_W, ovY+OV_H/2, reprX-2, ovY+OV_H/2);
    }
  } else {
    const isSq  = d.assocType === 'sequentieel';
    const isRef = d.assocType === 'referentieel' || d.assocType === '';
    const isIdt = d.assocType === 'identiteit';
    // Bij identiteit is US/UR altijd kernthema; sub hoeft niet gekozen te worden
    const sub   = isIdt ? 'kernthema' : (d.centralSubtype || '');

    if (isRef || isIdt) {
      /* --- Referentieel: klikbare subtype-keuze in de ovaal --- */
      const el = document.createElement('div');
      el.style.cssText = `position:absolute;left:${ovX}px;top:${ovY}px;width:${OV_W}px;height:${OV_H}px;background:${N_BG};border:2px solid ${N_BD};border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:${Math.round(OV_H*.17)}px ${Math.round(OV_W*.1)}px;box-sizing:border-box;overflow:hidden;`;

      if (sub === 'kernthema') {
        const lblRow = document.createElement('div');
        lblRow.style.cssText = 'display:flex;align-items:center;gap:4px;justify-content:center;flex-shrink:0;margin-bottom:2px;';
        const lbl = document.createElement('div');
        lbl.textContent = isIdt ? 'US/UR-repr' : 'US/UR-kernthema';
        lbl.style.cssText = `font-size:10px;font-weight:800;color:${N_BD};`;
        if (!isIdt) {
          const resetKT = document.createElement('span');
          resetKT.textContent = '↩';
          resetKT.title = 'keuze ongedaan maken';
          resetKT.style.cssText = `font-size:10px;color:${N_BD};cursor:pointer;opacity:.6;`;
          resetKT.addEventListener('click', () => { d.centralSubtype=''; d.centralText=''; save(); redraw(); });
          lblRow.append(resetKT);
        }
        lblRow.prepend(lbl);
        const _ctRaw = d.centralText || '';
        const _ctVal = (_ctRaw.startsWith('(') && _ctRaw.endsWith(')') && _ctRaw.length > 2) ? _ctRaw.slice(1,-1) : _ctRaw;
        const ta = makeCE(_ctVal, isIdt ? '' : 'zelfbeeld/ mensbeeld/ wereldbeeld', v => { d.centralText = v; save(); });
        ta.style.cssText += `text-align:center;color:${TXT};font-size:13px;`;
        ta.addEventListener('blur', () => {
          const v = ta.value.trim();
          if (ta.value !== v) ta.value = v;
          d.centralText = v; save();
        });
        el.append(lblRow, ta);
        (function(){ function upd(){ const txt=('value' in ta)?ta.value:ta.textContent; const filled=txt.trim().length>0; el.style.background=filled?LBLU:N_BG; el.style.borderColor=filled?BLU:N_BD; lbl.style.color=filled?BLU:N_BD; } upd(); ta.addEventListener('input',upd); })();
      } else if (sub === 'kerngebeurtenis') {
        /* tussenstap: keuze enkelvoudig of archief */
        const lbl = document.createElement('div');
        lbl.textContent = 'US/UR-repr';
        lbl.style.cssText = `font-size:10px;font-weight:800;color:${N_BD};margin-bottom:4px;flex-shrink:0;`;
        const resetKG = document.createElement('span');
        resetKG.textContent = '↩';
        resetKG.title = 'terug naar hoofdkeuze';
        resetKG.style.cssText = `font-size:10px;color:${N_BD};cursor:pointer;opacity:.6;margin-left:4px;`;
        resetKG.addEventListener('click', () => { d.centralSubtype=''; d.centralText=''; save(); redraw(); });
        lbl.appendChild(resetKG);
        const choiceDiv2 = document.createElement('div');
        choiceDiv2.style.cssText = 'display:flex;flex-direction:column;gap:2px;align-items:center;';
        const mkSub = (label, val) => {
          const span = document.createElement('span');
          span.textContent = label;
          span.style.cssText = `font-size:12px;color:${N_BD};cursor:pointer;text-decoration:underline;text-underline-offset:2px;text-decoration-style:dotted;padding:1px 2px;border-radius:3px;transition:color .15s;`;
          span.addEventListener('mouseenter', () => span.style.color = BLU);
          span.addEventListener('mouseleave', () => span.style.color = N_BD);
          span.addEventListener('click', () => { d.centralSubtype = val; save(); redraw(); });
          return span;
        };
        choiceDiv2.append(mkSub('kerngebeurtenis', 'kerngebeurtenis-enkel'), mkSub('archief met kerngebeurtenissen', 'kerngebeurtenis-archief'));
        el.append(lbl, choiceDiv2);
      } else if (sub === 'kerngebeurtenis-enkel') {
        const lblRow = document.createElement('div');
        lblRow.style.cssText = 'display:flex;align-items:center;gap:4px;justify-content:center;flex-shrink:0;margin-bottom:2px;';
        const lbl = document.createElement('div');
        lbl.textContent = 'US/UR-repr';
        lbl.style.cssText = `font-size:10px;font-weight:800;color:${N_BD};`;
        const resetKG = document.createElement('span');
        resetKG.textContent = '↩';
        resetKG.title = 'keuze ongedaan maken';
        resetKG.style.cssText = `font-size:10px;color:${N_BD};cursor:pointer;opacity:.6;`;
        resetKG.addEventListener('click', () => { d.centralSubtype='kerngebeurtenis'; d.centralText=''; save(); redraw(); });
        lblRow.append(lbl, resetKG);
        const ta = makeTa(d.centralText || '', 'kerngebeurtenis', v => { d.centralText = v; save(); });
        ta.style.cssText += `text-align:center;color:${TXT};font-size:13px;`;
        el.append(lblRow, ta);
        liveFill(el, ta, LBLU, BLU, lbl);
      } else if (sub === 'kerngebeurtenis-archief') {
        /* ovaal als archief: label + titel-textarea + kastafbeelding onderaan */
        el.style.justifyContent = 'flex-start';
        el.style.paddingTop = '16px';
        el.style.paddingBottom = '38px'; // ruimte voor kastje onderaan
        el.style.gap = '3px';
        const lbl = document.createElement('div');
        lbl.textContent = 'archief met samenhangende kerngebeurtenissen m.b.t.';
        lbl.style.cssText = `font-size:8px;font-weight:800;color:${N_BD};margin-bottom:1px;text-align:center;line-height:1.3;flex-shrink:0;`;
        const resetAK = document.createElement('span');
        resetAK.textContent = '↩';
        resetAK.title = 'keuze ongedaan maken';
        resetAK.style.cssText = `font-size:10px;color:${N_BD};cursor:pointer;opacity:.6;margin-left:4px;`;
        resetAK.addEventListener('click', () => { d.centralSubtype='kerngebeurtenis'; d.centralText=''; save(); redraw(); });
        lbl.appendChild(resetAK);
        // Handmatig textarea zonder autosize, max 2 regels
        const ta = document.createElement('textarea');
        ta.value = d.centralText || '';
        ta.placeholder = 'titel';
        ta.style.cssText = `flex-shrink:0;width:100%;height:30px;box-sizing:border-box;resize:none;border:none;outline:none;background:transparent;font:inherit;font-size:13px;color:${TXT};padding:0;margin:0;text-align:center;line-height:1.35;overflow:hidden;`;
        ta.addEventListener('keydown', e => {
          if (e.key === 'Enter' && (ta.value.match(/\n/g)||[]).length >= 1) e.preventDefault();
        });
        ta.addEventListener('input', () => { d.centralText = ta.value; save(); });
        ta.addEventListener('click', e => e.stopPropagation());
        // Kastje absoluut onderaan gecentreerd — kan nooit verdwijnen
        const ico = mkCabinetSvg(44, 36, '#888');
        ico.style.cssText += 'position:absolute;bottom:10px;left:50%;transform:translateX(-30%);';
        el.append(lbl, ta, ico);
        (function(){ function upd(){ const filled=ta.value.trim().length>0; el.style.background=filled?LBLU:N_BG; el.style.borderColor=filled?BLU:N_BD; lbl.style.color=filled?BLU:N_BD; resetAK.style.color=filled?BLU:N_BD; } upd(); ta.addEventListener('input',upd); })();
      } else if (sub === 'metacognitief') {
        const lblRow = document.createElement('div');
        lblRow.style.cssText = 'display:flex;align-items:center;gap:4px;justify-content:center;flex-shrink:0;margin-bottom:2px;';
        const lbl = document.createElement('div');
        lbl.textContent = 'US/UR-repr van metacognitieve kennis';
        lbl.style.cssText = `font-size:8px;font-weight:800;color:${N_BD};`;
        const resetMC = document.createElement('span');
        resetMC.textContent = '↩';
        resetMC.title = 'keuze ongedaan maken';
        resetMC.style.cssText = `font-size:10px;color:${N_BD};cursor:pointer;opacity:.6;`;
        resetMC.addEventListener('click', () => { d.centralSubtype=''; d.centralText=''; save(); redraw(); });
        lblRow.append(lbl, resetMC);
        const _mcRaw = d.centralText || '';
        const _mcVal = (_mcRaw.startsWith("'") && _mcRaw.endsWith("'") && _mcRaw.length > 2) ? _mcRaw.slice(1,-1) : _mcRaw;
        const ta = makeCE(_mcVal, "bv TEF, TAF, MTAF,...", v => { d.centralText = v; save(); });
        ta.style.cssText += `text-align:center;color:${TXT};font-size:13px;`;
        ta.addEventListener('blur', () => {
          d.centralText = ta.innerHTML; save();
        });
        el.append(lblRow, ta);
        (function(){ function upd(){ const txt=('value' in ta)?ta.value:ta.textContent; const filled=txt.trim().length>0; el.style.background=filled?LBLU:N_BG; el.style.borderColor=filled?BLU:N_BD; lbl.style.color=filled?BLU:N_BD; resetMC.style.color=filled?BLU:N_BD; } upd(); ta.addEventListener('input',upd); })();
      } else {
        /* geen subtype gekozen: toon klikbare keuze */
        const lbl = document.createElement('div');
        lbl.textContent = 'US/UR-repr';
        lbl.style.cssText = `font-size:10px;font-weight:800;color:${N_BD};margin-bottom:4px;flex-shrink:0;`;
        el.appendChild(lbl);
        const choiceDiv = document.createElement('div');
        choiceDiv.style.cssText = 'display:flex;flex-direction:column;gap:2px;align-items:center;justify-content:center;';
        const mkChoice = (label, subtypeVal) => {
          const span = document.createElement('span');
          span.textContent = label;
          span.style.cssText = `font-size:12px;color:${N_BD};cursor:pointer;text-decoration:underline;text-underline-offset:2px;text-decoration-style:dotted;padding:1px 2px;border-radius:3px;transition:color .15s;`;
          span.addEventListener('mouseenter', () => span.style.color = BLU);
          span.addEventListener('mouseleave', () => span.style.color = N_BD);
          span.addEventListener('click', () => { d.centralSubtype = subtypeVal; save(); redraw(); });
          return span;
        };
        choiceDiv.append(mkChoice('kernthema', 'kernthema'), mkChoice('kerngebeurtenis', 'kerngebeurtenis'), mkChoice('metacognitieve kennis', 'metacognitief'));
        el.append(choiceDiv);
      }
      canvas.appendChild(el);
    } else {
      const ovPh = isSq ? 'kerngebeurtenis' : 'kernthema/ kerngebeurtenis';
      canvas.appendChild(mkOval(ovX,ovY,OV_W,OV_H,'US/UR-repr','centralText',ovPh,LBLU,BLU));
    }

    if (d.showRepr) {
      canvas.appendChild(mkRepr(reprX, reprY));
      svgLine(ovX+OV_W, ovY+OV_H/2, reprX-2, ovY+OV_H/2);
    }
  }

  /* CR */
  canvas.appendChild(mkBox(crX, crY, CR_W, CR_H, 'CR', 'cr', 'emotionele reactie', LGRN, GRN));

  /* Pijlen CS → centrale ovaal */
  const csMY=csY+CS_H/2, csR=csX+CS_W, ovMY=ovY+OV_H/2;
  if      (d.assocType==='referentieel') svgArc(csR,csMY,ovX,ovMY);
  else if (d.assocType==='identiteit')   svgDbl(csR,csMY,ovX,ovMY);

  /* Accolade boven CS + US/UR bij identiteit + "ik" in CS */
  if (showAccolade) {
    svgAccolade(accoLeftX, accoRightX, accoArmBottom, accoArmTop, accoNotchH);
  }
  else if (d.assocType==='sequentieel' && d.causal) svgThickArrow(csR+4,csMY,ovX-4,ovMY);
  else if (d.assocType==='sequentieel')  svgLine(csR,csMY,ovX-2,ovMY);
  /* anders (assocType leeg): geen pijl tekenen */

  /* Pijl centrale ovaal → CR */
  svgLine(ovCX, ovY+OV_H, crX+CR_W/2, crY-2);

  canvas.appendChild(svg);
  const baPsw = document.createElement('div');
  baPsw.className = 'print-scale-wrap';
  baPsw.appendChild(canvas);
  container.appendChild(baPsw);
}

/* ─────────────────────────────────────────
   Titelregel — bovenaan FA en BA

function mkTitleRow(d, save, typeLabel) {
  const row = document.createElement('div');
  row.className = 'no-print';
  row.style.cssText = 'padding:10px 24px 4px;display:flex;align-items:baseline;gap:8px;';

  /* Type-label ("FA", "BA", "HT") — duidelijk */
  const badge = document.createElement('span');
  badge.textContent = typeLabel;
  badge.style.cssText = 'font-size:15px;font-weight:800;color:#4A6E8A;letter-spacing:.06em;flex-shrink:0;';
  row.appendChild(badge);

  /* Titel-input */
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = d.title || '';
  inp.placeholder = 'titel';
  inp.style.cssText = 'flex:1;font-size:13px;font-weight:400;border:none;border-bottom:1px dashed #ccc;background:transparent;color:#1D3557;outline:none;padding:1px 0;transition:border-color .15s, border-style .15s;';
  inp.addEventListener('focus', () => { inp.style.borderBottomColor = '#4A6E8A'; inp.style.borderBottomStyle = 'solid'; inp.style.fontWeight = '600'; });
  inp.addEventListener('blur',  () => { inp.style.borderBottomColor = '#ccc';    inp.style.borderBottomStyle = 'dashed'; inp.style.fontWeight = d.title ? '600' : '400'; });
  inp.addEventListener('input', () => save({ title: inp.value }));

  row.appendChild(inp);
  return row;
}

/* ─────────────────────────────────────────
   Preview-overlay
───────────────────────────────────────── */
function buildPreviewOverlay(d) {
  window._previewMode = true;

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:9000;overflow:auto;padding:48px 40px 60px;box-sizing:border-box;';

  // Sluitknop
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕ Sluiten';
  closeBtn.style.cssText = 'position:fixed;top:14px;right:24px;z-index:9001;background:#f0f0f0;border:1px solid #ccc;border-radius:6px;padding:6px 16px;font-size:13px;cursor:pointer;';
  closeBtn.addEventListener('click', () => { window._previewMode = false; document.body.removeChild(overlay); });
  overlay.appendChild(closeBtn);

  // Verzamel en sorteer analyses in de groep
  const allData = load();
  let siblings = allData.filter(a => a.groupId === d.groupId);
  if (d.groupOrder && d.groupOrder.length) {
    siblings.sort((a,b) => {
      const ai = d.groupOrder.indexOf(a.id), bi = d.groupOrder.indexOf(b.id);
      return (ai<0?999:ai) - (bi<0?999:bi);
    });
  }

  siblings.forEach(sib => {
    const block = document.createElement('div');
    block.style.cssText = 'margin-bottom:48px;';

    // Titel boven het schema (als die er is)
    if (sib.title || sib.client) {
      const titleDiv = document.createElement('div');
      titleDiv.style.cssText = 'font-size:15px;font-weight:700;color:#1D3557;margin-bottom:8px;';
      titleDiv.textContent = [sib.title, sib.client].filter(Boolean).join(' — ');
      block.appendChild(titleDiv);
    }

    // Render de canvas in een tijdelijke container
    const tmp = document.createElement('div');
    if (sib.type === 'FA') {
      buildFA(tmp, sib, ()=>{}, true); // _noGroup=true voorkomt recursie
      const canvas = tmp.querySelector('.fa-canvas');
      if (canvas) block.appendChild(canvas);
    } else if (sib.type === 'BA') {
      buildBACanvas(tmp, sib, ()=>{}, ()=>{});
      const canvas = tmp.querySelector('.ba-canvas');
      if (canvas) { canvas.style.position='relative'; block.appendChild(canvas); }
    }

    overlay.appendChild(block);
  });

  // Maak alle textareas read-only en visueel clean
  overlay.querySelectorAll('textarea').forEach(ta => {
    ta.readOnly = true; ta.style.cursor = 'default'; ta.style.userSelect = 'text';
  });
  overlay.querySelectorAll('[contenteditable="true"]').forEach(ce => {
    ce.contentEditable = 'false'; ce.style.cursor = 'default'; ce.style.userSelect = 'text';
  });
  // Verberg no-print elementen (knoppen, cfg-balk, etc.) — sluitknop uitgezonderd
  overlay.querySelectorAll('.no-print, .action-bar').forEach(el => el.style.display = 'none');
  overlay.querySelectorAll('button').forEach(el => {
    if (el !== closeBtn) el.style.display = 'none';
  });

  window._previewMode = false;
  document.body.appendChild(overlay);
}

/* ─────────────────────────────────────────
   Groepbalk — gerelateerde FA's en BA's
───────────────────────────────────────── */
function buildGroupBar(container, d) {
  if (!d.groupId) return;

  /* ── Inline schema-renderer voor één analyse ── */
  function renderInlineSchema(sibling, groupSection, fullList) {
    const sec = document.createElement('div');
    sec.className = 'group-section';
    sec.style.cssText = 'border-top:2px solid var(--border);margin-top:4px;position:relative;';

    // Mini-actiebalk: type-badge + titel + prullenbak + pijltjes
    const miniBar = document.createElement('div');
    miniBar.className = 'no-print';
    miniBar.style.cssText = 'display:flex;align-items:center;gap:8px;padding:6px 16px;background:#fafafa;border-bottom:1px solid var(--border);';

    const typeColor = sibling.type==='FA' ? 'var(--fa)' : 'var(--bas)';
    const typeBadge = document.createElement('span');
    typeBadge.textContent = sibling.type;
    typeBadge.style.cssText = `font-size:10px;font-weight:800;background:${typeColor};color:#fff;border-radius:4px;padding:2px 6px;flex-shrink:0;`;

    const titleInp = document.createElement('input');
    titleInp.type='text'; titleInp.value=sibling.title||'';
    titleInp.placeholder='titel';
    titleInp.style.cssText='flex:1;font-size:13px;font-weight:600;border:none;border-bottom:1px dashed #ccc;background:transparent;color:#1D3557;outline:none;padding:1px 0;';
    titleInp.addEventListener('focus',()=>titleInp.style.borderBottomColor='var(--cgt-blue)');
    titleInp.addEventListener('blur', ()=>titleInp.style.borderBottomColor='#ccc');
    titleInp.addEventListener('input',()=>{ sibling.title=titleInp.value; upsert(sibling); });

    // Volgorde
    const idx = fullList.findIndex(a=>a.id===sibling.id);
    const mkArr = (icon, disabled, fn) => {
      const b=document.createElement('button');
      b.innerHTML=icon; b.disabled=disabled;
      b.className='no-print';
      b.style.cssText=`background:none;border:none;cursor:${disabled?'default':'pointer'};color:${disabled?'#ddd':'#999'};font-size:13px;padding:2px 4px;line-height:1;`;
      b.addEventListener('click',fn); return b;
    };
    const swap=(arr,a,b)=>{[arr[a],arr[b]]=[arr[b],arr[a]];};
    const saveGroupOrder = list => {
      const allData=load();
      const newOrder=list.map(a=>a.id);
      allData.forEach(a=>{ if(a.groupId===d.groupId) a.groupOrder=newOrder; });
      dump(allData); d.groupOrder=newOrder;
    };

    const delBtn = mkTrashBtn('no-print', 'Verwijder', () => {
      if(confirm(`Verwijder deze ${sibling.type}?`)) { remove(sibling.id); render(); }
    });
    delBtn.style.cssText+='background:none;border:none;cursor:pointer;color:#ccc;padding:4px;display:flex;align-items:center;';
    delBtn.addEventListener('mouseenter',()=>delBtn.style.color='var(--danger)');
    delBtn.addEventListener('mouseleave',()=>delBtn.style.color='#ccc');

    miniBar.append(
      typeBadge, titleInp,
      mkArr('▲', idx===0, ()=>{ const l=[...fullList]; swap(l,idx,idx-1); saveGroupOrder(l); render(); }),
      mkArr('▼', idx===fullList.length-1, ()=>{ const l=[...fullList]; swap(l,idx,idx+1); saveGroupOrder(l); render(); }),
      delBtn
    );
    sec.appendChild(miniBar);

    // Schema inline renderen
    const schemaWrap = document.createElement('div');
    sec.appendChild(schemaWrap);

    if (sibling.type==='FA') {
      const sd = sibling;
      const saveSibling = extra => { if (extra) Object.assign(sd, extra); upsert(sd); };
      const redrawSibling = () => { schemaWrap.innerHTML=''; buildFA(schemaWrap, sd, saveSibling, true); };
      buildFA(schemaWrap, sd, saveSibling, true);
    } else if (sibling.type==='BA') {
      const sd = sibling;
      const themeRow2 = document.createElement('div'); schemaWrap.appendChild(themeRow2);
      const cfgBar2   = document.createElement('div'); schemaWrap.appendChild(cfgBar2);
      const canvasWrap2 = document.createElement('div'); canvasWrap2.style.cssText='padding:20px 24px;overflow:auto;'; schemaWrap.appendChild(canvasWrap2);
      const saveSibling = extra => { if (extra) Object.assign(sd, extra); upsert(sd); };
      const redrawSibling = () => {
        themeRow2.innerHTML=''; themeRow2.appendChild(mkThemePicker(sd, id=>{ saveSibling({theme:id}); redrawSibling(); }));
        buildBACfgBar(cfgBar2, sd, saveSibling, redrawSibling);
        canvasWrap2.innerHTML=''; buildBACanvas(canvasWrap2, sd, saveSibling, redrawSibling);
      };
      redrawSibling();
    }

    return sec;
  }

  /* ── Gesorteerde siblings ophalen (huidige analyse NIET tonen, die staat al boven) ── */
  function getSorted() {
    const all = load().filter(a => a.groupId === d.groupId);
    const order = d.groupOrder || [];
    const ordered = order.map(id=>all.find(a=>a.id===id)).filter(Boolean);
    const rest = all.filter(a=>!order.includes(a.id));
    return [...ordered, ...rest];
  }

  const inner = document.createElement('div');
  container.appendChild(inner);

  function render() {
    inner.innerHTML = '';
    const siblings = getSorted();
    // Toon alle analyses BEHALVE de huidige (die staat al boven)
    const others = siblings.filter(s => s.id !== d.id);

    others.forEach(s => {
      container.appendChild(renderInlineSchema(s, container, siblings));
    });

    /* ── + knop onderaan links ── */
    const footer = document.createElement('div');

          : { id:newId2, type:'BA', title:'', client:'', date:today(), groupId:d.groupId, theme:'blauw', showOs:false, os:'', cs:'', assocType:'', centralType:'usur', centralSubtype:'', centralText:'', centralArchiefLabel:'', extraOvals:[], zweefArchieven:[], bewijsOvals:[], showRepr:false, reprStimulus:'', reprResponse:'', reprBetekenis:'', cr:'' };
        upsert(newAnalysis);
        // Sla volgorde op in alle groepsleden
        const allData2 = load();
        const groupMembers = allData2.filter(a=>a.groupId===d.groupId);
        const newOrder2 = groupMembers.map(a=>a.id);
        allData2.forEach(a=>{ if(a.groupId===d.groupId) a.groupOrder=newOrder2; });
        dump(allData2);
        d.groupOrder = newOrder2;
        render();
      });
      menu.appendChild(opt);
    });

    plusBtn.addEventListener('click', e => {
      e.stopPropagation();
      menu.style.display = menu.style.display==='none' ? 'block' : 'none';

    footer.append(plusBtn, menu);
    inner.appendChild(footer);
  }

  render();
}

function pgHT(c, id) {
  const isNew = id === 'new';
  const emptyData = () => ({
    persoonsfactoren:[], omgevingsfactoren:[], kernovertuigingen:[],
    leefregels:[], coping:[], klachten:[], stressoren:[],
    beschermendeFactoren:[], gevolgen:[], kritischeGebeurtenissen:[]
  });
  let d = isNew ? {
    id: uid(), type:'HT', title:'', client:'', date: today(),
    theme: 'blauw',
    data: emptyData()
  } : byId(id);
  if (!d) { c.innerHTML = '<p style="padding:20px">Niet gevonden.</p>'; return; }
  if (!d.data) d.data = emptyData();
  if (!d.theme) d.theme = 'blauw';

  let saveTimer = null;
  function save(extra) {
    if (extra) Object.assign(d, extra);
    upsert(d);
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => toast('Automatisch opgeslagen ✓'), 1200);
  }

  function redrawHT() {
    c.innerHTML = '';
    buildHT(c, d, save, redrawHT);
  }
  redrawHT();
}
