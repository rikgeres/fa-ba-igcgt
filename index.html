<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CGT Analyse">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4A6E8A">
  <title>CGT Analyse Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cgt-blue: #4A6E8A;
      --cgt-green: #C5DDB8;
      --fa:      #4A6E8A;
      --bas:     #4A6E8A;
      --bar:     #4A6E8A;
      --fa-bg:   #EFF6FF;
      --bas-bg:  #F5F3FF;
      --bar-bg:  #ECFDF5;
      --bg:      #F4F7F2;
      --surface: #FFFFFF;
      --border:  #CBD5E1;
      --txt:     #0F172A;
      --muted:   #64748B;
      --danger:  #DC2626;
      --node-bg: #E8F0E4;
      --node-border: #B2CCAA;
      --node-txt: #2A3D22;
      --r: 10px; --r-sm: 7px;
      --sh: 0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
      --sh-md: 0 4px 12px rgba(0,0,0,.10);
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--txt); line-height: 1.5; -webkit-text-size-adjust: 100%; }

    /* ── App shell ── */
    #app { max-width: 760px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
    #app.ht-mode { max-width: none; }
    #app.ht-mode .app-main { padding: 0; }
    .app-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--cgt-blue); border-bottom: none;
      padding: 12px 14px; display: flex; align-items: center; gap: 8px;
      box-shadow: var(--sh);
    }
    .app-header h1 { font-size: 17px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #fff; }
    .back-btn { background: none; border: none; font-size: 28px; line-height: 1; color: #fff; cursor: pointer; padding: 2px 6px 2px 0; }
    .app-main { flex: 1; padding: 16px; }
    .page { animation: fade .18s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

    /* ── Knoppen ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 16px; border-radius: var(--r-sm); font-size: 15px; font-weight: 600;
      cursor: pointer; border: none; transition: filter .12s;
    }
    .btn:active { filter: brightness(.9); }
    .btn-fa    { background: var(--fa);  color: #fff; }
    .btn-bas   { background: var(--bas); color: #fff; }
    .btn-bar   { background: var(--bar); color: #fff; }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--txt); }
    .btn-danger{ background: var(--danger); color: #fff; }
    .btn-sm    { padding: 7px 12px; font-size: 13px; }
    .btn-full  { width: 100%; }
    .fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--fa); color: #fff; border: none; font-size: 30px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(29,78,216,.45); transition: transform .12s; z-index: 50;
    }
    .fab:active { transform: scale(.94); }

    /* ── Cards & lijstitems ── */
    .card { background: var(--surface); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; }
    .card-pad { padding: 14px; }
    .list-item {
      display: flex; align-items: center; padding: 13px 14px;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:active { background: var(--bg); }
    .list-item .item-del { opacity:0; transition:opacity .15s; background:none; border:none; cursor:pointer; padding:6px 8px; border-radius:6px; color:var(--muted); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .list-item:hover .item-del { opacity:1; }
    .list-item .item-del:hover { color:var(--danger); background:rgba(220,38,38,.07); }
    .badge { width: 44px; height: 44px; border-radius: var(--r-sm); display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0; letter-spacing: .5px; }
    .badge-fa  { background: var(--fa); }
    .badge-bas { background: var(--bas); }
    .badge-bar { background: var(--bar); }
    .item-info { flex: 1; margin-left: 12px; min-width: 0; }
    .item-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta  { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── Formulier basis ── */
    .form-sec { margin-bottom: 18px; }
    .sec-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; padding-left: 2px; }
    .sec-label.c-fa  { color: var(--fa); }
    .sec-label.c-bas { color: var(--bas); }
    .sec-label.c-bar { color: var(--bar); }
    .fgrp { margin-bottom: 11px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .hint { font-size: 12px; color: var(--muted); font-weight: 400; }
    input[type=text], input[type=date], textarea, select {
      width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 15px; font-family: inherit; color: var(--txt); background: var(--surface);
      transition: border-color .14s; -webkit-appearance: none; appearance: none;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--fa); }
    textarea { resize: vertical; min-height: 72px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-footer { position: sticky; bottom: 0; background: linear-gradient(transparent, var(--bg) 30%); padding: 14px 0 18px; margin-top: 4px; }

    /* ── Type-keuzekaarten ── */
    .type-card {
      background: var(--surface); border-radius: var(--r); padding: 16px 14px;
      cursor: pointer; border: 2px solid transparent; box-shadow: var(--sh);
      display: flex; align-items: center; gap: 14px; margin-bottom: 11px;
      transition: box-shadow .12s, transform .12s;
    }
    .type-card:active { transform: scale(.985); }
    .type-icon { width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; letter-spacing: .5px; }
    .type-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .type-info p  { font-size: 13px; color: var(--muted); line-height: 1.4; }

    /* ── Uitklapmodal ── */
    .expand-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 400; display: flex; align-items: flex-end;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } }
    .expand-sheet {
      background: var(--surface); width: 100%; border-radius: 20px 20px 0 0;
      padding: 20px 16px 36px; max-height: 85dvh; display: flex; flex-direction: column;
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } }
    .expand-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .expand-lbl { font-size: 13px; font-weight: 700; color: var(--fa); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
    .expand-ta {
      flex: 1; font-size: 16px; font-family: inherit; color: var(--txt);
      border: 1.5px solid var(--border); border-radius: var(--r-sm);
      padding: 11px 13px; resize: none; min-height: 120px; line-height: 1.6;
    }
    .expand-ta:focus { outline: none; border-color: var(--fa); }
    .expand-btns { display: flex; gap: 8px; margin-top: 12px; }
    .expand-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; font-style: italic; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(12px);
      background: #1E293B; color: #fff; padding: 9px 20px; border-radius: 100px;
      font-size: 14px; font-weight: 500; opacity: 0; transition: opacity .18s, transform .18s;
      z-index: 500; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Lege staat ── */
    .empty { text-align: center; padding: 52px 24px; }
    .empty-ico { font-size: 54px; opacity: .35; margin-bottom: 14px; }
    .empty h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty p  { font-size: 15px; color: var(--muted); margin-bottom: 24px; }

    /* ── Actiebalk ── */
    .action-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

    /* ════════════════════════════════════════
       FA VISUEEL DIAGRAM
    ════════════════════════════════════════ */

    /* Header kaart */
    .fa-header-card {
      background: var(--surface); border-radius: var(--r); padding: 13px 14px;
      box-shadow: var(--sh); margin-bottom: 16px;
    }
    .fa-header-card input[type=text] { margin-bottom: 8px; }

    /* Canvas wrapper */
    .fa-canvas {
      background: #E8EEF5;
      border-radius: var(--r);
      padding: 10px 10px 12px;
      box-shadow: var(--sh-md);
      position: relative;
      width: 80%;
    }
    .fa-canvas-title {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .09em; color: var(--fa); margin-bottom: 16px; text-align: center;
    }

    /* ── Diagram layout ── */
    .fa-diagram {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Top rij: Sd ──●●──▶ R ──▶ Sr-pos-repr */
    .fa-top-row {
      display: flex;
      align-items: center;
      gap: 0;
    }

    /* Pijl tussen knopen */
    .fa-arrow {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0 4px;
    }
    .fa-arrow svg { display: block; }

    /* Knopen: rechthoeken */
    .fa-node {
      flex: 1;
      min-height: 55px;
      background: var(--node-bg);
      border: 1.5px solid var(--node-border);
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      transition: filter .14s, transform .12s, box-shadow .14s;
      position: relative;
      user-select: none;
    }
    .fa-node:active { transform: scale(.97); filter: brightness(.95); }
    .fa-node:hover  { box-shadow: 0 0 0 3px rgba(29,78,216,.25); }
    .fa-node.filled { background: #BFDBFE; border-color: #3B82F6; }

    /* Ovaal voor Sr-pos-repr */
    .fa-node-oval {
      flex: 1;
      min-height: 65px;
      background: var(--node-bg);
      border: 2px solid #1E3A5F;
      border-radius: 50%;
      padding: 8px 10px;
      cursor: pointer;
      transition: filter .14s, transform .12s, box-shadow .14s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      user-select: none;
    }
    .fa-node-oval:active { transform: scale(.97); filter: brightness(.95); }
    .fa-node-oval:hover  { box-shadow: 0 0 0 3px rgba(29,78,216,.25); }
    .fa-node-oval.filled { background: #BFDBFE; border-color: #1D4ED8; }

    .fa-node-label {
      font-size: 10px; font-weight: 800; color: var(--node-txt);
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px;
    }
    .fa-node-body {
      font-size: 11px; color: var(--node-txt); line-height: 1.35; word-break: break-word;
    }
    .fa-node-placeholder {
      font-size: 10px; color: #6B8EB3; font-style: italic;
    }
    .fa-node textarea::placeholder,
    .fa-node-oval textarea::placeholder {
      font-size: 9px; color: #6B8EB3; font-style: italic; line-height: 1.3;
    }
    /* Placeholder voor contenteditable hoofdvakken */
    [contenteditable][data-ph]:empty::before {
      content: attr(data-ph);
      color: #aaa; font-style: italic; pointer-events: none;
    }
    .fa-edit-hint {
      position: absolute; bottom: 5px; right: 7px;
      font-size: 10px; color: #6B8EB3; opacity: 0;
      transition: opacity .15s;
    }
    .fa-node:hover .fa-edit-hint { opacity: 1; }

    /* FNC item: × alleen zichtbaar op hover */
    .fnc-item .fnc-del { opacity: 0; transition: opacity .15s; }
    .fnc-item:hover .fnc-del { opacity: 1; }

    /* SR type badges binnen knoop */
    .fa-sr-chips {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px;
      justify-content: center;
    }
    .fa-sr-chip {
      font-family: 'Courier New', monospace; font-size: 12px; font-weight: 700;
      padding: 3px 8px; border-radius: 5px; border: 1.5px solid currentColor;
      cursor: pointer; background: transparent; color: #4B7BA6;
      transition: all .13s; line-height: 1.2;
    }
    .fa-sr-chip.selected { background: var(--fa); color: #fff; border-color: var(--fa); }
    .fa-sr-chip:active { transform: scale(.93); }

    /* Pijl verticaal gedeelte (van R naar beneden naar Sr-neg) */
    .fa-bottom-section {
      display: flex;
      margin-top: 0;
    }
    .fa-bottom-spacer {
      /* breedte van Sd + pijl — zodat Sr-neg uitlijnt onder R */
      flex-shrink: 0;
    }
    .fa-down-col {
      display: flex; flex-direction: column; align-items: center;
      flex: 1;
    }
    .fa-down-arrow {
      padding: 4px 0;
    }

    /* Sr-neg rechthoek onderaan */
    .fa-srneg-row {
      display: flex;
      align-items: flex-start;
      width: 100%;
    }

    /* Annotatiebalk onderaan canvas */
    .fa-legend {
      margin-top: 14px; border-top: 1px dashed #9DB5CF; padding-top: 10px;
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    }
    .fa-legend-item {
      font-size: 11px; color: #4B7BA6; display: flex; align-items: center; gap: 4px;
    }

    /* ── Stap-kaart (BA-S) ── */
    .step-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 13px; margin-bottom: 4px; position: relative; }
    .step-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--bas); color: #fff; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
    .step-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
    .seq-arr { text-align: center; font-size: 20px; color: var(--bas); padding: 2px 0 6px; }

    /* ── Schema weergave (BA) ── */
    .schema-wrap { background: var(--surface); border-radius: var(--r); box-shadow: var(--sh-md); overflow: hidden; }
    .schema-head { padding: 14px 16px; color: #fff; }
    .schema-head h2 { font-size: 15px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
    .schema-head .sh-meta { font-size: 13px; opacity: .88; margin-top: 3px; }
    .sh-fa  { background: var(--fa); }
    .sh-bas { background: var(--bas); }
    .sh-bar { background: var(--bar); }
    .schema-block { border-bottom: 1px solid var(--border); padding: 13px 15px; }
    .schema-block:last-child { border-bottom: none; }
    .sb-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 9px; }
    .sb-fa  { color: var(--fa); }  .sb-bas { color: var(--bas); }  .sb-bar { color: var(--bar); }
    .sf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .sf > .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); display: block; margin-bottom: 3px; }
    .sf > .val { font-size: 14px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .sf > .val:empty::before { content: '—'; color: var(--muted); }
    .schema-arr { text-align: center; font-size: 20px; padding: 4px 0 2px; }
    .schema-arr.c-bar { color: var(--bar); } .schema-arr.c-bas { color: var(--bas); }
    .schema-foot { padding: 7px 15px; font-size: 11px; text-align: right; }
    .sf-fa  { background: var(--fa-bg);  color: #93C5FD; }
    .sf-bas { background: var(--bas-bg); color: #A78BFA; }
    .sf-bar { background: var(--bar-bg); color: #6EE7B7; }
    .kern-block { border-left: 4px solid var(--bar); }
    .circ-block { background: #F0FDF4; border: 1.5px dashed #16A34A; border-radius: var(--r-sm); padding: 10px 13px; display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: #14532D; }

    /* ════════════════════════════════════════
       FA PRINT STIJL
    ════════════════════════════════════════ */
    .fa-print-wrap { display: none; }

    @media print {
      /* Verberg UI-elementen in alle modi */
      .no-print, .app-header { display: none !important; }
      .app-main { padding: 0 !important; margin: 0 !important; }
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;

      /* ── FA print ── */
      .fa-canvas {
        box-shadow: none !important;
        border: 1px solid #ccc !important;
        border-radius: 8px !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .fa-canvas select,
      .fa-canvas .fa-edit-hint,
      .fa-canvas .fnc-del { display: none !important; }

      /* ── BA print ── */
      .ba-canvas {
        box-shadow: none !important;
        border: 1px solid #ccc !important;
        border-radius: 8px !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* ── Scheidingslijn tussen gekoppelde analyses ── */
      .group-section { border-top: none !important; margin-top: 0 !important; }

      /* ── HT print ── */
      #app.ht-mode .app-main { padding: 0 !important; }
      .ht-scroll-wrap {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
        box-shadow: none !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        overflow: visible !important;
      }
      .ht-canvas {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .ht-info-btn { display: none !important; }
    }

    /* Print-schaal wrappers — aangestuurd via JS vóór window.print() */
    .print-scale-wrap { display: contents; }
    @media print {
      .print-scale-wrap {
        display: block !important;
        transform-origin: top left !important;
      }
    }

    /* ── HT Info knop (verschijnt bij hover op balk) ── */
    .ht-card-hdr { position: relative; }
    .ht-info-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,0.25); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: inherit;
      opacity: 0; transition: opacity .15s;
      line-height: 1; padding: 0;
    }
    .ht-card-hdr:hover .ht-info-btn { opacity: 1; }
    .ht-info-btn:hover { background: rgba(255,255,255,0.4); }

    /* ── HT Info modal ── */
    .ht-info-modal {
      position: fixed; inset: 0; z-index: 20000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(2px);
    }
    .ht-info-sheet {
      background: #fff; border-radius: 12px; max-width: 460px; width: 90%;
      max-height: 80vh; overflow-y: auto; box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    .ht-info-sheet-hdr {
      padding: 14px 16px; border-radius: 12px 12px 0 0;
      font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: space-between;
    }
    .ht-info-sheet-body { padding: 14px 16px; font-size: 13px; line-height: 1.6; color: #2a2a2a; }
    .ht-info-close { background: none; border: none; font-size: 20px; cursor: pointer; color: inherit; line-height: 1; padding: 0 2px; opacity: .7; }
    .ht-info-close:hover { opacity: 1; }

    /* ── HT Fullscreen Preview ── */
    .ht-preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #f0f4f8;
      overflow: auto;
    }
    .ht-preview-overlay.active { display: block; }
    .ht-preview-overlay:fullscreen,
    .ht-preview-overlay:-webkit-full-screen {
      background: #f0f4f8;
      overflow: auto;
    }
    .ht-preview-close {
      position: fixed;
      top: 14px; right: 18px;
      z-index: 10000;
      background: rgba(42,118,162,0.85);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    .ht-preview-close:hover { background: rgba(42,118,162,1); }
  </style>
</head>
<body>
<div id="app">
  <header class="app-header" id="hdr">
    <span id="hdr-back"></span>
    <h1 id="hdr-title">CGT Analyse Tool</h1>
    <span id="hdr-act"></span>
  </header>
  <main class="app-main" id="main"></main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   OPSLAG
══════════════════════════════════════════ */
const KEY   = 'igcgt_v3';
const load  = () => { try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; } };
const dump  = d  => localStorage.setItem(KEY, JSON.stringify(d));
const byId  = id => load().find(a => a.id === id);
const upsert = item => {
  const all = load();
  const i = all.findIndex(a => a.id === item.id);
  if (i >= 0) all[i] = item; else all.unshift(item);
  dump(all);
};
const remove = id => dump(load().filter(a => a.id !== id));
const uid    = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today  = () => new Date().toISOString().slice(0,10);

/* Groepering: pending groupId bij aanmaken via + knop */
let _pendingGroup = null;

/* ─────────────────────────────────────────
   Kleurthema's
───────────────────────────────────────── */
const THEMES = {
  blauw: { label:'Blauw',  swatch:'#2A76A2',
    ba:{ blu:'#2A76A2', lblu:'#DDEAF7', grn:'#2A76A2', lgrn:'#EBF5FB', osl:'#E8F4FA', osb:'#7AAEC4' },
    fa:{ dot:'#7A99B0', bg:'#E8EEF5' },
    ht:{ p:'#2A76A2', pl:'#CDDEEA', s:'#83B1C0' } },
  groen: { label:'Groen',  swatch:'#2A7A4A',

    fa:{ dot:'#5A8A6A', bg:'#E8F5EE' },
    ht:{ p:'#2A7A4A', pl:'#C8E8D8', s:'#6AAB80' } },
  paars: { label:'Paars',  swatch:'#6B3FA0',
    ba:{ blu:'#6B3FA0', lblu:'#EDE0F8', grn:'#6B3FA0', lgrn:'#F5EEFF', osl:'#F5EEF8', osb:'#A880C8' },
    fa:{ dot:'#8A70B8', bg:'#F0EAF8' },

  warm:  { label:'Warm',   swatch:'#B85C38',
    ba:{ blu:'#B85C38', lblu:'#FAE5DC', grn:'#B85C38', lgrn:'#FDF2EE', osl:'#FAF0EC', osb:'#C89080' },
    fa:{ dot:'#C07050', bg:'#F8EDE8' },
    ht:{ p:'#B85C38', pl:'#F0D8CC', s:'#D4906A' } },
  amber: { label:'Amber',  swatch:'#A07830',
    ba:{ blu:'#A07830', lblu:'#FAF0D0', grn:'#A07830', lgrn:'#FDF8EC', osl:'#FAF5E0', osb:'#C0A858' },
    fa:{ dot:'#B89048', bg:'#F8F4E0' },
    ht:{ p:'#A07830', pl:'#EEE0B8', s:'#C8A850' } },
  grijs: { label:'Grijs',  swatch:'#5A6070',
    ba:{ blu:'#5A6070', lblu:'#E4E8EC', grn:'#5A6070', lgrn:'#F0F2F4', osl:'#EDEEF0', osb:'#8A9098' },
    fa:{ dot:'#7A808A', bg:'#EEEEEE' },
    ht:{ p:'#5A6070', pl:'#D0D4D8', s:'#8A9098' } },
  roze:  { label:'Roze',   swatch:'#C2457A',
    ba:{ blu:'#C2457A', lblu:'#FAE0ED', grn:'#C2457A', lgrn:'#FDF0F6', osl:'#FAF0F5', osb:'#D880A8' },
    fa:{ dot:'#C870A0', bg:'#F8E8F2' },
    ht:{ p:'#C2457A', pl:'#F0C8DC', s:'#D870A8' } },
};
const THEME_IDS = Object.keys(THEMES);

function mkThemePicker(d, onPick) {
  const row = document.createElement('div');
  row.className = 'no-print';
  row.style.cssText = 'display:flex;align-items:center;gap:5px;padding:6px 14px;border-bottom:1px solid #eee;background:#fafafa;flex-wrap:wrap;';
  const lbl = document.createElement('span');
  lbl.textContent = 'Kleur:';
  lbl.style.cssText = 'font-size:11px;color:#999;flex-shrink:0;';
  row.appendChild(lbl);
  THEME_IDS.forEach(id => {
    const t = THEMES[id];
    const btn = document.createElement('button');
    const active = (d.theme || 'blauw') === id;
    btn.title = t.label;
    btn.style.cssText = `width:18px;height:18px;border-radius:50%;background:${t.swatch};border:${active ? '2.5px solid #333' : '2px solid transparent'};cursor:pointer;flex-shrink:0;outline:2px solid ${active ? t.swatch : 'transparent'};outline-offset:1px;`;
    btn.addEventListener('click', () => { onPick(id); });
    row.appendChild(btn);
  });
  return row;
}

/* ══════════════════════════════════════════
   ROUTER
══════════════════════════════════════════ */
const go = path => { location.hash = path; };
window.addEventListener('hashchange', render);

/* ── Zwevende opmaak-toolbar (vet + lettergrootte) ── */
const _ceFsSave = new WeakMap(); // div → font-size-slaanfunctie
let _activeCE = null;

(function() {
  const bar = document.createElement('div');
  bar.id = 'bold-bar';
  bar.style.cssText = 'position:fixed;z-index:99999;background:#fff;border:1px solid #ccc;border-radius:8px;padding:3px 6px;box-shadow:0 2px 10px rgba(0,0,0,.18);display:none;pointer-events:auto;display:none;gap:2px;align-items:center;';

  function mkBarBtn(label, title, onClick) {
    const b = document.createElement('button');
    b.innerHTML = label; b.title = title;
    b.style.cssText = 'background:none;border:none;cursor:pointer;font-size:13px;padding:2px 7px;border-radius:6px;font-family:inherit;color:#1D3557;line-height:1.4;';
    b.addEventListener('mouseenter', () => b.style.background='#f0f4f8');
    b.addEventListener('mouseleave', () => b.style.background='none');
    b.addEventListener('mousedown', e => { e.preventDefault(); onClick(); });
    return b;
  }

  const boldBtn = mkBarBtn('<b>V</b>', 'Vetgedrukt', () => {
    if (!_activeCE) return;
    const sel = window.getSelection();
    const range = document.createRange();
    range.selectNodeContents(_activeCE);
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('bold');
  });

  const sep = document.createElement('span');
  sep.style.cssText = 'width:1px;height:16px;background:#ddd;flex-shrink:0;';

  const aMin = mkBarBtn('A−', 'Kleiner lettertype', () => changeFontSize(-1));
  const aPlus = mkBarBtn('A+', 'Groter lettertype', () => changeFontSize(+1));

  bar.append(boldBtn, sep, aMin, aPlus);
  document.body.appendChild(bar);

  function changeFontSize(delta) {
    if (!_activeCE) return;
    const cur = parseFloat(_activeCE.style.fontSize) || parseFloat(getComputedStyle(_activeCE).fontSize) || 13;
    const next = Math.max(8, Math.min(22, Math.round(cur) + delta));
    _activeCE.style.fontSize = next + 'px';
    if (_ceFsSave.has(_activeCE)) _ceFsSave.get(_activeCE)(next + 'px');
  }

  function positionNearCE(ce) {
    const rect = ce.getBoundingClientRect();
    bar.style.left = Math.max(4, rect.left) + 'px';
    bar.style.top  = Math.max(4, rect.top + window.scrollY - 38) + 'px';
  }

  function showBar() {
    bar.style.display = 'flex';
  }

  // Toon bij focus op een contenteditable
  document.addEventListener('focusin', e => {
    let el = e.target;
    if (el && el.contentEditable === 'true') {
      _activeCE = el;
      positionNearCE(el);
      showBar();
    }
  });

  // Verberg bij klik buiten toolbar én buiten CE
  document.addEventListener('mousedown', e => {
    if (!bar.contains(e.target) && e.target.contentEditable !== 'true') {
      bar.style.display = 'none';
    }
  });

  // Herpositioneer bij selectie (bold-knop)
  document.addEventListener('selectionchange', () => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) return;
    let el = sel.anchorNode;
    if (el && el.nodeType === 3) el = el.parentElement;
    let inCE = false;
    while (el) { if (el.contentEditable === 'true') { inCE = true; break; } el = el.parentElement; }
    if (!inCE) return;
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    bar.style.left = Math.max(4, rect.left + rect.width/2 - 50) + 'px';
    bar.style.top  = Math.max(4, rect.top + window.scrollY - 38) + 'px';
    showBar();
  });
})();

/* ── Print helper: injecteert tijdelijk de juiste @page + schaal ── */
function printAs(orientation, scale) {
  const margin = orientation === 'landscape' ? '0' : '1cm';
  const css = `
    @page { size: A4 ${orientation}; margin: ${margin}; }
    @media print {
      .print-scale-wrap {
        transform: scale(${scale}) !important;
        transform-origin: top left !important;
        width: ${Math.round(100/scale)}% !important;
      }
    }
  `;
  const s = document.createElement('style');
  s.id = 'print-tmp'; s.textContent = css;
  document.head.appendChild(s);
  window.print();
  setTimeout(() => { const el = document.getElementById('print-tmp'); if (el) el.remove(); }, 500);
}

function route() {
  const h = location.hash.slice(1) || '/';
  const p = h.split('/').filter(Boolean);
  return { seg: p[0] || 'home', p1: p[1] };
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
const toast = (msg, ms=2000) => {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
};

/* ══════════════════════════════════════════
   HTML ESCAPING
══════════════════════════════════════════ */
const esc   = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const escBr = s => esc(s).replace(/\n/g,'<br>');

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function render() {
  const { seg, p1 } = route();
  const main = document.getElementById('main');
  document.getElementById('hdr-back').innerHTML = '';
  document.getElementById('hdr-act').innerHTML  = '';
  main.innerHTML = ''; main.className = 'app-main page';
  document.querySelectorAll('.fab').forEach(f => f.remove());

  const setTitle = t => document.getElementById('hdr-title').textContent = t;
  const backBtn  = path => {
    const b = document.createElement('button');
    b.className = 'back-btn no-print'; b.textContent = '‹';
    b.onclick = () => go(path);
    document.getElementById('hdr-back').appendChild(b);
  };

  switch (seg) {
    case 'home':  setTitle('CGT Analyse Tool'); pgHome(main); break;
    case 'fa':    setTitle(p1==='new'?'Nieuwe FA':'FA'); backBtn('/'); pgFA(main, p1); break;
    case 'ba':    setTitle(p1==='new'?'Nieuwe BA':'BA'); backBtn('/'); pgBA(main, p1); break;
    case 'ht':    setTitle(p1==='new'?'Nieuwe HT':'HT'); backBtn('/'); pgHT(main, p1); break;
    default:      main.innerHTML = '<p style="padding:20px">Pagina niet gevonden.</p>';
  }
}

/* ══════════════════════════════════════════
   HOME
══════════════════════════════════════════ */
function pgHome(c) {
  // Titel/subtitel
  const hero = document.createElement('div');
  hero.style.cssText = 'text-align:center;padding:28px 16px 20px;position:relative;';
  hero.innerHTML = `

  // Info-knop
  const infoBtn = document.createElement('button');
  infoBtn.title = 'Over opslag & veiligheid';
  infoBtn.style.cssText = 'position:absolute;top:28px;right:4px;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:border-color .15s,color .15s;';
  infoBtn.textContent = 'i';
  infoBtn.addEventListener('mouseenter', () => { infoBtn.style.borderColor='var(--cgt-blue)'; infoBtn.style.color='var(--cgt-blue)'; });
  infoBtn.addEventListener('mouseleave', () => { infoBtn.style.borderColor='var(--border)'; infoBtn.style.color='var(--muted)'; });

  hero.appendChild(infoBtn);

  c.appendChild(hero);

  function openInfoModal() {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;padding:20px;';

    const hdr = document.createElement('div');
    hdr.style.cssText = 'background:var(--cgt-blue);color:#fff;padding:20px 24px 0;position:relative;flex-shrink:0;';
    hdr.innerHTML = `<div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.75;margin-bottom:6px">CGT Analyse Tool</div>`;

    const closeBtn = document.createElement('button');
    closeBtn.innerHTML = '✕';
    closeBtn.style.cssText = 'position:absolute;top:16px;right:18px;background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .15s;';
    closeBtn.addEventListener('mouseenter', () => closeBtn.style.background='rgba(255,255,255,.35)');
    closeBtn.addEventListener('mouseleave', () => closeBtn.style.background='rgba(255,255,255,.2)');
    closeBtn.addEventListener('click', () => overlay.remove());
    hdr.appendChild(closeBtn);

    // Tabs in header
    const tabBar = document.createElement('div');
    tabBar.style.cssText = 'display:flex;gap:0;margin-top:4px;';
    const TABS = ['Opslag & veiligheid', 'Over deze tool'];
    let activeTab = 0;
    const tabBtns = TABS.map((label, i) => {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.style.cssText = `background:none;border:none;color:#fff;font-size:13px;font-weight:600;padding:10px 18px 10px;cursor:pointer;border-bottom:3px solid transparent;opacity:.65;transition:opacity .15s,border-color .15s;font-family:inherit;`;
      btn.addEventListener('click', () => { activeTab = i; renderTab(); });
      tabBar.appendChild(btn);
      return btn;
    });
    hdr.appendChild(tabBar);
    modal.appendChild(hdr);

    // Scrollable body
    const body = document.createElement('div');
    body.style.cssText = 'padding:24px 24px 28px;overflow-y:auto;flex:1;';

    function mkP(txt, extra='') {
      const p = document.createElement('p');
      p.style.cssText = `font-size:14px;line-height:1.65;color:#2a2a2a;margin:0 0 16px;${extra}`;

    function mkSub(txt) {
      const d = document.createElement('div');

    }
    function mkList(items) {
      const ul = document.createElement('ul');
      ul.style.cssText = 'margin:0 0 20px;padding:0;list-style:none;display:flex;flex-direction:column;gap:8px;';

    function mkTip(html) {
      const d = document.createElement('div');
      d.style.cssText = 'background:#F0F6FF;border-left:3px solid var(--cgt-blue);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:18px;font-size:13px;line-height:1.6;color:#1D3557;';
      d.innerHTML = html;
      return d;

    function mkWarning(html) {
      const d = document.createElement('div');

        const contact = document.createElement('div');

        body.appendChild(mkP('Alle analyses worden opgeslagen in de lokale opslag (localStorage) van je browser. Er is geen account, geen cloud en geen externe server — je gegevens verlaten je apparaat niet.'));

        body.appendChild(mkList([

          'Chrome en Safari delen je gegevens niet met elkaar.',

        body.appendChild(mobileTip);

        body.appendChild(mkWarning('<span style="font-size:16px;flex-shrink:0;margin-right:10px;margin-top:1px;">⚠️</span><span>Vul geen direct herleidbare patiëntgegevens in.</span>'));
      }

    renderTab();
    modal.appendChild(body);
    overlay.appendChild(modal);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

    const delAllBtn = document.createElement('button');
    delAllBtn.textContent = 'Verwijder alle';
    delAllBtn.style.cssText = 'font-size:11px;color:var(--danger);background:none;border:none;cursor:pointer;padding:2px 4px;opacity:.7;';
    delAllBtn.addEventListener('mouseenter', () => delAllBtn.style.opacity = '1');
    delAllBtn.addEventListener('mouseleave', () => delAllBtn.style.opacity = '.7');
    delAllBtn.addEventListener('click', () => {
      if (confirm('Weet je zeker dat je alle analyses wilt verwijderen?')) {
        load().forEach(a => remove(a.id));
        const m = document.getElementById('main'); m.innerHTML=''; pgHome(m);
      }
    });
    secHdr.append(secLbl, delAllBtn);
    c.appendChild(secHdr);
    const card = document.createElement('div');
    card.className = 'card';
    all.slice().reverse().forEach(item => {
      const el = document.createElement('div'); el.className = 'list-item';
      const route = item.type === 'FA' ? 'fa' : item.type === 'BA' ? 'ba' : 'ht';
      const meta = [item.client, item.date].filter(Boolean).join(' · ');
      const badgeCls = item.type === 'FA' ? 'badge-fa' : item.type === 'BA' ? 'badge-bas' : 'badge-ht';
      el.innerHTML = `
        <div class="badge ${badgeCls}">${item.type}</div>
        <div class="item-info">
          <div class="item-title">${esc(item.title||'(Geen titel)')}</div>
          <div class="item-meta">${esc(meta)}</div>
        </div>`;
      const delBtn = mkTrashBtn('item-del no-print', 'Verwijder', e => {
        e.stopPropagation();
        if (confirm(`Verwijder deze ${item.type}?`)) { remove(item.id); const m=document.getElementById('main'); m.innerHTML=''; pgHome(m); }
      });
      el.appendChild(delBtn);
      el.onclick = () => go(`/${route}/${item.id}`);
      card.appendChild(el);
    });
    c.appendChild(card);
  }
}

function openExpand(labelTxt, helpTxt, currentVal, onSave) {
  const ov = document.createElement('div');

  ov.innerHTML = `<div class="expand-sheet">
    <div class="expand-handle"></div>
    <div class="expand-lbl">${esc(labelTxt)}</div>

      <button type="button" class="btn btn-ghost btn-sm" id="exp-cancel" style="flex:1">Annuleer</button>
      <button type="button" class="btn btn-fa btn-sm" id="exp-save" style="flex:2">✓ Opslaan</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const ta = ov.querySelector('.expand-ta');
  setTimeout(() => { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }, 80);
  const close = () => ov.remove();
  ov.querySelector('#exp-cancel').onclick = close;
  ov.addEventListener('click', e => { if (e.target === ov) close(); });
  ov.querySelector('#exp-save').onclick = () => { onSave(ta.value.trim()); close(); };
}

const SR_POS_TYPES = [
  { val:'+s+', label:'+S+', color:'#16A34A', title:'Positieve versterker: positief stimulus toegevoegd' },
  { val:'-s-', label:'−S−', color:'#1D4ED8', title:'Negatieve versterker: negatief stimulus weggenomen' },
  { val:'~s-', label:'~S−', color:'#7C3AED', title:'Ambivalente versterker: ambivalent stimulus weggenomen' },
];
const SR_NEG_TYPES = [
  { val:'-s+', label:'−S+', color:'#DC2626', title:'Positieve straf: negatief stimulus toegevoegd' },
  { val:'+s-', label:'+S−', color:'#EA580C', title:'Negatieve straf: positief stimulus weggenomen' },
  { val:'~s+', label:'~S+', color:'#0891B2', title:'Ambivalente straf: ambivalent stimulus toegevoegd' },
];
const ALL_SR = [...SR_POS_TYPES, ...SR_NEG_TYPES];

function srColor(val) {
  const f = ALL_SR.find(x => x.val === val);
  return f ? f.color : '#64748B';
}
function srLabel(val) {
  const f = ALL_SR.find(x => x.val === val);
  return f ? f.label : val;
}
function srClass(val) {
  if (!val) return '';
  if (val.startsWith('+')) return 'pos';
  if (val.startsWith('-')) return 'neg';
  return 'amb';
}

function pgFA(c, id) {
  const isNew = id === 'new';
  const newId = uid();
  let d = isNew ? {
    id: newId, type: 'FA', title:'', client:'', date: today(),
    groupId: _pendingGroup || newId,
    theme: 'blauw',
    sd:'', r:'', fnc:'',
    srPosTxt:'', srPosType:'',
    srNegTxt:'', srNegType:'',
    notities:''
  } : byId(id);
  _pendingGroup = null;

  if (!d) { c.innerHTML = '<p style="padding:20px">Niet gevonden.</p>'; return; }
  if (!d.groupId) { d.groupId = d.id; }
  if (isNew) upsert(d); // sla nieuwe analyse direct op zodat preview hem vindt
  else if (!d.groupId) upsert(d); // migratie

  let saveTimer = null;
  const faHistory = [];
  function save(extra) {
    faHistory.push(JSON.stringify(d));
    if (faHistory.length > 50) faHistory.shift();
    d = { ...d, ...extra };
    upsert(d);
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => toast('Automatisch opgeslagen ✓'), 1200);
  }
  function faUndo() {
    if (!faHistory.length) return;
    d = JSON.parse(faHistory.pop());
    upsert(d);
    redraw();
    toast('Ongedaan gemaakt ↩');
  }

  function redraw() {
    c.innerHTML = '';
    buildFA(c, d, save, false, faUndo, () => faHistory.length > 0, redraw);
  }

  redraw();
}

function buildFA(c, d, save, _noGroup, onUndo, hasUndo, onRedraw) {
  /* ── Actiebalk ── */
  const bar = document.createElement('div');
  bar.className = 'action-bar no-print';

  const btnPrint = mkBtn('btn-ghost btn-sm', '🖨 Print', () => printAs('portrait', 0.9));

  const btnClip = mkBtn('btn-ghost btn-sm', '📋 Kopieer', () => {
    const canvas = c.querySelector('.fa-canvas');
    if (!canvas) return;
    toast('Bezig met kopiëren…', 1500);
    html2canvas(canvas, { backgroundColor: THEMES[d.theme||'blauw'].fa.bg, scale: 2, useCORS: true }).then(cvs => {
      cvs.toBlob(blob => {
        navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
          .then(() => toast('Gekopieerd naar klembord ✓'))
          .catch(() => {
            // Fallback: open in nieuw venster
            const url = cvs.toDataURL();
            const w = window.open();
            w.document.write(`<img src="${url}" style="max-width:100%">`);
            toast('Afbeelding geopend — sla op en plak handmatig', 4000);
          });
      });
    });
  });

  const btnPreview = mkBtn('btn-ghost btn-sm', '👁 Preview', () => buildPreviewOverlay(d));
  const btnUndo = mkBtn('btn-ghost btn-sm', '↩ Ongedaan', () => { if (onUndo) onUndo(); });
  btnUndo.title = 'Laatste wijziging ongedaan maken';
  const btnDel = mkTrashBtn('btn btn-sm btn-ghost', 'Verwijder FA', () => {
    if (confirm('Verwijder deze FA?')) { remove(d.id); go('/'); }
  });
  btnDel.style.color = 'var(--danger)';
  bar.append(btnPrint, btnClip, btnPreview, btnUndo, btnDel);
  c.appendChild(bar);

  /* ── Titelregel ── */
  c.appendChild(mkTitleRow(d, save, 'FA'));

  /* ── Themakiezer ── */
  c.appendChild(mkThemePicker(d, id => { save({ theme: id }); if(onRedraw) onRedraw(); }));

  /* ══════════════════════════
     CANVAS — BA-stijl (wit, absolute posities, SVG pijlen)
  ══════════════════════════ */
  const th  = THEMES[d.theme || 'blauw'].ba;
  const N_BG_FA = '#F5F8FA', N_BD_FA = '#8AAABB', TXT_FA = '#1D3557';
  const BLU_FA = th.blu, LBLU_FA = th.lblu, GRN_FA = th.grn, LGRN_FA = th.lgrn;

  const SD_W=145, SD_H=90, R_W=145, R_H=90, SR_W=195, SR_H=120, FNC_W=195;
  const FNC_H_INIT = 56;              // vaste beginhootte FNC (voor pijlpositie)
  const sdX=16, mainY=24;
  const rX  = sdX + SD_W + 56;        // ruimte voor dots
  const srX = rX  + R_W  + 52;        // ruimte voor pijl
  const midY = mainY + Math.round(R_H/2);       // midden van R-vak
  const srTop = midY - Math.round(SR_H/2);      // Sr-pos-repr gecentreerd op midY
  const fncY = srTop + SR_H + 28;
  const CW  = srX + SR_W + 20;

  const canvas = document.createElement('div');
  canvas.className = 'fa-canvas';
  canvas.style.cssText = `position:relative;background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1);width:${CW}px;`;

  const inner = document.createElement('div');
  inner.style.cssText = `position:relative;width:${CW}px;min-height:${fncY+FNC_H_INIT+24}px;`;
  canvas.appendChild(inner);

  /* SVG overlay voor pijlen en dots */
  const faSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  faSvg.setAttribute('width', CW); faSvg.setAttribute('height','100%');
  faSvg.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:10;overflow:visible;';
  faSvg.innerHTML=`<defs><marker id="fa-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="${BLU_FA}"/></marker></defs>`;
  const faSetA=(e,o)=>{Object.entries(o).forEach(([a,v])=>e.setAttribute(a,v));return e;};
  function faSvgLine(x1,y1,x2,y2){
    faSvg.appendChild(faSetA(document.createElementNS('http://www.w3.org/2000/svg','line'),
      {x1,y1,x2,y2,stroke:BLU_FA,'stroke-width':'1.5','marker-end':'url(#fa-arr)'}));
  }
  inner.appendChild(faSvg);

  /* Twee dots tussen Sd en R */
  const dotsCX = Math.round((sdX+SD_W+rX)/2);
  [midY-9, midY+9].forEach(cy=>{
    const c2=document.createElementNS('http://www.w3.org/2000/svg','circle');
    faSetA(c2,{cx:dotsCX,cy,r:'4',fill:BLU_FA}); faSvg.appendChild(c2);
  });

  /* Pijl → Sr-pos-repr (horizontaal, naar midden van ovaal) */
  const arrStartX = rX + R_W + 4;
  faSvgLine(arrStartX, midY, srX - 4, midY);

  /* Pijl → FNC (horizontaal, dynamisch naar midden van FNC) */
  const fncLine = faSetA(document.createElementNS('http://www.w3.org/2000/svg','line'),
    {x1:arrStartX, y1:fncY+28, x2:srX-4, y2:fncY+28,
     stroke:BLU_FA,'stroke-width':'1.5','marker-end':'url(#fa-arr)'});
  faSvg.appendChild(fncLine);

  /* ── Sd box ── */
  const sdEl = document.createElement('div');
  sdEl.style.cssText=`position:absolute;left:${sdX}px;top:${mainY}px;width:${SD_W}px;height:${SD_H}px;background:${N_BG_FA};border:1.5px solid ${N_BD_FA};border-radius:6px;padding:5px 8px;display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;`;
  const sdLbl=document.createElement('div'); sdLbl.textContent='Sd'; sdLbl.style.cssText=`font-size:11px;font-weight:800;color:${N_BD_FA};margin-bottom:2px;letter-spacing:.04em;flex-shrink:0;`;
  const sdTa=makeTa(d.sd||'','context waarbinnen het probleemgedrag plaatsvindt',v=>{save({sd:v});});
  sdTa.style.color=TXT_FA; if(d.sd_fs) sdTa.style.fontSize=d.sd_fs;
  _ceFsSave.set(sdTa, fs => { save({sd_fs:fs}); });
  liveFillG(sdEl,sdTa,LBLU_FA,BLU_FA,N_BG_FA,N_BD_FA,sdLbl);
  sdEl.append(sdLbl,sdTa); inner.appendChild(sdEl);

  /* ── R box ── */
  const rEl = document.createElement('div');
  rEl.style.cssText=`position:absolute;left:${rX}px;top:${mainY}px;width:${R_W}px;height:${R_H}px;background:${N_BG_FA};border:1.5px solid ${N_BD_FA};border-radius:6px;padding:5px 8px;display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;`;
  const rLbl=document.createElement('div'); rLbl.textContent='R'; rLbl.style.cssText=`font-size:11px;font-weight:800;color:${N_BD_FA};margin-bottom:2px;letter-spacing:.04em;flex-shrink:0;`;
  const rTa=makeTa(d.r||'','problematisch gedrag',v=>{save({r:v});});
  rTa.style.color=TXT_FA; if(d.r_fs) rTa.style.fontSize=d.r_fs;
  _ceFsSave.set(rTa, fs => { save({r_fs:fs}); });
  liveFillG(rEl,rTa,LBLU_FA,BLU_FA,N_BG_FA,N_BD_FA,rLbl);
  rEl.append(rLbl,rTa); inner.appendChild(rEl);

  /* ── Sr-pos-repr ovaal ── */
  if (!d.srNegItems) {
    d.srNegItems = (d.srNegTxt||d.srNegType) ? [{type:d.srNegType||'',txt:d.srNegTxt||''}] : [{type:'',txt:''}];
  }
  const srEl = makeSrNode(srX, srTop, SR_W, SR_H, d.srPosTxt, d.srPosType, SR_POS_TYPES, save, 'srPos', N_BG_FA, N_BD_FA, BLU_FA, LBLU_FA, TXT_FA, d.srPosFontSize, fs => save({srPosFontSize:fs}));
  inner.appendChild(srEl);

  /* ── FNC box ── */
  const fncEl = makeFncNode(srX, fncY, FNC_W, d.srNegItems, save, N_BG_FA, N_BD_FA, BLU_FA, LBLU_FA, TXT_FA, d.fncFontSize, fs => save({fncFontSize:fs}));
  inner.appendChild(fncEl);

  /* Canvas hoogte aanpassen na render */
  function faResize() {
    const h = fncEl.offsetTop + fncEl.offsetHeight + 24;
    inner.style.minHeight = h+'px';
    inner.style.height = h+'px';
    canvas.style.height = h+'px';
    faSvg.setAttribute('height', h);
    /* FNC-pijl dynamisch naar midden van FNC */
    const fncMidY = fncEl.offsetTop + Math.round(fncEl.offsetHeight / 2);
    fncLine.setAttribute('y1', fncMidY);
    fncLine.setAttribute('y2', fncMidY);
  }
  requestAnimationFrame(faResize);
  if (window.ResizeObserver) {
    new ResizeObserver(faResize).observe(fncEl);
  }

  const psw = document.createElement('div');
  psw.className = 'print-scale-wrap';
  psw.appendChild(canvas);

  const wrap2 = document.createElement('div');
  wrap2.style.cssText='padding:20px 24px;overflow:auto;';
  wrap2.appendChild(psw);
  c.appendChild(wrap2);

  if (!_noGroup) buildGroupBar(c, d);
}

/* ── Globale liveFill helper (ook gebruikt door FA) ── */
function liveFillG(el, ta, filledBg, filledBd, emptyBg, emptyBd, lbl) {
  function upd() {
    const filled = ta.value.trim().length > 0;
    el.style.background  = filled ? filledBg : emptyBg;
    el.style.borderColor = filled ? filledBd : emptyBd;
    if (lbl) lbl.style.color = filled ? filledBd : emptyBd;
  }
  upd();
  ta.addEventListener('input', upd);
}

/* ── Gedeelde textarea-helper voor inline bewerking ── */
function makeTa(val, placeholder, onChange) {
  const div = document.createElement('div');
  div.contentEditable = 'true';
  div.innerHTML = val || '';
  div.dataset.ph = placeholder || '';
  div.style.cssText = [
    'flex:1;min-width:0;width:100%;box-sizing:border-box;',
    'outline:none;background:transparent;',
    'font:inherit;font-size:11px;color:inherit;padding:0;margin:0;',
    'min-height:24px;cursor:text;line-height:1.35;',
    'word-break:break-word;white-space:pre-wrap;overflow:hidden;'
  ].join('');
  /* value-shim voor achterwaartse compatibiliteit */
  Object.defineProperty(div, 'value', {
    get() { return this.textContent; },
    set(v)  { this.innerHTML = v || ''; },
    configurable: true
  });
  Object.defineProperty(div, 'placeholder', {
    get() { return this.dataset.ph || ''; },
    set(v)  { this.dataset.ph = v || ''; },
    configurable: true
  });
  div.addEventListener('input', () => onChange(div.innerHTML));
  div.addEventListener('click', e => e.stopPropagation());
  div.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.execCommand('insertLineBreak'); }
  });
  return div;
}
/* makeCE is nu een alias van makeTa */
const makeCE = makeTa;

/* ── Inline bewerkbare knoop (Sd, R) ── */
function makeInlineNode(labelTxt, placeholderTxt, initialVal, onSave) {
  const el = document.createElement('div');
  el.className = 'fa-node';
  if (initialVal) el.classList.add('filled');

  const lbl = document.createElement('div');
  lbl.className = 'fa-node-label';
  lbl.textContent = labelTxt;

  const ta = document.createElement('textarea');
  ta.value = initialVal;
  ta.placeholder = placeholderTxt;
  ta.style.cssText = `
    width:100%; box-sizing:border-box; resize:none; border:none; outline:none;
    background:transparent; font:inherit; font-size:11px; color:inherit;
    padding:0; margin:0; min-height:36px; cursor:text; line-height:1.35;
  `;
  ta.addEventListener('input', () => {
    el.classList.toggle('filled', ta.value.length > 0);
    onSave(ta.value);
  });
  ta.addEventListener('click', e => e.stopPropagation());

  el.append(lbl, ta);
  return el;
}

/* ── Knoop-builder (niet-interactief, voor andere plekken) ── */
function makeNode(shape, labelTxt, placeholderTxt, bodyTxt, wide) {
  const el = document.createElement('div');
  el.className = shape === 'oval' ? 'fa-node-oval' : 'fa-node';
  if (bodyTxt) el.classList.add('filled');

    <div class="fa-node-label">${esc(labelTxt)}</div>
    <div class="fa-node-body">${bodyTxt
      ? `<span class="fa-node-text">${esc(bodyTxt)}</span>`
      : `<span class="fa-node-placeholder">${esc(placeholderTxt)}</span>`}

    <span class="fa-edit-hint">✏️ tikken</span>`;
  return el;
}

/* ── Sr-pos-repr ovaal (BA-stijl, inline kleuren) ── */
function makeSrNode(x, y, w, h, bodyTxt, selectedType, types, save, prefix, N_BG, N_BD, BLU, LBLU, TXT, initFontSize, onFontSize) {
  const el = document.createElement('div');
  el.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:${N_BG};border:2px solid ${N_BD};border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:left;padding:20px 20px 20px 12px;box-sizing:border-box;overflow:hidden;`;

  const lbl = document.createElement('div');
  lbl.textContent = 'Sr-pos-repr';
  lbl.style.cssText=`font-size:11px;font-weight:800;color:${N_BD};margin-bottom:3px;flex-shrink:0;`;
  el.appendChild(lbl);

  const body = document.createElement('div');
  body.style.cssText='width:100%;display:flex;flex-direction:column;align-items:flex-start;gap:3px;margin-top:14px;padding-left:10px;';
  el.appendChild(body);

  function upd() {
    const filled = !!(bodyTxt||selectedType);
    el.style.background    = filled ? LBLU : N_BG;
    el.style.borderColor   = filled ? BLU  : N_BD;
    lbl.style.color        = filled ? BLU  : N_BD;
  }

  function makePosSel() {
    const sel = document.createElement('select');
    sel.style.cssText=`font-family:'Courier New',monospace;font-size:11px;font-weight:700;padding:1px;border-radius:4px;border:1.5px solid ${BLU};background:#fff;color:${BLU};cursor:pointer;width:40px;-webkit-appearance:auto;appearance:auto;`;
    const emptyOpt=document.createElement('option'); emptyOpt.value=''; emptyOpt.textContent='—'; sel.appendChild(emptyOpt);
    types.forEach(tp=>{const opt=document.createElement('option');opt.value=tp.val;opt.textContent=tp.label;sel.appendChild(opt);});
    sel.addEventListener('click',e=>e.stopPropagation());
    return sel;
  }

  function render() {
    body.innerHTML='';
    const t = types.find(x=>x.val===selectedType);
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:baseline;gap:10px;width:100%;';
    if (!selectedType) {
      const sel=makePosSel();
      sel.addEventListener('change',e=>{e.stopPropagation();selectedType=e.target.value;bodyTxt=ta.value;const upd2={};upd2[prefix+'Type']=selectedType;save(upd2);upd();render();});
      const ta=makeTa(bodyTxt,'belangrijkste bekrachtiger',v=>{bodyTxt=v;const upd2={};upd2[prefix+'Txt']=v;save(upd2);upd();});
      ta.style.color=TXT; ta.style.textAlign='left'; if(initFontSize) ta.style.fontSize=initFontSize;
      if(onFontSize) _ceFsSave.set(ta, fs=>{initFontSize=fs; onFontSize(fs);});
      row.append(sel,ta);
    } else {
      const badge=document.createElement('span');
      badge.title='Klik om type te wijzigen';
      badge.style.cssText=`font-family:'Courier New',monospace;font-weight:700;font-size:12px;color:${BLU};flex-shrink:0;cursor:pointer;`;
      badge.textContent=t.label;
      badge.addEventListener('click',e=>{e.stopPropagation();const sel=makePosSel();sel.addEventListener('change',e2=>{e2.stopPropagation();selectedType=e2.target.value;const upd2={};upd2[prefix+'Type']=selectedType;save(upd2);upd();render();});badge.replaceWith(sel);sel.focus();});
      const ta=makeTa(bodyTxt,'belangrijkste bekrachtiger',v=>{bodyTxt=v;const upd2={};upd2[prefix+'Txt']=v;save(upd2);upd();});
      ta.style.color=TXT; ta.style.textAlign='left'; if(initFontSize) ta.style.fontSize=initFontSize;
      if(onFontSize) _ceFsSave.set(ta, fs=>{initFontSize=fs; onFontSize(fs);});
      row.append(badge,ta);
    }
    body.appendChild(row);
  }

  upd(); render();
  return el;
}


/* ── FNC box (BA-stijl, inline kleuren) ── */
function makeFncNode(x, y, w, items, save, N_BG, N_BD, GRN, LGRN, TXT, initFontSize, onFontSize) {
  const el = document.createElement('div');
  el.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:${w}px;background:${N_BG};border:1.5px solid ${N_BD};border-radius:6px;padding:5px 8px 5px 18px;display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;`;

  const lbl = document.createElement('div');
  lbl.textContent='FNC';
  lbl.style.cssText=`font-size:11px;font-weight:800;color:${N_BD};margin-bottom:3px;letter-spacing:.04em;flex-shrink:0;`;
  el.appendChild(lbl);

  const list = document.createElement('div');
  list.style.cssText='display:flex;flex-direction:column;gap:3px;width:100%';
  el.appendChild(list);

  function updFnc() {
    const filled = items.some(i=>i.txt||i.type);
    el.style.background  = filled ? LGRN : N_BG;
    el.style.borderColor = filled ? GRN  : N_BD;
    lbl.style.color      = filled ? GRN  : N_BD;
  }

  function saveItems() { updFnc(); save({srNegItems:items.map(i=>({type:i.type,txt:i.txt}))}); }

  function makeCompactSel(onChange) {
    const sel=document.createElement('select');
    sel.style.cssText=`font-family:'Courier New',monospace;font-size:11px;font-weight:700;padding:1px;border-radius:4px;border:1.5px solid ${GRN};background:#fff;color:${GRN};cursor:pointer;width:40px;-webkit-appearance:auto;appearance:auto;`;
    const emptyOpt=document.createElement('option');emptyOpt.value='';emptyOpt.textContent='—';sel.appendChild(emptyOpt);
    SR_NEG_TYPES.forEach(tp=>{const opt=document.createElement('option');opt.value=tp.val;opt.textContent=tp.label;sel.appendChild(opt);});
    sel.addEventListener('change',e=>{e.stopPropagation();onChange(e.target.value);});
    sel.addEventListener('click',e=>e.stopPropagation());
    return sel;
  }

  function renderItems() {
    list.innerHTML='';
    items.forEach((item,idx)=>{
      const itemWrap=document.createElement('div');
      itemWrap.style.cssText='display:flex;align-items:flex-start;gap:4px;width:100%;';
      const t=SR_NEG_TYPES.find(x=>x.val===item.type);
      const del=document.createElement('button');
      del.textContent='×';
      del.style.cssText=`background:none;border:none;color:${GRN};font-size:13px;cursor:pointer;padding:0 1px;line-height:1;flex-shrink:0;opacity:.5;`;
      del.addEventListener('mouseenter',()=>del.style.opacity='1');
      del.addEventListener('mouseleave',()=>del.style.opacity='.5');
      del.addEventListener('click',e=>{e.stopPropagation();if(items.length>1){items.splice(idx,1);}else{items[0]={type:'',txt:''};} saveItems();renderItems();});
      if (!item.type) {
        const sel=makeCompactSel(val=>{item.type=val;item.txt=ta.value;saveItems();renderItems();});
        const ta=makeTa(item.txt,'feitelijke negatieve consequentie',v=>{item.txt=v;saveItems();});
        ta.style.color=TXT; if(initFontSize) ta.style.fontSize=initFontSize;
        if(onFontSize) _ceFsSave.set(ta, fs=>{initFontSize=fs; onFontSize(fs);});
        itemWrap.append(sel,ta,del);
      } else {
        const row=document.createElement('div');
        row.style.cssText='display:flex;align-items:baseline;gap:10px;flex:1;min-width:0';
        const badge=document.createElement('span');
        badge.title='Klik om type te wijzigen';
        badge.style.cssText=`font-family:'Courier New',monospace;font-weight:700;font-size:12px;color:${GRN};flex-shrink:0;cursor:pointer;`;
        badge.textContent=t.label;
        badge.addEventListener('click',e=>{e.stopPropagation();const sel=makeCompactSel(val=>{item.type=val;saveItems();renderItems();});badge.replaceWith(sel);sel.focus();});
        const ta=makeTa(item.txt,'feitelijke negatieve consequentie',v=>{item.txt=v;saveItems();});
        ta.style.color=TXT; if(initFontSize) ta.style.fontSize=initFontSize;
        if(onFontSize) _ceFsSave.set(ta, fs=>{initFontSize=fs; onFontSize(fs);});
        row.append(badge,ta);
        itemWrap.append(row,del);
      }
      list.appendChild(itemWrap);
    });
    const addBtn=document.createElement('button');
    addBtn.textContent='+ voeg toe';
    addBtn.className='no-print';
    addBtn.style.cssText=`background:none;border:1px dashed ${GRN};border-radius:4px;color:${GRN};font-size:11px;cursor:pointer;padding:2px 6px;margin-top:2px;opacity:.7;`;
    addBtn.addEventListener('click',e=>{e.stopPropagation();items.push({type:'',txt:''});saveItems();renderItems();});
    list.appendChild(addBtn);
  }

  updFnc(); renderItems();
  return el;
}


/* ── Mailen via mailto ── */
function mailFA(d) {
  const srPosLbl = d.srPosType ? ` [${srLabel(d.srPosType)}]` : '';
  const fncLines = (d.srNegItems || []).filter(i => i.txt || i.type)
    .map(i => `  ${i.type ? '[' + srLabel(i.type) + '] ' : ''}${i.txt || ''}`)
    .join('\n') || '  (niet ingevuld)';

  const body = [
    'FUNCTIEANALYSE — IGCGT',
    '',
    'Sd (Discriminatieve stimulus):',
    d.sd || '(niet ingevuld)',
    '',
    'R (Respons / probleemgedrag):',
    d.r || '(niet ingevuld)',
    '',
    `Sr-pos-repr-repr (Positieve consequentie)${srPosLbl}:`,
    d.srPosTxt || '(niet ingevuld)',
