<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CGT Analyse">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4A6E8A">
  <title>CGT Analyse Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cgt-blue: #4A6E8A;
      --cgt-green: #C5DDB8;
      --fa:      #4A6E8A;
      --bas:     #4A6E8A;
      --bar:     #4A6E8A;
      --fa-bg:   #EFF6FF;
      --bas-bg:  #F5F3FF;
      --bar-bg:  #ECFDF5;
      --bg:      #F4F7F2;
      --surface: #FFFFFF;
      --border:  #CBD5E1;
      --txt:     #0F172A;
      --muted:   #64748B;
      --danger:  #DC2626;
      --node-bg: #E8F0E4;
      --node-border: #B2CCAA;
      --node-txt: #2A3D22;
      --r: 10px; --r-sm: 7px;
      --sh: 0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
      --sh-md: 0 4px 12px rgba(0,0,0,.10);
    }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--txt); line-height: 1.5; -webkit-text-size-adjust: 100%; }

    /* ── App shell ── */
    #app { max-width: 760px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
    #app.ht-mode { max-width: none; }
    #app.ht-mode .app-main { padding: 0; }
    .app-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--cgt-blue); border-bottom: none;
      padding: 12px 14px; display: flex; align-items: center; gap: 8px;
      box-shadow: var(--sh);
    }
    .app-header h1 { font-size: 17px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #fff; }
    .back-btn { background: none; border: none; font-size: 28px; line-height: 1; color: #fff; cursor: pointer; padding: 2px 6px 2px 0; }
    .app-main { flex: 1; padding: 16px; }
    .page { animation: fade .18s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

    /* ── Knoppen ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 16px; border-radius: var(--r-sm); font-size: 15px; font-weight: 600;
      cursor: pointer; border: none; transition: filter .12s;
    }
    .btn:active { filter: brightness(.9); }
    .btn-fa    { background: var(--fa);  color: #fff; }
    .btn-bas   { background: var(--bas); color: #fff; }
    .btn-bar   { background: var(--bar); color: #fff; }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--txt); }
    .btn-danger{ background: var(--danger); color: #fff; }
    .btn-sm    { padding: 7px 12px; font-size: 13px; }
    .btn-full  { width: 100%; }
    .fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--fa); color: #fff; border: none; font-size: 30px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(29,78,216,.45); transition: transform .12s; z-index: 50;
    }
    .fab:active { transform: scale(.94); }

    /* ── Cards & lijstitems ── */
    .card { background: var(--surface); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; }
    .card-pad { padding: 14px; }
    .list-item {
      display: flex; align-items: center; padding: 13px 14px;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:active { background: var(--bg); }
    .list-item .item-del { opacity:0; transition:opacity .15s; background:none; border:none; cursor:pointer; padding:6px 8px; border-radius:6px; color:var(--muted); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .list-item:hover .item-del { opacity:1; }
    .list-item .item-del:hover { color:var(--danger); background:rgba(220,38,38,.07); }
    .badge { width: 44px; height: 44px; border-radius: var(--r-sm); display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0; letter-spacing: .5px; }
    .badge-fa   { background: var(--fa); }
    .badge-bas  { background: var(--bas); }
    .badge-ht   { background: var(--cgt-blue); }
    .badge-faba { background: var(--cgt-blue); font-size: 9px; letter-spacing: 0; line-height: 1.15; text-align: center; white-space: normal; padding: 2px; }
    .badge-bar { background: var(--bar); }
    .item-info { flex: 1; margin-left: 12px; min-width: 0; }
    .item-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta  { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── Formulier basis ── */
    .form-sec { margin-bottom: 18px; }
    .sec-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; padding-left: 2px; }
    .sec-label.c-fa  { color: var(--fa); }
    .sec-label.c-bas { color: var(--bas); }
    .sec-label.c-bar { color: var(--bar); }
    .fgrp { margin-bottom: 11px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .hint { font-size: 12px; color: var(--muted); font-weight: 400; }
    input[type=text], input[type=date], textarea, select {
      width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 15px; font-family: inherit; color: var(--txt); background: var(--surface);
      transition: border-color .14s; -webkit-appearance: none; appearance: none;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--fa); }
    textarea { resize: vertical; min-height: 72px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-footer { position: sticky; bottom: 0; background: linear-gradient(transparent, var(--bg) 30%); padding: 14px 0 18px; margin-top: 4px; }

    /* ── Type-keuzekaarten ── */
    .type-card {
      background: var(--surface); border-radius: var(--r); padding: 16px 14px;
      cursor: pointer; border: 2px solid transparent; box-shadow: var(--sh);
      display: flex; align-items: center; gap: 14px; margin-bottom: 11px;
      transition: box-shadow .12s, transform .12s;
    }
    .type-card:active { transform: scale(.985); }
    .type-icon { width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; letter-spacing: .5px; }
    .type-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .type-info p  { font-size: 13px; color: var(--muted); line-height: 1.4; }

    /* ── Uitklapmodal ── */
    .expand-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 400; display: flex; align-items: flex-end;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } }
    .expand-sheet {
      background: var(--surface); width: 100%; border-radius: 20px 20px 0 0;
      padding: 20px 16px 36px; max-height: 85dvh; display: flex; flex-direction: column;
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } }
    .expand-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .expand-lbl { font-size: 13px; font-weight: 700; color: var(--fa); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
    .expand-ta {
      flex: 1; font-size: 16px; font-family: inherit; color: var(--txt);
      border: 1.5px solid var(--border); border-radius: var(--r-sm);
      padding: 11px 13px; resize: none; min-height: 120px; line-height: 1.6;
    }
    .expand-ta:focus { outline: none; border-color: var(--fa); }
    .expand-btns { display: flex; gap: 8px; margin-top: 12px; }
    .expand-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; font-style: italic; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(12px);
      background: #1E293B; color: #fff; padding: 9px 20px; border-radius: 100px;
      font-size: 14px; font-weight: 500; opacity: 0; transition: opacity .18s, transform .18s;
      z-index: 500; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Lege staat ── */
    .empty { text-align: center; padding: 52px 24px; }
    .empty-ico { font-size: 54px; opacity: .35; margin-bottom: 14px; }
    .empty h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty p  { font-size: 15px; color: var(--muted); margin-bottom: 24px; }

    /* ── Actiebalk ── */
    .action-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

    /* ════════════════════════════════════════
       FA VISUEEL DIAGRAM
    ════════════════════════════════════════ */

    /* Header kaart */
    .fa-header-card {
      background: var(--surface); border-radius: var(--r); padding: 13px 14px;
      box-shadow: var(--sh); margin-bottom: 16px;
    }
    .fa-header-card input[type=text] { margin-bottom: 8px; }

    /* Canvas wrapper */
    .fa-canvas {
      background: #E8EEF5;
      border-radius: var(--r);
      padding: 10px 10px 12px;
      box-shadow: var(--sh-md);
      position: relative;
      width: 80%;
    }
    .fa-canvas-title {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .09em; color: var(--fa); margin-bottom: 16px; text-align: center;
    }

    /* ── Diagram layout ── */
    .fa-diagram {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Top rij: Sd ──●●──▶ R ──▶ Sr-pos-repr */
    .fa-top-row {
      display: flex;
      align-items: center;
      gap: 0;
    }

    /* Pijl tussen knopen */
    .fa-arrow {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex-shrink: 0; padding: 0 4px;
    }
    .fa-arrow svg { display: block; }

    /* Knopen: rechthoeken */
    .fa-node {
      flex: 1;
      min-height: 55px;
      background: var(--node-bg);
      border: 1.5px solid var(--node-border);
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      transition: filter .14s, transform .12s, box-shadow .14s;
      position: relative;
      user-select: none;
    }
    .fa-node:active { transform: scale(.97); filter: brightness(.95); }
    .fa-node:hover  { box-shadow: 0 0 0 3px rgba(29,78,216,.25); }
    .fa-node.filled { background: #BFDBFE; border-color: #3B82F6; }

    /* Ovaal voor Sr-pos-repr */
    .fa-node-oval {
      flex: 1;
      min-height: 65px;
      background: var(--node-bg);
      border: 2px solid #1E3A5F;
      border-radius: 50%;
      padding: 8px 10px;
      cursor: pointer;
      transition: filter .14s, transform .12s, box-shadow .14s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      user-select: none;
    }
    .fa-node-oval:active { transform: scale(.97); filter: brightness(.95); }
    .fa-node-oval:hover  { box-shadow: 0 0 0 3px rgba(29,78,216,.25); }
    .fa-node-oval.filled { background: #BFDBFE; border-color: #1D4ED8; }

    .fa-node-label {
      font-size: 10px; font-weight: 800; color: var(--node-txt);
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px;
    }
    .fa-node-body {
      font-size: 11px; color: var(--node-txt); line-height: 1.35; word-break: break-word;
    }
    .fa-node-placeholder {
      font-size: 10px; color: #6B8EB3; font-style: italic;
    }
    .fa-node textarea::placeholder,
    .fa-node-oval textarea::placeholder {
      font-size: 9px; color: #6B8EB3; font-style: italic; line-height: 1.3;
    }
    /* Placeholder voor contenteditable hoofdvakken */
    [contenteditable][data-ph]:empty::before {
      content: attr(data-ph);
      color: #aaa; font-style: italic; pointer-events: none;
    }
    .fa-edit-hint {
      position: absolute; bottom: 5px; right: 7px;
      font-size: 10px; color: #6B8EB3; opacity: 0;
      transition: opacity .15s;
    }
    .fa-node:hover .fa-edit-hint { opacity: 1; }

    /* FNC item: × alleen zichtbaar op hover */
    .fnc-item .fnc-del { opacity: 0; transition: opacity .15s; }
    .fnc-item:hover .fnc-del { opacity: 1; }

    /* SR type badges binnen knoop */
    .fa-sr-chips {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px;
      justify-content: center;
    }
    .fa-sr-chip {
      font-family: 'Courier New', monospace; font-size: 12px; font-weight: 700;
      padding: 3px 8px; border-radius: 5px; border: 1.5px solid currentColor;
      cursor: pointer; background: transparent; color: #4B7BA6;
      transition: all .13s; line-height: 1.2;
    }
    .fa-sr-chip.selected { background: var(--fa); color: #fff; border-color: var(--fa); }
    .fa-sr-chip:active { transform: scale(.93); }

    /* Pijl verticaal gedeelte (van R naar beneden naar Sr-neg) */
    .fa-bottom-section {
      display: flex;
      margin-top: 0;
    }
    .fa-bottom-spacer {
      /* breedte van Sd + pijl — zodat Sr-neg uitlijnt onder R */
      flex-shrink: 0;
    }
    .fa-down-col {
      display: flex; flex-direction: column; align-items: center;
      flex: 1;
    }
    .fa-down-arrow {
      padding: 4px 0;
    }

    /* Sr-neg rechthoek onderaan */
    .fa-srneg-row {
      display: flex;
      align-items: flex-start;
      width: 100%;
    }

    /* Annotatiebalk onderaan canvas */
    .fa-legend {
      margin-top: 14px; border-top: 1px dashed #9DB5CF; padding-top: 10px;
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    }
    .fa-legend-item {
      font-size: 11px; color: #4B7BA6; display: flex; align-items: center; gap: 4px;
    }

    /* ── Stap-kaart (BA-S) ── */
    .step-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 13px; margin-bottom: 4px; position: relative; }
    .step-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--bas); color: #fff; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
    .step-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
    .seq-arr { text-align: center; font-size: 20px; color: var(--bas); padding: 2px 0 6px; }

    /* ── Schema weergave (BA) ── */
    .schema-wrap { background: var(--surface); border-radius: var(--r); box-shadow: var(--sh-md); overflow: hidden; }
    .schema-head { padding: 14px 16px; color: #fff; }
    .schema-head h2 { font-size: 15px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
    .schema-head .sh-meta { font-size: 13px; opacity: .88; margin-top: 3px; }
    .sh-fa  { background: var(--fa); }
    .sh-bas { background: var(--bas); }
    .sh-bar { background: var(--bar); }
    .schema-block { border-bottom: 1px solid var(--border); padding: 13px 15px; }
    .schema-block:last-child { border-bottom: none; }
    .sb-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 9px; }
    .sb-fa  { color: var(--fa); }  .sb-bas { color: var(--bas); }  .sb-bar { color: var(--bar); }
    .sf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .sf > .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); display: block; margin-bottom: 3px; }
    .sf > .val { font-size: 14px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .sf > .val:empty::before { content: '—'; color: var(--muted); }
    .schema-arr { text-align: center; font-size: 20px; padding: 4px 0 2px; }
    .schema-arr.c-bar { color: var(--bar); } .schema-arr.c-bas { color: var(--bas); }
    .schema-foot { padding: 7px 15px; font-size: 11px; text-align: right; }
    .sf-fa  { background: var(--fa-bg);  color: #93C5FD; }
    .sf-bas { background: var(--bas-bg); color: #A78BFA; }
    .sf-bar { background: var(--bar-bg); color: #6EE7B7; }
    .kern-block { border-left: 4px solid var(--bar); }
    .circ-block { background: #F0FDF4; border: 1.5px dashed #16A34A; border-radius: var(--r-sm); padding: 10px 13px; display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: #14532D; }

    /* ════════════════════════════════════════
       FA PRINT STIJL
    ════════════════════════════════════════ */
    .fa-print-wrap { display: none; }

    @media print {
      /* Verberg UI-elementen in alle modi */
      .no-print, .app-header { display: none !important; }
      .app-main { padding: 0 !important; margin: 0 !important; }
      html, body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* ── FA print ── */
      .fa-canvas {
        box-shadow: none !important;
        border: 1px solid #ccc !important;
        border-radius: 8px !important;
      }
      .fa-canvas, .fa-canvas * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .fa-canvas select,
      .fa-canvas .fa-edit-hint,
      .fa-canvas .fnc-del { display: none !important; }

      /* ── BA print ── */
      .ba-canvas {
        box-shadow: none !important;
        border: 1px solid #ccc !important;
        border-radius: 8px !important;
      }
      .ba-canvas, .ba-canvas * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* ── Scheidingslijn tussen gekoppelde analyses ── */
      .group-section { border-top: none !important; margin-top: 0 !important; }

      /* ── Verberg scrollbalken FA/BA ── */
      body, .app-main, .app-main > * { overflow: hidden !important; }
      .print-scale-wrap { overflow: visible !important; }

      /* ── HT print ── */
      #app.ht-mode .app-main { padding: 0 !important; }
      .ht-scroll-wrap {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
        box-shadow: none !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        overflow: visible !important;
      }
      .ht-scale-wrap {
        transform-origin: center center !important;
      }
      .ht-canvas {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .ht-info-btn { display: none !important; }
    }

    /* Print-schaal wrappers — aangestuurd via JS vóór window.print() */
    .print-scale-wrap { display: contents; }
    @media print {
      .print-scale-wrap {
        display: block !important;
        transform-origin: top left !important;
      }
    }

    /* ── HT Info knop (verschijnt bij hover op balk) ── */
    .ht-card-hdr { position: relative; }
    .ht-info-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,0.25); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: inherit;
      opacity: 0; transition: opacity .15s;
      line-height: 1; padding: 0;
    }
    .ht-card-hdr:hover .ht-info-btn { opacity: 1; }
    .ht-info-btn:hover { background: rgba(255,255,255,0.4); }

    /* ── HT Info modal ── */
    .ht-info-modal {
      position: fixed; inset: 0; z-index: 20000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(2px);
    }
    .ht-info-sheet {
      background: #fff; border-radius: 12px; max-width: 460px; width: 90%;
      max-height: 80vh; overflow-y: auto; box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    .ht-info-sheet-hdr {
      padding: 14px 16px; border-radius: 12px 12px 0 0;
      font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: space-between;
    }
    .ht-info-sheet-body { padding: 14px 16px; font-size: 13px; line-height: 1.6; color: #2a2a2a; }
    .ht-info-close { background: none; border: none; font-size: 20px; cursor: pointer; color: inherit; line-height: 1; padding: 0 2px; opacity: .7; }
    .ht-info-close:hover { opacity: 1; }

    /* ── HT Fullscreen Preview ── */
    .ht-preview-overlay {
      display: none;
